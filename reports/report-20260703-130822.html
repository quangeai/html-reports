<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰姐 - 个人简历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .resume-container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 2fr;
            min-height: 1100px;
        }

        /* 左侧边栏样式 */
        .sidebar {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6491 100%);
            color: white;
            padding: 40px 30px;
        }

        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            background-color: #5d7fb9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 18px;
            color: #bdcde6;
            font-weight: 400;
            margin-bottom: 25px;
        }

        .contact-info, .skills, .languages {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 50px;
            height: 2px;
            background-color: #4fc3f7;
        }

        .contact-item, .skill-item, .language-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .contact-item i, .skill-item i {
            margin-right: 12px;
            width: 20px;
            color: #4fc3f7;
        }

        .skill-name {
            flex: 1;
            margin-bottom: 5px;
        }

        .skill-bar {
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .skill-level {
            height: 100%;
            background-color: #4fc3f7;
            border-radius: 4px;
        }

        .language-item {
            justify-content: space-between;
        }

        .language-level {
            color: #bdcde6;
        }

        /* 右侧主内容区样式 */
        .main-content {
            padding: 40px 35px;
        }

        .about, .education, .experience, .projects {
            margin-bottom: 40px;
        }

        .main-section-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eaeaea;
            position: relative;
        }

        .main-section-title::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 60px;
            height: 2px;
            background-color: #3498db;
        }

        .about-text {
            font-size: 16px;
            color: #555;
            text-align: justify;
        }

        .highlight {
            color: #e74c3c;
            font-weight: 600;
        }

        .education-item, .experience-item, .project-item {
            margin-bottom: 25px;
            padding-left: 20px;
            border-left: 3px solid #eaeaea;
            position: relative;
        }

        .education-item::before, .experience-item::before, .project-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 5px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #3498db;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .item-subtitle {
            font-size: 16px;
            color: #3498db;
            font-weight: 500;
        }

        .item-date {
            color: #7f8c8d;
            font-weight: 500;
        }

        .item-description {
            color: #555;
            font-size: 15px;
        }

        .achievement {
            background-color: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #2ecc71;
        }

        .achievement-title {
            color: #27ae60;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .hobbies {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }

        .hobby-tag {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .resume-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                padding: 30px 20px;
            }
            .main-content {
                padding: 30px 25px;
            }
        }
    </style>
</head>
