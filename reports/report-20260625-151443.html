# A4格式HTML文档转换与导出Word功能

我将按照您提供的排版规范，将指定URL的文档内容转换为标准HTML格式，并添加导出Word文档功能。

首先，我需要获取文档内容，但由于安全限制，我无法直接访问外部URL。我将创建一个模拟文档内容来演示完整的转换和导出功能。

<body>
    <div class="container">

            <button id="exportWord">导出Word文档</button>

    <script>
        // 模拟从URL获取的文档内容
        const documentContent = `关于进一步加强网络安全管理的通知

六、加强人员培训教育。各单位要定期组织网络安全培训，提高全体员工的网络安全意识和防护技能。

请各单位按照本通知要求，认真抓好贯彻落实，并于本月底前将落实情况报送至网络安全办公室。

网络安全办公室
2023年10月15日`;

        // 按照规范处理文档内容
        function formatDocument(content) {
            // 分割段落（按空行分割）
            const lines = content.split(/
\s*
/);
            
            // 识别各部分
            let title = "";
            let body = [];
            let signature = [];
            
            if (lines.length > 0) {
                // 第一行作为标题
                title = lines[0].trim();
                
                // 最后两行作为落款
                if (lines.length >= 3) {
                    signature = lines.slice(-2);
                    // 正文是从标题后到落款前的内容
                    body = lines.slice(1, lines.length - 2);
                } else {
                    // 如果没有足够的行，则所有内容都是正文
                    body = lines.slice(1);
                }
            }
            
            // 构建HTML
            let html = "";
            
            // 添加标题
            if (title) {
                html += `<h1>${title}</h1>`;
            }
            
            // 添加正文
            body.forEach((paragraph, index) => {
                const paragraphText = paragraph.trim();
                if (paragraphText) {
                    // 第一段落不缩进，后续段落缩进
                    const className = index === 0 ? "body-first" : "body-paragraph";
                    html += `<p class="${className}">${paragraphText}</p>`;
                }
            });
            
            // 添加落款
            signature.forEach((line, index) => {
                const lineText = line.trim();
                if (lineText) {
                    html += `<p class="signature">${lineText}</p>`;
                }
            });
            
            return html;
        }

        // 初始化文档内容
        document.getElementById('documentContent').innerHTML = formatDocument(documentContent);

        // 导出Word文档功能
        document.getElementById('exportWord').addEventListener('click', function() {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = "正在生成Word文档...";
            
            // 获取格式化后的HTML内容
            const content = document.getElementById('documentContent').innerHTML;
            
            // 创建包含完整样式的HTML文档
            const fullHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body {
                            width: 210mm;
                            margin: 0;
                            padding: 25mm 20mm;
                            font-family: "FangSong", "仿宋", serif;
                        }
                        
                        h1 {
                            font-size: 22pt;
                            font-family: "SimSun", "NSimSun", serif;
                            line-height: 32pt;
                            text-align: center;
                            margin-bottom: 28pt;
                        }
                        
                        p {
                            font-size: 16pt;
                            font-family: "FangSong", "仿宋", serif;
                            line-height: 28pt;
                            text-align: left;
                            margin-bottom: 14pt;
                            margin-top: 14pt;
                        }
                        
                        p.body-first {
                            text-indent: 0;
                        }
                        
                        p.body-paragraph {
                            text-indent: 2em;
                        }
                        
                        p.signature {
                            text-align: right;
                            text-indent: 0;
                            margin-top: 28pt;
                        }
                    </style>
                </head>
                <body>
                    ${content}
                </body>
                </html>
            `;
            
            // 创建Blob对象
            const blob = new Blob([fullHtml], { type: 'application/msword' });
            
            // 创建下载链接
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'A4格式文档.doc';
            
            // 触发下载
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            statusMessage.textContent = "Word文档已生成并开始下载";
            
            // 3秒后恢复状态消息
            setTimeout(() => {
                statusMessage.textContent = "文档已按A4规范格式化";
            }, 3000);
        });
