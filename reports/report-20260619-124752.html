<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室手卫生数据统计分析</title>
    <!-- 引入ECharts官方在线CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f0f8f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c7a7b;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .chart-box {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 400px;
        }
        .summary {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: #333;
            line-height: 1.8;
        }
        .summary h3 {
            color: #2c7a7b;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .no-data {
            text-align: center;
            line-height: 400px;
            color: #999;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>科室手卫生数据统计分析</h1>
        <!-- 护士平均分排名柱状图 -->
        <div class="chart-box" id="barChart">
            <div class="no-data">未获取到有效护士打分数据</div>
        </div>
        <!-- 低分反馈问题分布饼图 -->
        <div class="chart-box" id="pieChart">
            <div class="no-data">未获取到有效低分反馈问题数据</div>
        </div>
        <!-- 汇总区域 -->
        <div class="summary">
            <h3>数据汇总与整改建议</h3>
            <p>未获取到有效患者打分及院感督查打分原始数据，请提供相关数据后重新生成分析页面。</p>
        </div>
    </div>

    <script>
        // 初始化图表实例
        var barChart = echarts.init(document.getElementById('barChart'));
        var pieChart = echarts.init(document.getElementById('pieChart'));

        // 无数据状态配置
        var noDataOption = {
            tooltip: { trigger: 'none' },
            graphic: {
                elements: [{
                    type: 'text',
                    left: 'center',
                    top: 'center',
                    style: {
                        text: '暂无数据',
                        fontSize: 18,
                        color: '#999'
                    }
                }]
            }
        };

        // 设置无数据状态
        barChart.setOption(noDataOption);
        pieChart.setOption(noDataOption);

        // 适配窗口大小变化
        window.addEventListener('resize', function() {
            barChart.resize();
            pieChart.resize();
        });
    </script>
</body>
</html>
