<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄炒蛋热量分析报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        .report-card {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .dish-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .total-calorie {
            font-size: 20px;
            margin-top: 15px;
        }

        .calorie-value {
            font-size: 36px;
            font-weight: 700;
            display: inline-block;
            margin-left: 8px;
        }

        .card-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f2f5;
        }

        .nutrient-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 12px;
            background-color: #f8fafc;
            border-radius: 8px;
        }

        .nutrient-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .nutrient-info {
            flex: 1;
        }

        .nutrient-name {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .suitability-item {
            margin-bottom: 12px;
            padding-left: 24px;
            position: relative;
        }

        .suitability-item::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #48bb78;
            font-weight: 700;
        }

        .intake-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .intake-container {
                grid-template-columns: 1fr;
            }
        }

        .intake-card {
            background-color: #f0f9ff;
            padding: 18px;
            border-radius: 8px;
            border-left: 4px solid #3182ce;
        }

        .intake-title {
            font-weight: 600;
            color: #2b6cb0;
            margin-bottom: 8px;
        }

        .tips-box {
            background-color: #fffaf0;
            padding
