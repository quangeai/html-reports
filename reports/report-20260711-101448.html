# 积极心理学知识卡片排版设计

我将创建一个清新活泼的教育主题HTML页面，展示积极心理学知识卡片，采用浅蓝色背景、云朵形状内容区和教育元素装饰。

下面是完整的实现代码：

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积极心理学知识卡片</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background-color: #e6f7ff;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 100, 200, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        /* 云朵形状主内容区 */
        .content-cloud {
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }
        
        /* 云朵形状效果 */
        .content-cloud:before, .content-cloud:after {
            content: '';
            position: absolute;
            background-color: white;
            border-radius: 50%;
        }
        
        .content-cloud:before {
            width: 60px;
            height: 60px;
            top: -30px;
            left: 80px;
        }
        
        .content-cloud:after {
            width: 40px;
            height: 40px;
            top: -20px;
            right: 100px;
        }
        
        /* 标题样式 */
        .main-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.8rem;
            font-weight: bold;
            color: #1a5fb4;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 15px;
        }
        
        .title-decoration {
            position: absolute;
            bottom: 0;
            right: 35%;
            width: 30%;
            height: 8px;
            background-color: #ffd166;
            border-radius: 4px;
        }
        
        /* 主题导语区域 */
        .theme-intro {
            background-color: #d4f1d4;
            border-radius: 15px;
            padding: 20px 30px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 12px rgba(0, 150, 100, 0.1);
        }
        
        .theme-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: #2e7d32;
            flex-grow: 1;
            text-align: center;
        }
        
        .icon-pencil, .icon-book {
            font-size: 2.5rem;
            color: #4a90e2;
        }
        
        /* 内容区域样式 */
        .content-section {
            margin: 35px 0;
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 6px solid;
            border-radius: 3px;
        }
        
        .pink-title {
            color: #ff6b8b;
            border-left-color: #ff6b8b;
        }
        
        .blue-title {
            color: #4a90e2;
            border-left-color: #4a90e2;
        }
        
        .green-title {
            color: #2ecc71;
            border-left-color: #2ecc71;
        }
        
        .content-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            text-align: justify;
        }
        
        .highlight {
            font-weight: 700;
            color: #1a5fb4;
        }
        
        .color-highlight {
            background-color: #fff9c4;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .pink-highlight {
            color: #ff6b8b;
        }
        
        .blue-highlight {
            color: #4a90e2;
        }
        
        .green-highlight {
            color: #2ecc71;
        }
        
        /* 底部装饰 */
        .bottom-decoration {
            height: 10px;
            background-color: #ffd166;
            border-radius: 5px;
            margin-top: 40px;
            position: relative;
        }
        
        .bottom-decoration:before {
            content: '';
            position: absolute;
            width: 80%;
            height: 6px;
            background-color: #ffedb3;
            border-radius: 3px;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
        }
        
        /* 装饰元素 */
        .decoration {
            position: absolute;
            opacity: 0.1;
            z-index: 0;
        }
        
        .decoration-1 {
            top: 10%;
            right: 5%;
            font-size: 4rem;
            color: #4a90e2;
        }
        
        .decoration-2 {
            bottom: 15%;
            left: 5%;
            font-size: 3.5rem;
            color: #ff6b8b;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                border-radius: 20px;
            }
            
            .content-cloud {
                padding: 25px;
                border-radius: 25px;
            }
            
            .main-title {
                font-size: 2.2rem;
            }
            
            .theme-text {
                font-size: 1.2rem;
            }
            
            .icon-pencil, .icon-book {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .theme-intro {
                padding: 15px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .theme-intro {
                flex-direction: column;
            }
            
            .icon-pencil, .icon-book {
                margin: 10px 0;
            }
            
            .main-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 装饰元素 -->
        <div class="decoration decoration-1">📚</div>
        <div class="decoration decoration-2">✏️</div>
        
        <!-- 主内容区 -->
        <div class="content-cloud">
            <!-- 主标题 -->
            <h1 class="main-title">
                积极心理学：研究幸福与优势的科学
                <div class="title-decoration"></div>
            </h1>
            
            <!-- 主题导语 -->
            <div class="theme-intro">
                <div class="icon-pencil">✏️</div>
                <div class="theme-text">探索幸福科学，点亮积极人生</div>
                <div class="icon-book">📚</div>
            </div>
            
            <!-- 核心内容 -->
            <div class="content-section">
                <h2 class="section-title pink-title">核心内容</h2>
                <p class="content-text">
                    <span class="highlight">积极心理学</span>是心理学的一个分支，它不专注于治疗心理疾病，而是研究如何让普通人生活得更幸福、更有意义，并发挥个人优势。
                </p>
            </div>
            
            <!-- 关键要点 -->
            <div class="content-section">
                <h2 class="section-title blue-title">关键要点</h2>
                
                <div class="content-section">
                    <h3 class="section-title green-title">1. 核心焦点</h3>
                    <p class="content-text">
                        关注人的<span class="color-highlight pink-highlight">积极面</span>，如<span class="highlight">幸福感</span>、<span class="highlight">乐观</span>、<span class="highlight">韧性</span>、<span class="highlight">美德</span>和<span class="highlight">意义感</span>。
                    </p>
                </div>
                
                <div class="content-section">
                    <h3 class="section-title green-title">2. 实践方法</h3>
                    <p class="content-text">
                        通过培养<span class="color-highlight blue-highlight">感恩</span>、<span class="color-highlight blue-highlight">投入</span>、<span class="color-highlight blue-highlight">积极关系</span>等方式，提升个人与群体的<span class="highlight">福祉</span>。
                    </p>
                </div>
                
                div
