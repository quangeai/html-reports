<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄韵冰 - 专业简历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .resume-container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6491 100%);
            color: white;
            padding: 40px 50px;
            text-align: center;
        }

        .name {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            font-size: 1.05rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-item i {
            color: #64b5f6;
        }

        /* 主体内容样式 */
        .content {
            padding: 50px;
        }

        .section {
            margin-bottom: 45px;
        }

        .section-title {
            font-size: 1.8rem;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: #3498db;
        }

        .section-content {
            font-size: 1.05rem;
            color: #555;
        }

        /* 教育背景 */
        .education-item {
            margin-bottom: 8px;
            padding-left: 10px;
        }

        .highlight {
            color: #2c3e50;
            font-weight: 600;
        }

        /* 工作经历 */
        .job-item {
            margin-bottom: 28px;
            padding-left: 5px;
            border-left: 3px solid #eee;
            padding-left: 20px;
        }

        .job-period {
            color: #e74c3c;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .job-company {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .job-position {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 10px;
        }

        .job-achievement {
            background-color: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #3498db;
        }

        .job-achievement strong {
            color: #2980b9;
        }

        /* 项目经验 */
        .project-item {
            margin-bottom: 22px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .project-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .project-period {
            display: inline-block;
            background: #2c3e50;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .project-name {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 5px;
        }

        .project-role {
            color: #e74c3c;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* 个人优势 */
        .strength-list {
            list-style: none;
        }

        .strength-list li {
            margin-bottom: 15px;
            padding-left: 30px;
            position: relative;
        }

        .strength-list li i {
            position: absolute;
            left: 0;
            top: 5px;
            color: #27ae60;
        }

        .strength-category {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .strength-detail {
            color: #555;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(to right, #3498db, #2ecc71);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        /* 其他信息 */
        .certificates {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cert-item {
            background: #fff;
            border: 2px solid #3498db;
            border-radius: 10px;
            padding: 15px 20px;
            flex-grow: 1;
            text-align: center;
            font-weight: 600;
            color: #2c3e50;
            transition: all 0.3s ease;
        }

        .cert-item:hover {
            background: #3498db;
            color: white;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header, .content {
                padding: 30px;
            }
            .name {
                font-size: 2.5rem;
            }
            .contact-info {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
        }
    </style>
</head>
