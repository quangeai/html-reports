    <style>
        * {

        }
        body {

            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #1a1a1a;
        }
        /* 核心指标区域 */
        .kpi-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        .kpi-card {
            flex: 1;
            min-width: 200px;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }
        .kpi-card:nth-child(1)::before { background-color: #4A90E9; }
        .kpi-card:nth-child(2)::before { background-color: #9B9B9B; }
        .kpi-card:nth-child(3)::before { background-color: #7ED321; }
        .kpi-card:nth-child(4)::before { background-color: #F5A623; }
        .kpi-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .kpi-desc {
            font-size: 12px;
            color: #999;
        }
        .order-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: #666;
            background: #f0f2f5;
            padding: 4px 8px;
            border-radius: 4px;
        }
        /* 图表区域 */
        .chart-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .chart-col {
            flex: 1 1 calc(50% - 10px);
            min-width: 300px;
        }
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        .chart-container {
            height: 400px;
        }
        @media (max-width: 768px) {
            .chart-col {
                flex: 1 1 100%;
            }
            .kpi-card {
                min-width: 150px;
            }
        }
    </style>
</head>
