<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>广告投入 与 销售额 关系图</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .chart-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .chart-box {
      position: relative;
      height: 480px;
    }
  </style>
</head>
<body>
  <div class="chart-wrap">
    <div class="chart-box">
      <canvas id="statmasterChart"></canvas>
    </div>
  </div>
  <script>
    const chartConfig = {"type": "scatter", "data": {"datasets": [{"type": "scatter", "label": "观测点", "data": [{"x": 1, "y": 2}, {"x": 2, "y": 4}, {"x": 3, "y": 5}, {"x": 4, "y": 4}, {"x": 5, "y": 5}], "backgroundColor": "#2563eb"}, {"type": "line", "label": "回归线", "data": [{"x": 1, "y": 2.8}, {"x": 5, "y": 5.2}], "borderColor": "#ea580c", "borderWidth": 2, "pointRadius": 0, "fill": false}]}, "options": {"responsive": true, "plugins": {"title": {"display": true, "text": "广告投入 与 销售额 关系图", "font": {"size": 16}}, "legend": {"display": true, "position": "top"}}, "scales": {"x": {"title": {"display": true, "text": "广告投入"}, "grid": {"color": "rgba(0,0,0,0.06)"}}, "y": {"title": {"display": true, "text": "销售额"}, "grid": {"color": "rgba(0,0,0,0.06)"}, "beginAtZero": true}}}};
    const ctx = document.getElementById('statmasterChart');
    new Chart(ctx, chartConfig);
  </script>
</body>
</html>
