<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教案首页模板</title>
    <style>
        @page {
            size: A4;
            margin: 25.4mm;
        }
        body {
            font-family: SimSun, "Times New Roman", serif;
            font-size: 12pt;
            line-height: 1.5;
            margin: 0;
            padding: 0;
        }
        .export-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12pt;
            z-index: 999;
        }
        .export-btn:hover {
            background-color: #45a049;
        }
        h1 {
            font-family: SimHei, "Times New Roman", serif;
            font-size: 18pt;
            text-align: center;
            margin: 1em 0;
        }
        h2 {
            font-family: SimHei, "Times New Roman", serif;
            font-size: 16pt;
            margin: 1em 0 0.5em 0;
        }
        h3 {
            font-family: SimHei, "Times New Roman", serif;
            font-size: 14pt;
            margin: 0.8em 0 0.4em 0;
        }
        p {
            text-indent: 2em;
            margin: 0.5em 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }
        table, th, td {
            border: 1px solid #000;
        }
        th {
            background-color: #f2f2f2;
            text-align: center;
            padding: 5px;
            font-weight: bold;
        }
        td {
            padding: 5px;
            text-align: left;
        }
        .info-table td:nth-child(odd) {
            width: 20%;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="export-btn" onclick="exportToWord()">导出为Word文档</button>
    <div id="content">
        <h1>教案首页模板</h1>
        
        <h2>一、基本信息</h2>
        <table class="info-table">
            <tr>
                <td>课程名称</td>
                <td></td>
                <td>授课教师</td>
                <td></td>
            </tr>
            <tr>
                <td>授课班级</td>
                <td></td>
                <td>授课时间</td>
                <td></td>
            </tr>
            <tr>
                <td>授课学时</td>
                <td></td>
                <td>授课地点</td>
                <td></td>
            </tr>
            <tr>
                <td>教学章节</td>
                <td colspan="3"></td>
            </tr>
            <tr>
                <td>教学目标</td>
                <td colspan="3"></td>
            </tr>
        </table>

        <h2>二、教学重难点</h2>
        <h3>（一）教学重点</h3>
        <p>1. </p>
        <p>2. </p>

        <h3>（二）教学难点</h3>
        <p>1. </p>
        <p>2. </p>

        <h2>三、教学方法与手段</h2>
        <p></p>

        <h2>四、教学过程设计</h2>
        <table>
            <tr>
                <th>教学环节</th>
                <th>时长</th>
                <th>教学内容与活动</th>
                <th>设计意图</th>
            </tr>
            <tr>
                <td>导入</td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>知识讲解</td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>实践操作</td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>小结与作业</td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </table>

        <h2>五、教学反思</h2>
        <p></p>
    </div>

    <script>
        function exportToWord() {
            const content = document.getElementById('content').innerHTML;
            const style = document.querySelector('style').textContent;
            const wordHtml = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" 
                      xmlns:w="urn:schemas-microsoft-com:office:word" 
                      xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="UTF-8">
                        <title>教案首页模板</title>
                        <style>${style}</style>
                    </head>
                    <body>${content}</body>
                </html>
            `;
            const blob = new Blob(['\ufeff', wordHtml], { type: 'application/vnd.ms-word' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '教案首页模板.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
