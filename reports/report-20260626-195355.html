<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HR 数据分析报告</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            padding: 30px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #165dff;
            border-bottom: 4px solid #165dff;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .section { margin-bottom: 35px; }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            border-left: 5px solid #165dff;
            padding-left: 15px;
            margin-bottom: 16px;
        }
        .section-content {
            padding-left: 20px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .highlight-box {
            background: #f8faff;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e6edf9;
        }
        ul { padding-left: 25px; }
        li { margin-bottom: 8px; }
        .footer {
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            text-align: right;
            font-size: 14px;
            color: #8c9ab1;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>HR 数据分析报告</h1>
    <div class="section">
        <div class="section-title">📊 数据概况</div>
        <div class="section-content highlight-box">暂无数据概况</div>
    </div>
    <div class="section">
        <div class="section-title">📈 数据分析</div>
        <div class="section-content highlight-box">暂无数据分析</div>
    </div>
    <div class="section">
        <div class="section-title">🔍 问题诊断</div>
        <div class="section-content highlight-box">暂无问题诊断</div>
    </div>
    <div class="section">
        <div class="section-title">💡 管理建议</div>
        <div class="section-content highlight-box"><ul></ul></div>
    </div>
    <div class="footer">报告由 AI 数据分析工作流自动生成 · 数据已脱敏</div>
</div>
</body>
</html>
