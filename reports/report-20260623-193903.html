<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商运营数据智能分析平台</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #051429;
            color: #fff;
            overflow-x: hidden;
        }
        .header {
            height: 70px;
            background: linear-gradient(90deg, rgba(0,210,255,0.1) 0%, rgba(0,210,255,0.05) 100%);
            border-bottom: 1px solid rgba(0,210,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .header h1 {
            font-size: 28px;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0,210,255,0.7);
            letter-spacing: 3px;
        }
        .header .time-info {
            position: absolute;
            right: 20px;
            color: #8be1ff;
            font-size: 14px;
        }
        .main-container {
            display: flex;
            padding: 15px;
            gap: 15px;
            height: calc(100vh - 70px);
        }
        .col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .col-left { width: 25%; }
        .col-middle { width: 50%; }
        .col-right { width: 25%; }
        .panel {
            background-color: rgba(0,210,255,0.05);
            border: 1px solid rgba(0,210,255,0.2);
            padding: 15px;
            position: relative;
            flex: 1;
        }
        .panel::before, .panel::after {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid #00d2ff;
        }
        .panel::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }
        .panel::after {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }
        .panel-title {
            font-size: 18px;
            color: #8be1ff;
            padding-left: 12px;
            border-left: 3px solid #00d2ff;
            margin-bottom: 15px;
            height: 20px;
            line-height: 20px;
        }
        .core-indicators {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .indicator-card {
            background: rgba(0,210,255,0.08);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }
        .indicator-label {
            font-size: 13px;
            color: #a0d8ef;
            margin-bottom: 8px;
        }
        .indicator-value {
            font-size: 18px;
            color: #00d2ff;
            font-weight: bold;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .rank-table th {
            color: #8be1ff;
            padding: 8px 5px;
            text-align: left;
            border-bottom: 1px solid rgba(0,210,255,0.2);
        }
        .rank-table td {
            padding: 7px 5px;
            border-bottom: 1px dashed rgba(0,210,255,0.1);
        }
        .rank-badge {
            display: inline-block;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            border-radius: 3px;
            background: rgba(0,210,255,0.2);
            color: #00d2ff;
            font-weight: bold;
        }
        .rank-badge.top3 {
            background: #00d2ff;
            color: #051429;
        }
        .chart-container {
            width: 100%;
            height: calc(100% - 35px);
        }
        .sm-chart {
            height: 48%;
            margin-bottom: 4%;
        }
        .update-info {
            position: absolute;
            left: 20px;
            bottom: 10px;
            color: #8be1ff;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>电商运营数据智能分析平台</h1>
        <div class="time-info" id="currentTime"></div>
    </div>
    <div class="update-info" id="updateInfo"></div>
    <div class="main-container">
        <div class="col col-left">
            <div class="panel">
                <div class="panel-title">核心总指标</div>
                <div class="core-indicators">
                    <div class="indicator-card">
                        <div class="indicator-label">总GMV</div>
                        <div class="indicator-value" id="totalGmv">0</div>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-label">总销量</div>
                        <div class="indicator-value" id="totalSales">0</div>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-label">总利润</div>
                        <div class="indicator-value" id="totalProfit">0</div>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-label">平均客单价</div>
                        <div class="indicator-value" id="avgPrice">0</div>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-label">平均利润率</div>
                        <div class="indicator-value" id="avgProfitRate">0</div>
                    </div>
                    <div class="indicator-card">
                        <div class="indicator-label">总SKU数</div>
                        <div class="indicator-value" id="totalSku">0</div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-title">热销商品TOP10</div>
                <table class="rank-table" id="hotProductTable">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>商品名称</th>
                            <th>销售额</th>
                            <th>销量</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="col col-middle">
            <div class="panel">
                <div class="panel-title">月度销售趋势</div>
                <div class="chart-container" id="monthlyTrendChart"></div>
            </div>
            <div class="panel">
                <div class="panel-title">类目销售分布</div>
                <div class="chart-container" id="categoryChart"></div>
            </div>
        </div>
        <div class="col col-right">
            <div class="panel">
                <div class="panel-title">平台销售分布</div>
                <div class="chart-container" id="platformChart"></div>
            </div>
            <div class="panel">
                <div class="panel-title">价格带分布</div>
                <div class="chart-container sm-chart" id="priceBandChart"></div>
                <div class="panel-title">利润率分布</div>
                <div class="chart-container sm-chart" id="profitRateChart"></div>
            </div>
        </div>
    </div>

    <script>

_level":4,"sku_count":42,"total_gmv":298765432.12,"total_sales":134567},{"price_band_level":5,"sku_count":22,"total_gmv":138348047.47,"total_sales":43212}],"profit_rate_dist":[{"gmv_ratio":0.00,"range":"0-20%","sku_count":0},{"gmv_ratio":0.00,"range":"20%-40%","sku_count":0},{"gmv_ratio":100.00,"range":"40%-60%","sku_count":200},{"gmv_ratio":0.00,"range":"60%以上","sku_count":0}],"update_info":{"date_range":"2024-01-01至2024-12-31","latest_date":"2024-12-31","stat_time":"2025-01-01 10:00:00"}};

        function formatNumber(num, fixed = 2) {
            return num.toFixed(fixed).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function animateValue(id, target, suffix = "", fixed = 2) {
            const el = document.getElementById(id);
            let current = 0;
            const increment = target / 100;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                el.innerText = formatNumber(current, fixed) + suffix;
            }, 20);
        }

        animateValue("totalGmv", data.core_indicators.total_gmv, " 元");
        animateValue("totalSales", data.core_indicators.total_sales, "", 0);
        animateValue("totalProfit", data.core_indicators.total_profit, " 元");
        animateValue("avgPrice", data.core_indicators.avg_order_price, " 元");
        animateValue("avgProfitRate", data.core_indicators.avg_profit_rate, "%");
        animateValue("totalSku", data.core_indicators.total_sku, "", 0);

        const hotTbody = document.querySelector("#hotProductTable tbody");
        data.hot_product_top10.forEach((item, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><span class="rank-badge ${index < 3 ? 'top3' : ''}">${index + 1}</span></td>
                <td>${item.product_name}</td>
                <td>${formatNumber(item.revenue/10000, 1)}万</td>
                <td>${item.sales_volume}</td>
            `;
            hotTbody.appendChild(tr);
        });

        const monthlyChart = echarts.init(document.getElementById("monthlyTrendChart"));
        const monthlyOption = {
            tooltip: { trigger: "axis" },
            legend: {
                data: ["GMV", "销量", "利润"],
                textStyle: { color: "#8be1ff" },
                top: 0
            },
            grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
            xAxis: {
                type: "category",
                data: data.monthly_trend.map(item => item.month + "月"),
                axisLine: { lineStyle: { color: "rgba(0,210,255,0.3)" } },
                axisLabel: { color: "#8be1ff" }
            },
            yAxis: [
                {
                    type: "value",
                    name: "GMV/元",
                    axisLine: { lineStyle: { color: "rgba(0,210,255,0.3)" } },
                    axisLabel: { color: "#8be1ff" },
                    splitLine: { lineStyle: { color: "rgba(0,210,255,0.1)" } }
                },
                {
                    type: "value",
                    name: "销量/件",
                    axisLine: { lineStyle: { color: "rgba(0,210,255,0.3)" } },
                    axisLabel: { color: "#8be1ff" },
                    splitLine: { show: false }
                }
            ],
            series: [
                {
                    name: "GMV",
                    type: "line",
                    data: data.monthly_trend.map(item => item.gmv),
                    itemStyle: { color: "#00d2ff" },
                    lineStyle: { width: 3 },
                    smooth: true
                },
                {
                    name: "销量",
                    type: "line",
                    yAxisIndex: 1,
                    data: data.monthly_trend.map(item => item.sales),
                    itemStyle: { color: "#7CFC00" },
                    smooth: true
                },
                {
                    name: "利润",
                    type: "line",
                    data: data.monthly_trend.map(item => item.profit),
                    itemStyle: { color: "#FFD700" },
                    smooth: true
                }
            ]
        };
        monthlyChart.setOption(monthlyOption);

        const categoryChart = echarts.init(document.getElementById("categoryChart"));
        const categoryOption = {
            tooltip: { trigger: "item", formatter: "{b}: {c}元 ({d}%)" },
            legend: {
                orient: "vertical",
                right: 10,
                top: "center",
                textStyle: { color: "#8be1ff" }
            },
            series: [
                {
                    name: "类目销售额",
                    type: "pie",
                    radius: ["40%", "70%"],
                    center: ["35%", "50%"],
                    avoidLabelOverlap: false,
                    itemStyle: {

                        borderColor: "#051429",
                        borderWidth: 2
                    },
                    label: { show: false },
                    emphasis: {

                    },
                    data: data.category_dist.map(item => ({

                }

            },

            },
            series: [
                {
                    name: "销售额",
                    type: "bar",
                    barWidth: "60%",

            ]

        platformChart.setOption(platformOption);

        const priceBandChart = echarts.init(document.getElementById("priceBandChart"));
        const priceBandOption = {
            tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
            grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
            xAxis: {
                type: "category",
                data: ["0-50元", "50-100元", "100-300元", "300-1000元", "1000元以上"],
                axisLine: { lineStyle: { color: "rgba(0,210,255,0.3)" } },
                axisLabel: { color: "#8be1ff", fontSize: 12 }
            },
            yAxis: {
                type: "value",
                axisLine: { lineStyle: { color: "rgba(0,210,255,0.3)" } },
                axisLabel: { color: "#8be1ff", fontSize: 12 },
                splitLine: { lineStyle: { color: "rgba(0,210,255,0.1)" } }
            },
            series: [
                {
                    name: "销售额",
                    type: "bar",
                    barWidth: "60%",
                    itemStyle: { color: "#00d2ff" },
                    data: data.price_band_dist.map(item => item.total_gmv)
                }
            ]
        };
        priceBandChart.setOption(priceBandOption);

        const profitRateChart = echarts.init(document.getElementById("profitRateChart"));
        const profitRateOption = {
            tooltip: { trigger: "item", formatter: "{b}: {d}%" },
            legend: {
                bottom: 0,
                textStyle: { color: "#8be1ff", fontSize: 12 }
            },
            series: [
                {
                    name: "利润率分布",
                    type: "pie",
                    radius: ["40%", "70%"],
                    center: ["50%", "40%"],
                    itemStyle: {
                        borderColor: "#051429",
                        borderWidth: 2
                    },
                    label: { show: false },
                    data: data.profit_rate_dist.map((item, index) => ({
                        name: item.range,
                        value: item.gmv_ratio,
                        itemStyle: { color: `hsl(${180 + index * 60}, 100%, 50%)` }
                    }))
                }
            ]
        };
        profitRateChart.setOption(profitRateOption);

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById("currentTime").innerText = "当前时间：" + timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        document.getElementById("updateInfo").innerText = `数据统计范围：${data.update_info.date_range} | 最后更新时间：${data.update_info.stat_time}`;

        window.addEventListener("resize", () => {
            monthlyChart.resize();
            categoryChart.resize();
            platformChart.resize();
            priceBandChart.resize();
            profitRateChart.resize();
        });
    </script>
</body>
</html>
