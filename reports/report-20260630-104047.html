# 菜谱优化方案

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        /* 基础重置与变量定义 */
        :root {
            --primary-color: #e63946;
            --secondary-color: #ff9a8b;
            --accent-color: #2a9d8f;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-light: #718096;
            --bg-light: #f8f9fa;
            --bg-card: #ffffff;
            --border-radius: 12px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-light);
            padding: 20px;
            min-height: 100vh;
        }
        
        /* 响应式容器 */
        .recipe-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 主卡片设计 */
        .recipe-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            margin-bottom: 30px;
            transition: var(--transition);
        }
        
        .recipe-card:hover {
            box-shadow: var(--shadow-lg);
        }
        
        /* 头部区域 */
        .recipe-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 32px 32px 24px;
            position: relative;
        }
        
        .recipe-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .recipe-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }
        
        /* 描述区域 */
        .recipe-description {
            padding: 24px 32px;
            background-color: #fff9f9;
            border-bottom: 1px solid rgba(230, 57, 70, 0.1);
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        /* 内容区域 */
        .recipe-content {
            padding: 32px;
        }
        
        /* 区块标题 */
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: "";
            width: 6px;
            height: 24px;
            background-color: var(--accent-color);
            border-radius: 3px;
        }
        
        /* 食材网格 */
        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .ingredient-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            border: 1px solid #e9ecef;
        }
        
        .ingredient-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-sm);
            border-color: var(--accent-color);
        }
        
        .ingredient-quantity {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
            min-width: 50px;
        }
        
        .ingredient-name {
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }
        
        /* 营养信息 */
        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .nutrition-item {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 100%);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }
        
        .nutrition-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-sm);
        }
        
        .nutrition-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 4px;
        }
        
        .nutrition-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        
        /* 步骤列表 */
        .steps-container {
            counter-reset: step-counter;
        }
        
        .step-item {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid transparent;
            transition: var(--transition);
        }
        
        .step-item:hover {
            border-left-color: var(--accent-color);
            background: #f0f9ff;
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        
        .step-content {
            flex: 1;
            color: var(--text-secondary);
        }
        
        .step-content p {
            margin-bottom: 0;
        }
        
        /* 小贴士区域 */
        .tips-section {
            background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%);
            border-radius: 10px;
            padding: 24px;
            margin-top: 32px;
            border-left: 4px solid #ff9a8b;
        }
        
        .tips-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tips-title::before {
            content: "💡";
        }
        
        .tips-content {
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .recipe-header {
                padding: 24px 20px 20px;
            }
            
            .recipe-title {
                font-size: 1.8rem;
            }
            
            .recipe-content {
                padding: 24px 20px;
            }
            
            .ingredients-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .nutrition-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .step-item {
                flex-direction: column;
                gap: 12px;
            }
            
            .step-number {
                align-self: flex-start;
            }
        }
        
        @media (max-width: 480px) {
            .ingredients-grid {
                grid-template-columns: 1fr;
            }
            
            .nutrition-grid {
                grid-template-columns: 1fr;
            }
            
            .recipe-title {
                font-size: 1.6rem;
            }
        }
        
        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .recipe-card {
                box-shadow: none;
                margin: 0;
            }
            
            .recipe-header {
                background: white !important;
                color: black !important;
                border-bottom: 2px solid #333;
            }
            
            .ingredient-item:hover,
            .nutrition-item:hover,
            .step-item:hover {
                transform: none;
                box-shadow: none;
            }
        }
    </style>
</head>
