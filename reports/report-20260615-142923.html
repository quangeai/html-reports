```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经营数据可视化报告</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #F5F7FA;
            padding: 20px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
        }
        .kpi-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }
        .kpi-card {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
            position: relative;
            border-left: 4px solid;
        }
        .kpi-card.revenue {border-left-color: #4A90E9;}
        .kpi-card.cost {border-left-color: #9B9B9B;}
        .kpi-card.profit {border-left-color: #7ED321;}
        .kpi-card.rate {border-left-color: #F5A623;}
        .kpi-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .kpi-value {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }
        .order-info {
            position: absolute;
            top: -20px;
            right: 0;
            font-size: 14px;
            color: #999;
        }
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .chart-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 20px;
            height: 400px;
        }
        @media (max-width: 768px) {
            .kpi-container {
                flex-direction: column;
            }
            .charts-container {
                grid-template-columns: 1fr;
            }
            .order-info {
                position: static;
                text-align: right;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">经营数据可视化报告</h1>
        <div class="order-info">共30笔订单（排除2笔异常）</div>
        <div class="kpi-container">
            <div class="kpi-card revenue">
                <div class="kpi-label">总营收</div>
                <div class="kpi-value">¥103,201.00</div>
            </div>
            <div class="kpi-card cost">
                <div class="kpi-label">总成本</div>
                <div class="kpi-value">¥75,029.13</div>
            </div>
            <div class="kpi-card profit">
                <div class="kpi-label">总毛利</div>
                <div class="kpi-value">¥28,171.87</div>
            </div>
            <div class="kpi-card rate">
                <div class="kpi-label">平均毛利率</div>
                <div class="kpi-value">27.3%</div>
            </div>
        </div>
        <div class="charts-container">
            <div class="chart-card" id="monthChart"></div>
            <div class="chart-card" id="deptChart"></div>
            <div class="chart-card" id="categoryChart"></div>
            <div class="chart-card" id="customerTypeChart"></div>
            <div class="chart-card" id="paymentChart"></div>
            <div class="chart-card" id="customerRankChart"></div>
        </div>
    </div>
    <script>
        const formatter = (val) => '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
        // 月度趋势
        const monthChart = echarts.init(document.getElementById('monthChart'));
        monthChart.setOption({
            title: {text: '月度营收趋势', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'axis', valueFormatter: formatter},
            legend: {data: ['营收', '成本'], bottom: 10},
            xAxis: {type: 'category', data: ['1月', '2月', '3月']},
            yAxis: {type: 'value', axisLabel: {formatter: '¥{value}'}},
            series: [
                {
                    name: '营收',
                    type: 'line',
                    data: [34010.03, 26804.46, 42386.51],
                    lineStyle: {color: '#4A90E9', width: 2},
                    itemStyle: {color: '#4A90E9'},
                    areaStyle: {color: {type: 'linear', x: 0, y: 0, x2: 0, y2: 1, stops: [{offset: 0, color: 'rgba(74,144,233,0.3)'}, {offset: 1, color: 'rgba(74,144,233,0.05)'}]}}
                },
                {
                    name: '成本',
                    type: 'line',
                    data: [24029.82, 19637.88, 31361.43],
                    lineStyle: {color: '#9B9B9B', width: 2, type: 'dashed'},
                    itemStyle: {color: '#9B9B9B'}
                }
            ]
        });
        // 部门业绩
        const deptChart = echarts.init(document.getElementById('deptChart'));
        deptChart.setOption({
            title: {text: '部门营收对比', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'axis', valueFormatter: formatter},
            xAxis: {type: 'category', data: ['华东区', '西南区', '华南区', '华北区']},
            yAxis: {type: 'value', axisLabel: {formatter: '¥{value}'}},
            series: [{
                type: 'bar',
                data: [
                    {value: 36542.28, itemStyle: {color: '#4A90E9'}},
                    {value: 20759.94, itemStyle: {color: '#F5A623'}},
                    {value: 19520.19, itemStyle: {color: '#7ED321'}},
                    {value: 13378.59, itemStyle: {color: '#BD10E0'}}
                ],
                label: {show: true, position: 'top', formatter: formatter, fontSize: 12}
            }]
        });
        // 品类毛利
        const categoryChart = echarts.init(document.getElementById('categoryChart'));
        categoryChart.setOption({
            title: {text: '产品类别毛利占比', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)', valueFormatter: formatter},
            legend: {bottom: 10},
            graphic: {type: 'text', left: 'center', top: 'center', style: {text: '毛利占比', fontSize: 16, fontWeight: 'bold', fill: '#333'}},
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                label: {show: true, formatter: '{b}: {d}%'},
                data: [
                    {name: '生鲜', value: 7903.87},
                    {name: '日用品', value: 7631.66},
                    {name: '休闲食品', value: 7008.66},
                    {name: '饮料', value: 4627.68}
                ]
            }]
        });
        // 客户类型
        const customerTypeChart = echarts.init(document.getElementById('customerTypeChart'));
        customerTypeChart.setOption({
            title: {text: '客户类型营收分布', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)', valueFormatter: formatter},
            legend: {bottom: 10},
            graphic: {type: 'text', left: 'center', top: 'center', style: {text: '营收分布', fontSize: 16, fontWeight: 'bold', fill: '#333'}},
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                label: {show: true, formatter: '{b}: {d}%'},
                data: [
                    {name: '大客户', value: 44493.19},
                    {name: '新客户', value: 29820.19},
                    {name: '中小客户', value: 28887.62}
                ]
            }]
        });
        // 回款情况
        const paymentChart = echarts.init(document.getElementById('paymentChart'));
        paymentChart.setOption({
            title: {text: '回款状态统计', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'axis'},
            legend: {data: ['订单数', '回款金额'], bottom: 10},
            xAxis: {type: 'category', data: ['已回款', '部分回款', '未回款']},
            yAxis: [
                {type: 'value', name: '订单数', axisLabel: {formatter: '{value}笔'}},
                {type: 'value', name: '金额', axisLabel: {formatter: '¥{value}'}, position: 'right'}
            ],
            series: [
                {
                    name: '订单数',
                    type: 'bar',
                    yAxisIndex: 0,
                    data: [22, 4, 4],
                    itemStyle: {color: '#4A90E9'}
                },
                {
                    name: '回款金额',
                    type: 'line',
                    yAxisIndex: 1,
                    data: [84920.53, 10331.78, 7948.69],
                    itemStyle: {color: '#F5A623'},
                    lineStyle: {width: 2},
                    valueFormatter: formatter
                }
            ]
        });
        // 客户排名
        const customerRankChart = echarts.init(document.getElementById('customerRankChart'));
        customerRankChart.setOption({
            title: {text: 'Top10客户营收排名', left: 'center', textStyle: {fontSize: 16}},
            tooltip: {trigger: 'axis', valueFormatter: formatter},
            grid: {left: '30%'},
            xAxis: {type: 'value', axisLabel: {formatter: '¥{value}'}},
            yAxis: {
                type: 'category',
                data: ['永辉超市', '物美超市', '华润万家', '沃尔玛', '大润发', '盒马鲜生', '世纪联华', '家乐福', '家乐福', '麦德龙'].reverse(),
                axisLabel: {width: 80, overflow: 'truncate'}
            },
            series: [{
                type: 'bar',
                data: [2704.40, 2877.99, 7098.90, 7451.85, 7852.89, 8747.67, 13361.09, 18142.28, 18142.28, 18261.09].reverse(),
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                        {offset: 0, color: '#165DFF'},
                        {offset: 1, color: '#7BB6FF'}
                    ])
                },
                label: {show: true, position: 'right', formatter: formatter, fontSize: 12}
            }]
        });
        // 响应式
        window.addEventListener('resize', () => {
            monthChart.resize();
            deptChart.resize();
            categoryChart.resize();
            customerTypeChart.resize();
            paymentChart.resize();
            customerRankChart.resize();
        });
    </script>
</body>
</html>
