<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰姐 - 个人简历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .resume-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            min-height: 100vh;
        }

        /* 左侧边栏样式 */
        .sidebar {
            background: linear-gradient(135deg, #2c3e50 0%, #1a2530 100%);
            color: #ecf0f1;
            padding: 40px 30px;
        }

        .profile {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 25px;
            background: #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #3498db;
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 18px;
            color: #3498db;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .contact-info, .skills, .languages, .hobbies {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(52, 152, 219, 0.5);
            color: #3498db;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
            font-size: 18px;
        }

        .contact-item, .skill-item, .language-item, .hobby-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .contact-item i, .hobby-item i {
            width: 24px;
            margin-right: 12px;
            color: #3498db;
            text-align: center;
        }

        .skill-name {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .skill-bar {
            height: 8px;
            background: rgba(236, 240, 241, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .skill-level {
            height: 100%;
            background: #3498db;
            border-radius: 4px;
        }

        /* 右侧主内容区样式 */
        .main-content {
            padding: 40px 35px;
        }

        .about, .education, .experience, .projects {
            margin-bottom: 40px;
        }

        .main-section-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
            display: flex;
            align-items: center;
        }

        .main-section-title i {
            margin-right: 12px;
            color: #3498db;
        }

        .about-text {
            font-size: 16px;
            text-align: justify;
            color: #555;
        }

        .highlight {
            background-color: #e3f2fd;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
            color: #1565c0;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline:before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3498db;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -33px;
            top: 5px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #3498db;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #3498db;
        }

        .timeline-date {
            font-size: 15px;
            color: #3498db;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 19px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .timeline-subtitle {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: 500;
            margin-bottom: 10px;
            font-style: italic;
        }

        .timeline-desc {
            font-size: 15px;
            color: #555;
        }

        .achievement {
            color: #27ae60;
            font-weight: 600;
            background-color: #e8f6ef;
            padding: 3px 8px;
            border-radius: 3px;
            margin-top: 8px;
            display: inline-block;
        }

        .project-list {
            list-style-type: none;
        }

        .project-list li {
            margin-bottom: 15px;
            padding-left: 20px;
            position: relative;
        }

        .project-list li:before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #3498db;
            font-weight: bold;
        }

        .project-highlight {
            color: #e74c3c;
            font-weight: 600;
        }

        footer {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #7f8c8d;
            border-top: 1px solid #eee;
            background: #f9f9f9;
        }

        @media (max-width: 900px) {
            .resume-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                padding: 30px 20px;
            }
        }
    </style>
</head>
