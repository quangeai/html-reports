    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .knowledge-card {
            width: 100%;
            max-width: 700px;
            background-color: #ffffff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 82, 163, 0.08);
            overflow: hidden;
            border: 1px solid #eef2f7;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 82, 163, 0.12);
        }

        .card-header {
            background: linear-gradient(135deg, #2c80ff, #5a9cff);
            color: white;
            padding: 25px 30px;
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-title i {
            font-size: 1.6rem;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        .card-subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 400;
            margin-left: 55px;
        }

        .card-body {
            padding: 30px;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a5fb4;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e8f1fd;
        }

        .section-title i {
            color: #2c80ff;
        }

        .definition-box {
            background-color: #f0f7ff;
            border-left: 4px solid #2c80ff;
            padding: 18px 20px;
            border-radius: 0 10px 10px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #333;
        }

        .key-points {
            list-style: none;
        }

        .key-points li {
            padding: 12px 0 12px 35px;
            position: relative;
            line-height: 1.5;
            color: #444;
        }

        .key-points li::before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 12px;
            color: #2c80ff;
            background-color: #e8f1fd;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .key-points li strong {
            color: #1a5fb4;
        }

        .supplement-box {
            background-color: #fff9e6;
            border: 1px dashed #ffc107;
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
            position: relative;
        }

        .supplement-box::before {
            content: '\f05a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: -12px;
            left: 20px;
            background-color: #fff9e6;
            color: #e6a700;
            padding: 0 8px;

            font-size: 0.85rem;
            color: #666;
        }

        .tag {
            background-color: #e8f1fd;
            color: #2c80ff;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .card-header, .card-body, .card-footer {
                padding: 20px;
            }

            .card-title {
                font-size: 1.5rem;

                padding: 8px;
            }

            .key-points li {
                padding-left: 30px;
            }
        }
    </style>
</head>
