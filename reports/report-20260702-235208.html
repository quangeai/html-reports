<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>知识卡片：积极心理学</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .knowledge-card {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 100, 0.08);
            overflow: hidden;
            border: 1px solid #eef2f8;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 150, 0.12);
        }

        .card-header {
            background: linear-gradient(135deg, #4a6fa5, #2c5282);
            color: white;
            padding: 25px 30px;
            position: relative;
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 i {
            font-size: 1.6rem;
            color: #c3dafe;
        }

        .card-header .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card-body {
            padding: 30px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section:last-of-type {
            margin-bottom: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d3748;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }

        .section-title i {
            color: #4a6fa5;
        }

        .definition {
            background-color: #f8fafc;
            border-left: 4px solid #4a6fa5;
            padding: 18px 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2d3748;
        }

        .key-points {
            list-style: none;
        }

        .key-points li {
            padding: 12px 0 12px 35px;
            position: relative;
            line-height: 1.5;
            color: #4a5568;
            border-bottom: 1px dashed #e2e8f0;
        }

        .key-points li:last-child {
            border-bottom: none;
        }

        .key-points li:before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 12px;
            color: #38a169;
            background-color: #e6fffa;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .supplement {
            background-color: #fffaf0;
            border: 1px solid #fed7d7;
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }

        .supplement:before {
            content: '\f05a';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: -12px;
            top: -12px;
            background: #ed8936;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .supplement p {
            color: #744210;
            line-height: 1.6;
            font-style: italic;
            margin-left: 10px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .tag {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tag i {
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .knowledge-card {
                border-radius: 14px;
            }

            .card-header {
                padding: 20px;
            }

            .card-header h2 {
                font-size: 1.5rem;
            }

            .card-body {
                padding: 20px;
            }

            .section {
                margin-bottom: 22px;
            }

            .definition {
                padding: 15px;
                font-size: 1rem;
            }

            .key-points li {
                padding-left: 30px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .card-header h2 {
                font-size: 1.3rem;
            }

            .section-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

            <div class="tag-container">
                <span class="tag"><i class="fas fa-heart"></i> 心理健康</span>
                <span class="tag"><i class="fas fa-smile"></i> 幸福感</span>
                <span class="tag"><i class="fas fa-chart-line"></i> 个人成长</span>
                <span class="tag"><i class="fas fa-hands-helping"></i> 应用科学</span>
            </div>
        </main>
    </div>
</body>
