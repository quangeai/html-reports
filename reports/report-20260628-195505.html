    let sourceData = {};
    // 容错解析JSON，避免数据格式错误导致页面崩溃
    try {
        sourceData = JSON.parse(rawJsonStr || "{}");
    } catch (parseErr) {
        console.error("数据源解析失败，请检查JSON格式：", parseErr);
        sourceData = {};
    }

    // ===================== 全局工具函数（修复原代码缺失方法） =====================
    // 快速获取DOM元素
    const getDom = (id) => document.getElementById(id);
    // 数字千分位格式化
    const formatNum = (val) => isNaN(Number(val)) ? val : Number(val).toLocaleString();
    // 表头中文映射字典
    const fieldDict = {
        month: "月份", phase: "阶段", m: "环比", exposure: "曝光量", visit: "访问数", click: "点击量",
        ctr: "点击率", total: "总计", total_sales: "总销售额(元)", total_payments: "成交笔数",
        avg_price: "客单价", avg_conversion_rate: "转化率", order_count: "订单量", pay_count: "支付人数",
        consult: "咨询", online_order: "线上单", phone: "电话", group_order: "团购", shop_order: "到店",
        leads_data: "客商增长", traffic_data: "流量增长"
    };
    // 通用表格渲染函数
    const renderTable = (tableId, dataList) => {
        const tableDom = getDom(tableId);
        if (!tableDom || !Array.isArray(dataList) || dataList.length === 0) return;
        const fieldKeys = Object.keys(dataList[0]).sort((a, b) => {
            if (a === "month" || a === "月份") return -1;
            if (b === "month" || b === "月份") return 1;
            return 0;
        });
        // 拼接表头
        let html = `<thead class="table-light"><tr>`;
        fieldKeys.forEach(key => html += `<th>${fieldDict[key] || key}</th>`);
        html += `</tr></thead><tbody>`;
        // 拼接表体
        dataList.forEach(row => {
            html += `<tr>`;
            fieldKeys.forEach(key => html += `<td>${formatNum(row[key])}</td>`);
            html += `</tr>`;
        });
        html += `</tbody>`;
        tableDom.innerHTML = html;
    };
    // 通用图表渲染封装
    const renderChart = (canvasId, chartType, labels, datasets) => {
        const canvasDom = getDom(canvasId);
        if (!canvasDom || !labels || !datasets) return;
        const colorPalette = ['#0d6efd', '#fd7e14', '#6f42c1', '#20c997', '#ffc107'];
        new Chart(canvasDom, {
            type: chartType,
            data: { labels, datasets },
            options: {
                maintainAspectRatio: false,
                responsive: true,
                plugins: { legend: { position: "bottom" } },
                elements: { line: { tension: 0.4 } }
            }
        });
    };

    // ===================== 1. 填充顶部结论卡片 =====================
    const conclusionList = sourceData.conclusions || [];
    conclusionList.forEach((text, index) => {
        const dom = getDom(`c${index + 1}`);
        if (dom) dom.textContent = text;
    });

    // ===================== 2. 填充优化策略卡片 =====================
    const strategyWrap = getDom("strategy-container");
    const strategyList = sourceData.strategies || [];
    let strategyHtml = "";
    strategyList.forEach(item => {
        strategyHtml += `
            <div class="col">
                <div class="card p-4 h-100 border-top-4 border-success">
                    <b class="text-success">${item.title || ""}</b>
                    <p class="small text-muted m-0 mt-2">${item.content || ""}</p>
                </div>
            </div>
        `;
    });
    strategyWrap.innerHTML = strategyHtml;

    // ===================== 3. 渲染趋势折线图 + 趋势明细表 =====================
    const trafficData = sourceData.traffic_analysis || {};
    const leadsData = sourceData.leads_analysis || {};
    if (trafficData.labels) {
        renderChart("line-chart", "line", trafficData.labels, [
            { label: "曝光量", data: trafficData.data || [], borderColor: "#0d6efd", backgroundColor: "#0d6efd1a", fill: true },
            { label: "访问量", data: leadsData.visit_data || [], borderColor: "#fd7e14", backgroundColor: "#fd7e141a", fill: true }
        ]);
    }
    renderTable("table-trend", trafficData.table_rows || []);

    // ===================== 4. 渲染柱状图 =====================
    if (leadsData.labels) {
        renderChart("bar-chart", "bar", leadsData.labels, [
            { label: "留资总量", data: leadsData.total_leads_data || [], backgroundColor: "#6f42c199" }
        ]);
    }

    // ===================== 5. 渲染环形饼图 =====================
    const pieData = sourceData.pie_chart || {};
    if (pieData.labels && pieData.data) {
        renderChart("pie-chart", "doughnut", pieData.labels, [{ 
            data: pieData.data, 
            backgroundColor: ['#0d6efd','#fd7e14','#6f42c1','#20c997'],
            borderWidth: 0
        }]);
    }

    // ===================== 6. 渲染全量数据总表 =====================
    renderTable("table-full", trafficData.table_rows || []);
});
</script>

</html>
