<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年端午节放假通知</title>
    <style>
        body {
            width: 210mm;
            margin: 0 auto;
            padding: 20mm;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22pt;
            font-family: "小标宋简体", "SimSun", "NSimSun", serif;
            line-height: 32pt;
            text-align: center;
            margin-bottom: 28pt;
        }
        p {
            font-size: 16pt;
            font-family: "FangSong", "仿宋", serif;
            line-height: 28pt;
            margin: 14pt 0;
            text-align: left;
        }
        .text-indent {
            text-indent: 2em;
        }
        .signature {
            text-align: right;
            text-indent: 0;
        }
        button {
            margin-bottom: 20pt;
            padding: 8pt 16pt;
            font-size: 14pt;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button onclick="exportToWord()">导出为Word文档</button>
    <h1>关于2026年端午节放假安排的通知</h1>
    <p>根据国务院办公厅关于2026年部分节假日安排的通知精神，结合公司实际情况，现将2026年端午节放假安排通知如下：</p>
    <p class="text-indent">2026年端午节放假时间为6月20日（星期五）至6月22日（星期日），共3天。6月23日（星期一）正常上班。</p>
    <p class="text-indent">放假期间，请各部门妥善安排好值班和安全、保卫等工作，遇有重大突发事件，要按规定及时报告并妥善处置，确保全体员工度过一个平安祥和的节日。</p>
    <p class="signature">XX公司人力资源部</p>
    <p class="signature">2026年5月20日</p>

    <script>
        function exportToWord() {
            const pageContent = document.body.innerHTML.split('<button')[0];
            const fullContent = `
                <!DOCTYPE html>
                <html lang="zh-CN">
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body {
                            width: 210mm;
                            margin: 0 auto;
                            padding: 20mm;
                            box-sizing: border-box;
                        }
                        h1 {
                            font-size: 22pt;
                            font-family: "小标宋简体", "SimSun", "NSimSun", serif;
                            line-height: 32pt;
                            text-align: center;
                            margin-bottom: 28pt;
                        }
                        p {
                            font-size: 16pt;
                            font-family: "FangSong", "仿宋", serif;
                            line-height: 28pt;
                            margin: 14pt 0;
                            text-align: left;
                        }
                        .text-indent {
                            text-indent: 2em;
                        }
                        .signature {
                            text-align: right;
                            text-indent: 0;
                        }
                    </style>
                </head>
                <body>${pageContent}</body>
                </html>
            `;
            const blob = new Blob([fullContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '2026年端午节放假通知.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
