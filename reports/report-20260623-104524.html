<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据分析报告</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
body{background:#f7f8fc;font-family:apple-system,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#333;padding:2.5rem;text-align:center;border-radius:0 0 24px 24px;margin-bottom:3rem}
.sec-title{font-weight:700;color:#2c3e50;margin-bottom:1.5rem;padding-left:12px;margin:2.5rem 0 1.5rem;font-size:21px}
.card{border:none;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.05);background:#fff;transition:.3s;height:100%}
.card:hover{transform:translateY(-3px)}
.tip{position:relative;height:320px;width:100%}
.TW{height:320px;overflow-y:auto;padding-right:5px}
table thead th{position:sticky;top:0;background:#f8f9fa;white-space:nowrap}
</style>
</head>
<body>
<h1>📊 经营数据洞察报告</h1>
<div class="container">
  <h2 class="sec-title">一、数据分析结论</h2>
  <div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col">
      <div class="card p-4 border-top border-4 border-primary h-100">
        <h6 class="text-primary fw-bold mb-2">核心结果</h6>
        <div id="leads_summary" class="fs-5 text-dark mb-1"></div>
        <p id="leads_data" class="small text-muted m-0"></p >
      </div>
    </div>
    <div class="col">
      <div class="card p-4 border-top border-4 border-warning h-100">
        <h6 class="text-warning fw-bold mb-2">榜单亮点</h6>
        <div id="rank_name" class="fs-5 text-dark mb-1"></div>
        <p id="rank_summary" class="small text-muted m-0"></p >
      </div>
    </div>
    <div class="col">
      <div class="card p-4 border-top border-4 border-info h-100">
        <h6 class="text-info fw-bold mb-2">过程指标</h6>
        <div id="traffic_summary" class="fs-5 text-dark mb-1"></div>
        <p id="traffic_data" class="small text-muted m-0"></p >
      </div>
    </div>
  </div>

  <h2 class="sec-title">二、优化提升策略</h2>
  <div id="strategies_wrap" class="row row-cols-1 row-cols-md-3 g-4"></div>

  <h3 class="sec-title">三、数据趋势及明细</h3>
  <div class="card p-3 mb-4">
    <h6 class="fw-bold mb-3 ps-2 border-start border-3 border-primary">1. 过程指标趋势</h6>
    <div class="row g-4 align-items-stretch">
      <div class="col-md-6"><div class="tip"><canvas id="cv1"></canvas></div></div>
      <div class="col-md-6">
        <div class="TW">
          <table class="table table-sm table-hover text-nowrap" id="traffic_table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="card p-3 mb-4">
    <h6 class="fw-bold mb-3 ps-2 border-start border-3 border-purple">2. 结果指标趋势</h6>
    <div class="row g-4 align-items-stretch">
      <div class="col-md-6"><div class="tip"><canvas id="cv2"></canvas></div></div>
      <div class="col-md-6"><div class="tip"><canvas id="cv3"></canvas></div></div>
      <div class="col-md-6">
        <div class="TW">
          <table class="table table-sm table-hover text-nowrap" id="leads_table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <h6 class="fw-bold mb-3 ps-2 border-start border-3 border-dark">3. 全景数据明细表</h6>
  <div class="TW"><table class="table table-striped table-hover text-nowrap" id="full_table"></table></div>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const d = {"conclusions":{"leads_data":"优秀宿舍4间占比11.11%，合格宿舍26间占比72.22%，不合格宿舍6间占比16.67%","leads_summary":"整体宿舍合规率较高，无大功率电器、明火等高危违纪，问题集中在低风险违规项","rank_name":"优秀宿舍管理标兵辅导员","rank_summary":"张慧颖、解欣宇管辖宿舍优秀率并列最高，不合格率仅为9%-11%，高海宽管辖宿舍不合格数量最多","traffic_data":"覆盖5层、6层2个楼层，4名辅导员管辖范围，共发现6间问题宿舍","traffic_summary":"本次共完成燕苑楼宇36间学生宿舍的卫生状况、违纪事项全覆盖排查"},"leads_analysis":{"labels":["2025-05-16"],"pie_chart":{"data":[5,1],"labels":["悬挂床帷","垃圾堆放"]},"table_rows":[{"counselor":"王超","room_number":"502","score":"不合格","violation":"垃圾堆放"},{"counselor":"高海宽","room_number":"503","score":"不合格","violation":"5号床围"},{"counselor":"高海宽","room_number":"504","score":"不合格","violation":"3，4号床围"},{"counselor":"高海宽","room_number":"604","score":"不合格","violation":"2号床围"},{"counselor":"张慧颖","room_number":"613","score":"不合格","violation":"4，5号床围"},{"counselor":"解欣宇","room_number":"621","score":"不合格","violation":"3号床围"}],"total_leads_data":[30]},"strategies":[{"content":"针对占比83.33%的床帷类违纪，组织全楼层消防安全宣讲，明确床帷遮挡消防隐患的危害，要求5间涉事宿舍3日内完成整改，复查合格后更新评分","title":"专项整治悬挂床帷违规行为"},{"content":"针对高海宽辅导员管辖的3间不合格宿舍，将每周查宿频次提升至2次，联合辅导员开展宿舍安全约谈，督促提升卫生及合规意识","title":"强化高风险宿舍督导"},{"content":"将4间优秀宿舍设为卫生规范样板，组织全体宿舍长参观学习，给予优秀宿舍成员综测加分、文明宿舍优先参评资格等奖励，发挥正向引导作用","title":"推广优秀宿舍标杆效应"}],"traffic_analysis":{"exposure_data":[36],"labels":["2025-05-16"],"table_rows":[{"date":"2025-05-16","exposure":36,"problem_rate":"16.67%","visit":6}],"visit_data":[6]}};
  const { conclusions, strategies, traffic_analysis, leads_analysis } = d;
  const { traffic_summary, traffic_data, leads_summary, leads_data, rank_summary, rank_name } = conclusions;
  const { labels: tlabels, exposure_data, visit_data, table_rows: tt_rows } = traffic_analysis;
  const { labels: llabels, total_leads_data, pie_chart, table_rows: lt_rows } = leads_analysis;

  // 填充结论卡片
  document.getElementById('leads_summary').innerText = leads_summary;
  document.getElementById('leads_data').innerText = leads_data;
  document.getElementById('rank_name').innerText = rank_name;
  document.getElementById('rank_summary').innerText = rank_summary;
  document.getElementById('traffic_summary').innerText = traffic_summary;
  document.getElementById('traffic_data').innerText = traffic_data;

  // 填充策略卡片
  document.getElementById('strategies_wrap').innerHTML = strategies.map(item => `
    <div class="col">
      <div class="card p-4 h-100 border-top border-4 border-info">
        <h5>${item.title}</h5>
        <p class="small text-muted m-0 mt-2">${item.content}</p>
      </div>
    </div>
  `).join('');

  // 过程指标趋势图表
  new Chart(document.getElementById('cv1'), {
    type: 'bar',
    data: {
      labels: tlabels,
      datasets: [
        { label: '排查宿舍数', data: exposure_data, backgroundColor: '#3498db' },
        { label: '问题宿舍数', data: visit_data, backgroundColor: '#e74c3c' }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
  });

  // 过程指标表格
  const trafficThead = document.querySelector('#traffic_table thead');
  trafficThead.innerHTML = '<tr><th>日期</th><th>排查总数</th><th>问题宿舍数</th><th>问题率</th></tr>';
  const trafficTbody = document.querySelector('#traffic_table tbody');
  trafficTbody.innerHTML = tt_rows.map(row => `
    <tr>
      <td>${row.date}</td>
      <td>${row.exposure}</td>
      <td>${row.visit}</td>
      <td>${row.problem_rate}</td>
    </tr>
  `).join('');

  // 结果指标趋势-合格宿舍数
  new Chart(document.getElementById('cv2'), {
    type: 'line',
    data: {
      labels: llabels,
      datasets: [{ label: '合格宿舍数', data: total_leads_data, borderColor: '#2ecc71', tension: 0.3 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
  });

  // 结果指标趋势-违规类型占比
  new Chart(document.getElementById('cv3'), {
    type: 'pie',
    data: {
      labels: pie_chart.labels,
      datasets: [{ data: pie_chart.data, backgroundColor: ['#f39c12', '#9b59b6'] }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });

  // 结果指标表格
  const leadsThead = document.querySelector('#leads_table thead');
  leadsThead.innerHTML = '<tr><th>辅导员</th><th>宿舍号</th><th>评分</th><th>违规事项</th></tr>';
  const leadsTbody = document.querySelector('#leads_table tbody');
  leadsTbody.innerHTML = lt_rows.map(row => `
    <tr>
      <td>${row.counselor}</td>
      <td>${row.room_number}</td>
      <td>${row.score}</td>
      <td>${row.violation}</td>
    </tr>
  `).join('');

  // 全景数据明细表
  const fullTable = document.getElementById('full_table');
  const fullHeaders = ['日期','辅导员','宿舍号','评分','违规事项','排查总数','问题率'];
  fullTable.innerHTML = `<thead><tr>${fullHeaders.map(h => `<th>${h}</th>`).join('')}</tr></thead>`;
  const fullRows = lt_rows.map(row => ({
    date: tlabels[0],
    counselor: row.counselor,
    room_number: row.room_number,
    score: row.score,
    violation: row.violation,
    exposure: tt_rows[0].exposure,
    problem_rate: tt_rows[0].problem_rate
  }));
  fullTable.innerHTML += `<tbody>${fullRows.map(r => `<tr>${fullHeaders.map(h => `<td>${r[h]}</td>`).join('')}</tr>`).join('')}</tbody>`;
});
</script>
</body>
</html>
