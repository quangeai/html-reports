<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室手卫生数据统计分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 20px;
            background-color: #f5f8fa;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .chart-box {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 18px;
        }
        .summary {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #1f77b4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center;">科室手卫生数据统计分析</h1>
        
        <div class="chart-box">
            <h2>护士平均分排名柱状图</h2>
            <div id="scoreBar" style="width:100%; height:400px;" class="no-data">暂无有效打分数据</div>
        </div>

        <div class="chart-box">
            <h2>低分反馈问题分布饼图</h2>
            <div id="problemPie" style="width:100%; height:400px;" class="no-data">暂无低分反馈数据</div>
        </div>

        <div class="summary">
            <h3>数据汇总与整改建议</h3>
            <p>当前无有效手卫生打分数据，无法统计科室平均分、最高分/最低分及相关整改建议，请导入完整的患者打分表或医疗督查打分表后重试。</p>
        </div>
    </div>

    <script>
        // 初始化空图表
        var scoreBarChart = echarts.init(document.getElementById('scoreBar'));
        scoreBarChart.setOption({
            title: { text: '暂无数据', left: 'center', textStyle: { color: '#999' } },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: [] },
            yAxis: { type: 'value' },
            series: [{ type: 'bar', data: [] }]
        });

        var problemPieChart = echarts.init(document.getElementById('problemPie'));
        problemPieChart.setOption({
            title: { text: '暂无数据', left: 'center', textStyle: { color: '#999' } },
            tooltip: { trigger: 'item' },
            series: [{ type: 'pie', radius: ['40%', '70%'], data: [] }]
        });

        // 窗口大小适配
        window.addEventListener('resize', function() {
            scoreBarChart.resize();
            problemPieChart.resize();
        });
    </script>
</body>
</html>
