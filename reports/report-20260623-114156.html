<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>销售额 分布直方图</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
    }
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }
    .chart-wrap {
      width: 100%;
      max-width: 900px;
      padding: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
      transition: all 0.3s ease;
    }
    .chart-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .chart-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #111827;
      letter-spacing: 0.5px;
    }
    .chart-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0;
    }
    .chart-box {
      position: relative;
      height: 480px;
      width: 100%;
    }
    .chart-footer {
      margin-top: 24px;
      text-align: right;
      font-size: 0.75rem;
      color: #9ca3af;
      border-top: 1px solid var(--border-color);
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="chart-wrap">
    <div class="chart-header">
      <h2 class="chart-title">销售额 分布直方图</h2>
      <p class="chart-subtitle">StatMaster 智能分析实训结果</p>
    </div>
    <div class="chart-box">
      <canvas id="statmasterChart"></canvas>
    </div>
    <div class="chart-footer">
      Generated by StatMaster AI • 数据可视化引擎
    </div>
  </div>
  <script>
    const chartConfig = {"type": "bar", "data": {"labels": ["2.0~2.8", "2.8~3.5", "3.5~4.2", "4.2~5.0"], "datasets": [{"label": "频数", "data": [1, 0, 2, 2], "backgroundColor": "rgba(16, 185, 129, 0.7)", "borderColor": "#059669", "borderWidth": 1, "borderRadius": 4, "barPercentage": 0.9, "categoryPercentage": 0.95}]}, "options": {"responsive": true, "maintainAspectRatio": false, "interaction": {"mode": "index", "intersect": false}, "plugins": {"title": {"display": false}, "legend": {"display": true, "position": "top", "labels": {"usePointStyle": true, "padding": 20, "font": {"size": 13, "family": "'Microsoft YaHei', sans-serif"}}}, "tooltip": {"backgroundColor": "rgba(17, 24, 39, 0.85)", "titleFont": {"size": 14, "family": "'Microsoft YaHei', sans-serif"}, "bodyFont": {"size": 13, "family": "'Microsoft YaHei', sans-serif"}, "padding": 12, "cornerRadius": 8, "displayColors": true}}, "scales": {"x": {"title": {"display": true, "text": "销售额", "font": {"weight": "bold", "size": 14}}, "grid": {"display": false}, "ticks": {"font": {"family": "'Microsoft YaHei', sans-serif"}}}, "y": {"title": {"display": true, "text": "频数", "font": {"weight": "bold", "size": 14}}, "grid": {"color": "rgba(0,0,0,0.06)", "borderDash": [5, 5]}, "beginAtZero": true, "ticks": {"font": {"family": "'Microsoft YaHei', sans-serif"}}}}}};
    const ctx = document.getElementById('statmasterChart');
    new Chart(ctx, chartConfig);
  </script>
</body>
</html>
