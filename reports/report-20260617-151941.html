```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室手卫生评价统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f0f8ff;
            margin: 20px;
            padding: 0;
        }
        .chart-container {
            width: 100%;
            height: 400px;
            margin-bottom: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 10px;
            box-sizing: border-box;
        }
        .summary {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary h3 {
            color: #2c6e91;
            margin-top: 0;
        }
        .suggestion-item {
            margin: 10px 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="chart-container" id="barChart"></div>
    <div class="chart-container" id="pieChart"></div>
    <div class="summary">
        <h3>科室手卫生评价汇总</h3>
        <p id="avgScore"></p>
        <p id="extremeScores"></p>
        <h4>低分问题整改建议</h4>
        <div id="suggestions"></div>
    </div>

    <script>
        // ---------------------- 替换此处为真实原始数据 ----------------------
        const rawData = [
            { nurseName: "张护士", score: 85, problems: ["未按七步洗手法操作"] },
            { nurseName: "李护士", score: 90, problems: [] },
            { nurseName: "王护士", score: 75, problems: ["接触患者后未洗手", "戴手套前未洗手"] },
            { nurseName: "刘护士", score: 80, problems: ["洗手时间不足"] },
            { nurseName: "赵护士", score: 92, problems: [] },
            { nurseName: "陈护士", score: 70, problems: ["未按七步洗手法操作", "洗手时间不足"] }
        ];
        // -----------------------------------------------------------------

        // 统计护士平均分排名数据（此处单次打分即为平均分）
        const nurseScoreData = rawData.map(item => ({
            name: item.nurseName,
            score: item.score
        })).sort((a, b) => b.score - a.score);

        // 统计低分问题频次
        const problemCount = {};
        rawData.forEach(item => {
            item.problems.forEach(problem => {
                if (problemCount[problem]) {
                    problemCount[problem]++;
                } else {
                    problemCount[problem] = 1;
                }
            });
        });
        const problemData = Object.entries(problemCount).map(([name, value]) => ({
            name,
            value
        }));

        // 计算科室平均分
        const totalScore = rawData.reduce((sum, item) => sum + item.score, 0);
        const avgScore = (totalScore / rawData.length).toFixed(1);

        // 找出最高分和最低分护士
        const maxNurse = nurseScoreData[0];
        const minNurse = nurseScoreData[nurseScoreData.length - 1];

        // 问题整改建议映射
        const suggestionMap = {
            "未按七步洗手法操作": "组织全员开展七步洗手法实操培训，每周进行现场考核，确保人人掌握标准流程；在洗手池旁张贴七步洗手法示意图，强化视觉提醒。",
            "洗手时间不足": "在洗手池旁设置洗手时长提示牌（建议不少于20秒），督查人员重点关注洗手时长，对不达标的护士及时纠正；采用计时洗手歌辅助规范洗手时间。",
            "接触患者后未洗手": "强调诊疗前后手卫生核心规范，增加科室督查频次，将接触患者后手卫生执行情况纳入个人绩效考核；在诊疗区域张贴手卫生触发点提示标识。",
            "戴手套前未洗手": "开展专项培训，明确戴手套前必须洗手的规范要求，督查时重点检查操作前手卫生流程；制作“戴手套先洗手”警示标识粘贴在手套存放处。"
        };

        // 初始化柱状图
        const barChart = echarts.init(document.getElementById('barChart'));
        const barOption = {
            title: { text: '护士平均分排名柱状图', left: 'center', textStyle: { color: '#2c6e91' } },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: {
                type: 'category',
                data: nurseScoreData.map(item => item.name),
                axisLabel: { interval: 0, rotate: 30 }
            },
            yAxis: { type: 'value', min: 60, max: 100 },
            series: [{
                name: '平均分',
                type: 'bar',
                data: nurseScoreData.map(item => item.score),
                itemStyle: { color: '#5ab1ef' }
            }]
        };
        barChart.setOption(barOption);

        // 初始化饼图
        const pieChart = echarts.init(document.getElementById('pieChart'));
        const pieOption = {
            title: { text: '低分反馈问题分布饼图', left: 'center', textStyle: { color: '#2c6e91' } },
            tooltip: { trigger: 'item', formatter: '{b}: {c}次 ({d}%)' },
            series: [{
                name: '问题频次',
                type: 'pie',
                radius: ['40%', '70%'],
                data: problemData,
                itemStyle: {
                    color: function(params) {
                        const colors = ['#5ab1ef', '#b6e880', '#ffd591', '#ffa39e'];
                        return colors[params.dataIndex % colors.length];
                    }
                }
            }]
        };
        pieChart.setOption(pieOption);

        // 适配窗口大小变化
        window.addEventListener('resize', () => {
            barChart.resize();
            pieChart.resize();
        });

        // 填充汇总信息
        document.getElementById('avgScore').innerHTML = `科室整体平均分：<strong>${avgScore}</strong>分`;
        document.getElementById('extremeScores').innerHTML = `最高分护士：${maxNurse.name}（${maxNurse.score}分）；最低分护士：${minNurse.name}（${minNurse.score}分）`;

        const suggestionsDiv = document.getElementById('suggestions');
        Object.keys(problemCount).forEach(problem => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.innerHTML = `<strong>${problem}（${problemCount[problem]}次）</strong>：${suggestionMap[problem] || "请根据实际情况制定针对性整改措施"}`;
            suggestionsDiv.appendChild(item);
        });
    </script>
</body>
</html>
```
