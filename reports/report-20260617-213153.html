<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试用例集生成提示</title>
    <style>
        body { font-family: "Microsoft YaHei", Arial, sans-serif; margin: 30px; }
        h1 { color: #2c3e50; text-align: center; }
        .prompt-container { background-color: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid #3498db; margin-top: 20px; }
        .prompt-container p { font-size: 16px; color: #34495e; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>测试用例集生成提示</h1>
    <div class="prompt-container">
        <p>请提供具体的需求文档内容（如功能描述、业务规则、输入输出约束等信息），我将根据需求分析测试场景并生成对应的测试用例集页面。</p>
        <p>例如：用户登录功能需求，支持手机号/邮箱登录，密码长度6-16位，错误登录3次锁定账户5分钟...</p>
    </div>
</body>
</html>
