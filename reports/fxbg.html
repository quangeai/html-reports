<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度财务数据分析报告</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .report-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            border: none;
            border-radius: 10px;
        }
        .card-header {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border-radius: 10px 10px 0 0 !important;
            font-weight: 600;
        }
        .metric-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }
        .metric-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .insight-box {
            background-color: #e8f4f8;
            border-left: 4px solid #3498db;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 0 5px 5px 0;
        }
        .warning-box {
            background-color: #fcf3e8;
            border-left: 4px solid #f39c12;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 0 5px 5px 0;
        }
    </style>
</head>
<body>
    <div class="report-header">
        <div class="container">
            <h1 class="display-4">月度财务数据分析报告</h1>
            <p class="lead">2021年度财务指标趋势分析与商业洞察</p>
        </div>
    </div>

    <div class="container">
        <!-- 执行摘要 -->
        <section class="mb-5">
            <div class="card">
                <div class="card-header">
                    <h4>执行摘要</h4>
                </div>
                <div class="card-body">
                    <p>本报告对2021年度12个月的财务数据进行了全面分析，主要发现如下：</p>
                    <ul>
                        <li>全年累计主营业务收入 <strong>647,721,132 元</strong>，12月份收入占全年总收入的38.3%，呈现明显的年末冲量特征</li>
                        <li>平均毛利率为 <strong>40.83%</strong>，整体盈利水平良好，但月度波动较大</li>
                        <li>销售费用存在异常波动，10月份销售费率高达68.8%，明显偏高，需要重点关注</li>
                        <li>年底毛利率显著提升，12月份达到59.46%，为全年最高水平</li>
                    </ul
