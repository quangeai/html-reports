<script>
document.addEventListener("DOMContentLoaded", () => {
    const rawJsonStr = `{"conclusions":["2025年1-6月电商获客全链路数据连续6月环比增长，总成交金额达326.55万元，月均复合增长率达42.8%","各渠道、各产品转化效率稳定，曝光-访问-点击-留资-成交的全链路转化率维持在1.2%-1.5%区间，无异常波动","微信视频号为流量&成交双料冠军，贡献总成交金额的28.3%；C产品为核心爆品，贡献总营收的48.2%，获「2025上半年金牌爆品」称号","6月总曝光量达86.94万，是1月的6倍；总订单量6月达629单，较1月增长472%，过程指标增长势能强劲","本次统计覆盖抖音、小红书、百度、微信视频号四大投放渠道，A/B/C三类全产品线，数据样本无缺失"],"leads_analysis":{"labels":["1月","2月","3月","4月","5月","6月"],"total_leads_data":[516,1034,1551,2068,2585,3102],"visit_data":[11592,23184,34776,46368,57960,69552]},"pie_chart":{"data":[21.7,23.8,26.2,28.3],"labels":["抖音","小红书","百度","微信视频号"]},"strategies":[{"content":"将70%以上的投放预算向微信视频号、百度两大高转化渠道倾斜，同时加大C产品的内容种草、直播带货频次，放大爆品营收规模，预计可提升20%以上的月度营收","title":"资源倾斜高价值赛道"},{"content":"针对抖音、小红书的留资到订单环节进行链路优化，上线留资专属优惠券、1v1专属顾问服务，提升现有流量的转化效率，预计可将这两个渠道的转化率提升1-2个百分点","title":"优化中腰部渠道转化效率"},{"content":"基于6个月的连续增长趋势，提前布局7-8月暑期电商大促节点，上线渠道专属定制款产品，开展跨渠道联动营销活动，维持月均30%以上的增长速度","title":"布局暑期大促延续增长态势"}],"traffic_analysis":{"data":[144900,289800,434700,579600,724500,869400],"labels":["1月","2月","3月","4月","5月","6月"],"table_rows":[{"exposure":144900,"month":"1月","total_sales":148500},{"exposure":289800,"month":"2月","total_sales":306000},{"exposure":434700,"month":"3月","total_sales":462750},{"exposure":579600,"month":"4月","total_sales":617250},{"exposure":724500,"month":"5月","total_sales":771750},{"exposure":869400,"month":"6月","total_sales":926250}]}}`;
    let sourceData = {};
    // 容错解析JSON，避免数据格式错误导致页面崩溃
    try {
        sourceData = JSON.parse(rawJsonStr || "{}");
    } catch (parseErr) {
        console.error("数据源解析失败，请检查JSON格式：", parseErr);
        sourceData = {};
    }

    // ===================== 全局工具函数（修复原代码缺失方法） =====================
    // 快速获取DOM元素
    const getDom = (id) => document.getElementById(id);
    // 数字千分位格式化
    const formatNum = (val) => isNaN(Number(val)) ? val : Number(val).toLocaleString();
    // 表头中文映射字典
    const fieldDict = {
        month: "月份", phase: "阶段", m: "环比", exposure: "曝光量", visit: "访问数", click: "点击量",
        ctr: "点击率", total: "总计", total_sales: "总销售额(元)", total_payments: "成交笔数",
        avg_price: "客单价", avg_conversion_rate: "转化率", order_count: "订单量", pay_count: "支付人数",
        consult: "咨询", online_order: "线上单", phone: "电话", group_order: "团购", shop_order: "到店",
        leads_data: "客商增长", traffic_data: "流量增长"
    };
    // 通用表格渲染函数
    const renderTable = (tableId, dataList) => {
        const tableDom = getDom(tableId);
        if (!tableDom || !Array.isArray(dataList) || dataList.length === 0) return;
        const fieldKeys = Object.keys(dataList[0]).sort((a, b) => {
            if (a === "month" || a === "月份") return -1;
            if (b === "month" || b === "月份") return 1;
            return 0;
        });
        // 拼接表头
        let html = `<thead class="table-light"><tr>`;
        fieldKeys.forEach(key => html += `<th>${fieldDict[key] || key}</th>`);
        html += `</tr></thead><tbody>`;
        // 拼接表体
        dataList.forEach(row => {
            html += `<tr>`;
            fieldKeys.forEach(key => html += `<td>${formatNum(row[key])}</td>`);
            html += `</tr>`;
        });
        html += `</tbody>`;
        tableDom.innerHTML = html;
    };
    // 通用图表渲染封装
    const renderChart = (canvasId, chartType, labels, datasets, options = {}) => {
        const canvasDom = getDom(canvasId);
        if (!canvasDom || !labels || !datasets) return;
        const defaultOptions = {
            maintainAspectRatio: false,
            responsive: true,
            plugins: { legend: { position: "bottom" } },
            elements: { line: { tension: 0.4 } }
        };
        new Chart(canvasDom, {
            type: chartType,
            data: { labels, datasets },
            options: Object.assign(defaultOptions, options)
        });
    };

    // ===================== 1. 填充顶部结论卡片 =====================
    const conclusionList = sourceData.conclusions || [];
    conclusionList.forEach((text, index) => {
        const dom = getDom(`c${index + 1}`);
        if (dom) dom.textContent = text;
    });

    // ===================== 2. 填充优化策略卡片 =====================
    const strategyWrap = getDom("strategy-container");
    const strategyList = sourceData.strategies || [];
    let strategyHtml = "";
    strategyList.forEach(item => {
        strategyHtml += `
            <div class="col">
                <div class="card p-4 h-100 border-top-4 border-info">
                    <b class="text-info">${item.title || ""}</b>
                    <p class="small text-muted m-0 mt-2">${item.content || ""}</p>
                </div>
            </div>
        `;
    });
    strategyWrap.innerHTML = strategyHtml;

    // ===================== 3. 渲染趋势折线图 + 趋势明细表 =====================
    const trafficData = sourceData.traffic_analysis || {};
    const leadsData = sourceData.leads_analysis || {};
    if (trafficData.labels) {
        renderChart("line-chart", "line", trafficData.labels, [
            { label: "总曝光量", data: trafficData.data || [], borderColor: "#0d6efd", backgroundColor: "#0d6efd1a", fill: true },
            { label: "总访问量", data: leadsData.visit_data || [], borderColor: "#fd7e14", backgroundColor: "#fd7e141a", fill: true }
        ]);
    }
    renderTable("table-trend", trafficData.table_rows || []);

    // ===================== 4. 渲染柱状图 =====================
    if (leadsData.labels) {
        renderChart("bar-chart", "bar", leadsData.labels, [
            { label: "留资总量", data: leadsData.total_leads_data || [], backgroundColor: "#6f42c1" }
        ]);
    }

    // ===================== 5. 渲染环形饼图 =====================
    const pieData = sourceData.pie_chart || {};
    if (pieData.labels && pieData.data) {
        renderChart("pie-chart", "doughnut", pieData.labels, [
            { 
                label: "渠道成交占比(%)", 
                data: pieData.data, 
                backgroundColor: ['#0d6efd','#fd7e14','#6f42c1','#20c997'] 
            }
        ], {
            plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}%` } } }
        });
    }

    // ===================== 6. 渲染全量数据总表 =====================
    renderTable("table-full", trafficData.table_rows || []);
});
</script>
</body>
</html>
