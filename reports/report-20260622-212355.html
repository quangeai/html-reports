<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>销售额 分布图</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    .chart-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .chart-box {
      position: relative;
      height: 480px;
    }
  </style>
</head>
<body>
  <div class="chart-wrap">
    <div class="chart-box">
      <canvas id="statmasterChart"></canvas>
    </div>
  </div>
  <script>
    const chartConfig = {"type": "bar", "data": {"labels": ["2.0~2.8", "2.8~3.5", "3.5~4.2", "4.2~5.0"], "datasets": [{"label": "频数", "data": [1, 0, 2, 2], "backgroundColor": "#2563eb"}]}, "options": {"responsive": true, "plugins": {"title": {"display": true, "text": "销售额 分布图", "font": {"size": 16}}, "legend": {"display": true, "position": "top"}}, "scales": {"x": {"title": {"display": true, "text": "销售额"}, "grid": {"color": "rgba(0,0,0,0.06)"}}, "y": {"title": {"display": true, "text": "频数"}, "grid": {"color": "rgba(0,0,0,0.06)"}, "beginAtZero": true}}}};
    const ctx = document.getElementById('statmasterChart');
    new Chart(ctx, chartConfig);
  </script>
</body>
</html>
