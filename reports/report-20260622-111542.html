# 数字人爆款脚本重建版

我将基于您提供的参考示例，创建一个完整的数字人爆款脚本HTML页面。这个页面将包含参考视频分析、数字人形象重建、视觉规范和三个学段的脚本详情。

下面是完整的HTML代码：

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人爆款脚本 · 参考视频节奏重建版</title>
<style>
:root {
  --ele:#f59e0b; --mid:#8b5cf6; --high:#ef4444;
  --g1:#e02424; --g2:#f59e0b; --g3:#3b82f6; --g4:#059669;
  --bg:#f8fafc; --card:#fff; --text:#1f2937; --sub:#6b7280; --border:#e5e7eb;
  --radius:10px; --shadow:0 2px 8px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.7;padding:20px;
}
.wrap{max-width:1200px;margin:0 auto}

/* Header */
.header{
  text-align:center;padding:40px 24px 36px;
  background:linear-gradient(135deg,#111827,#1e3a5f,#1a56db);
  color:#fff;border-radius:16px;margin-bottom:24px;
}
.header h1{font-size:2em;font-weight:800;margin-bottom:6px}
.header .sub{font-size:.95em;opacity:.8}
.header .tags{margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.header .tags span{background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px;font-size:.78em}

/* Section */
.section{margin-bottom:28px}
.section-title{
  font-size:1.2em;font-weight:800;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}
.section-title::before{content:'';width:4px;height:24px;background:var(--g1);border-radius:2px}

/* Ref analysis card */
.ref-card{
  background:var(--card);border-radius:12px;box-shadow:var(--shadow);
  border:2px solid #1a56db;overflow:hidden;margin-bottom:20px;
}
.ref-hd{background:#1a56db;color:#fff;padding:12px 20px;font-weight:700;font-size:1.05em}
.ref-body{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
@media(max-width:768px){.ref-body{grid-template-columns:1fr 1fr}}
.ref-item{text-align:center}
.ref-item .val{font-size:1.6em;font-weight:800;color:#1a56db}
.ref-item .lbl{font-size:.78em;color:var(--sub);margin-top:2px}

/* Rhythm bar */
.rhythm-bar{
  background:var(--card);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px;
}
.rhythm-line{
  position:relative;height:48px;background:#f1f5f9;border-radius:8px;
  margin:10px 0;overflow:hidden;
}
.rhythm-seg{
  position:absolute;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:.75em;font-weight:700;color:#fff;
}
.rhythm-seg.r1{left:0;width:19%;background:var(--g1)}
.rhythm-seg.r2{left:19%;width:29%;background:var(--g2)}
.rhythm-seg.r3{left:48%;width:34%;background:var(--g3)}
.rhythm-seg.r4{left:82%;width:18%;background:var(--g4)}

.cut-markers{
  display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;
}
.cut-tag{
  font-size:.7em;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1e40af;
  cursor:default;
}

/* Persona card */
.persona-row{display:flex;gap:16px;margin-bottom:16px}
@media(max-width:768px){.persona-row{flex-direction:column}}
.persona-card{
  flex:1;background:var(--card);border-radius:12px;box-shadow:var(--shadow);
  overflow:hidden;border-top:4px solid #ccc;
}
.persona-card.ele{border-top-color:var(--ele)}
.persona-card.mid{border-top-color:var(--mid)}
.persona-card.high{border-top-color:var(--high)}
.persona-hd{padding:14px 18px;font-weight:700;font-size:1em;display:flex;align-items:center;gap:8px}
.persona-body{padding:0 18px 14px;font-size:.84em}
.persona-body table{width:100%;border-collapse:collapse}
.persona-body td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:top}
.persona-body .k{color:var(--sub);font-weight:600;white-space:nowrap;width:70px}
.persona-body .v{color:var(--text)}

.updated-badge{
  display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:.7em;font-weight:700;color:#fff;background:#059669;
  margin-left:6px;vertical-align:2px;
}

/* Visual spec panel */
.vis-row{display:flex;gap:16px;margin-bottom:16px}
@media(max-width:768px){.vis-row{flex-direction:column}}
.vis-card{
  flex:1;background:var(--card);border-radius:10px;box-shadow:var(--shadow);
  padding:16px 18px;
}
.vis-card h4{font-size:.9em;margin-bottom:8px;display:flex;align-items:center;gap:6px}

.color-swatch{
  display:inline-block;width:18px;height:18px;border-radius:4px;vertical-align:middle;margin-right:4px;border:1px solid rgba(0,0,0,.12);
}

/* Script timeline */
.timeline{margin:0 0 20px}
.timeline table{
  width:100%;border-collapse:collapse;font-size:.82em;
  background:var(--card);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);
}
.timeline thead th{
  background:#111827;color:#fff;padding:10px 12px;text-align:left;font-weight:600;
}
.timeline thead th.time{width:7%}
.timeline thead th.vis{width:12%}
.timeline thead th.aoe{width:28%}
.timeline thead th.script{width:43%}
.timeline thead th.audio{width:10%}
@media(max-width:768px){
  .timeline table{font-size:.75em}
  .timeline thead th.time{width:10%}
  .timeline thead th.vis{width:15%}
  .timeline thead th.aoe{width:25%}
  .timeline thead th.script{width:40%}
  .timeline thead th.audio{width:10%}
}
.timeline td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.timeline tr.s1 td{background:#fef2f2}
.timeline tr.s2 td{background:#fffbeb}
.timeline tr.s3 td{background:#eff6ff}
.timeline tr.s4 td{background:#f0fdf4}
.timeline tr.s5 td{background:#f8fafc}
.stage-marker{
  display:inline-block;padding:1px 8px;border-radius:4px;font-size:.75em;font-weight:700;color:#fff;
  margin-bottom:4px;
}
.stage-marker.hook{background:var(--g1)}
.stage-marker.talk{background:var(--g2)}
.stage-marker.app{background:var(--g3)}
.stage-marker.cta{background:var(--g4)}

.subtitle-bar{
  background:#fff3cd;border-left:3px solid var(--g2);padding:4px 10px;margin:4px 0;font-size:.8em;color:#92400e;border-radius:0 4px 4px 0;
}
.hw-bar{
  background:#fce4ec;border-left:3px solid var(--g1);padding:4px 10px;margin:4px 0;font-size:.8em;color:#c62828;border-radius:0 4px 4px 0;
}
.bgm-note{
  background:#e8f5e9
