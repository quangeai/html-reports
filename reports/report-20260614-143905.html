<!DOCTYPE html>

            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #F5F7FA;
            font-family: 'PingFang SC', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .metrics-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: relative;
        }
        .order-info {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 14px;
            color: #666;
        }
        .metric-card {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: center;
        }
        .metric-bar {
            width: 4px;
            height: 40px;
            border-radius: 2px;
            margin-right: 12px;
        }
        .blue { background-color: #4A90E9; }
        .gray { background-color: #9B9B9B; }
        .green { background-color: #7ED321; }
        .orange { background-color: #F5A623; }
        .metric-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart {
            width: 100%;
            height: 400px;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .metrics-container {
                flex-direction: column;
                align-items: flex-start;
            }
            .metric-card {
                margin-bottom: 15px;
                justify-content: flex-start;
                width: 100%;
            }
            .order-info {
                position: static;
                margin-top: 10px;
            }
        }
    </style>
</head>
