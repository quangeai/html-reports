<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR数据分析报告</title>
    <!-- 引入ECharts可视化CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif;}
        body {background-color: #f5f7fa; padding: 30px;}
        .report-box {max-width: 1200px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);}
        .title {font-size: 26px; color: #2d3748; text-align: center; margin-bottom: 10px; font-weight: 600;}
        .time-info {text-align: center; color: #718096; margin-bottom: 30px; font-size: 14px;}
        .section {margin: 25px 0;}
        .section-title {font-size: 18px; color: #2b6cb0; border-left: 4px solid #3182ce; padding-left: 12px; margin-bottom: 15px; font-weight: 500;}
        .text-block {line-height: 1.8; color: #4a5568; font-size: 15px; padding: 0 8px;}
        table {width: 100%; border-collapse: collapse; margin: 15px 0;}
        table th, table td {border: 1px solid #e2e8f0; padding: 12px 16px; text-align: left; font-size: 14px;}
        table th {background-color: #ebf8ff; color: #2c5282;}
        .suggest-box {background-color: #f0fff4; border: 1px solid #9ae6b4; border-radius: 8px; padding: 20px; margin-top: 20px;}
        .suggest-title {color: #22543d; font-weight: 600; margin-bottom: 10px; font-size: 16px;}
        .error-tip {color: #c53030; background: #fed7d7; padding: 20px; border-radius: 8px; text-align: center; font-size: 16px;}
        /* 可视化图表容器样式 */
        .chart-wrap {width: 100%; height: 420px; margin: 20px 0; border:1px solid #e2e8f0; border-radius:8px; padding:10px;}
        .chart-row {display: grid; grid-template-columns: 1fr 1fr; gap:20px; margin:20px 0;}
        @media (max-width:768px) {.chart-row {grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div class="report-box">
        <h1 class="title">人力资源数据分析报告</h1>
        <div class="time-info">报告生成时间：2026-06-27 13:16:58</div>

    </div>
    <!-- 执行图表渲染 -->
    <script>
        
    </script>
</body>
</html>
