# 知识卡片：《西游记》狮驼岭人物合集

- **分类**：文学角色/中国古典小说
- **定义**：《西游记》中占据狮驼岭与狮驼国的三位神通广大的妖魔，是唐僧师徒西行路上遭遇的最强反派组合之一。
- **核心要点**：
  1. **青狮精**：文殊菩萨坐骑，能化身巨口吞天兵。
  2. **白象精**：普贤菩萨坐骑，长鼻如龙善擒敌。
  3. **大鹏雕**：如来娘舅，速度无双，占据一国。
- **示例**：在原著第七十四至七十七回，三妖结义，设计擒拿唐僧，孙悟空不敌大鹏雕的极速与法宝，最终需请来如来佛祖及文殊、普贤菩萨方能降伏。
