<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识复习可视化平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft Yahei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease-out backwards;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .chart-container {
            height: 300px;
            width: 100%;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #555;
        }
        
        .empty-state p {
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .tips {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-out 0.4s backwards;
        }
        
        .tips h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }
        
        .tips ul {
            list-style-position: inside;
            color: #555;
            line-height: 1.8;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .card {
                padding: 20px;
            }
            
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>知识复习可视化平台</h1>
            <p>动态展示知识点，高效复习好帮手</p>
        </div>
        
        <div class="main-content">
            <div class="card">
                <h2>知识掌握程度</h2>
                <div class="chart-container" id="masteryChart"></div>
            </div>
            
            <div class="card">
                <h2>知识点分类分布</h2>
                <div class="chart-container" id="categoryChart"></div>
            </div>
            
            <div class="card">
                <h2>复习进度追踪</h2>
                <div class="chart-container" id="progressChart"></div>
            </div>
        </div>
        
        <div class="tips">
            <h2>使用提示</h2>
            <ul>
                <li>请添加您的教学内容，系统将自动生成对应的可视化图表</li>
                <li>支持多种图表类型，直观展示知识掌握情况和复习进度</li>
                <li>鼠标悬停在图表上可查看详细数据</li>
                <li>响应式设计，支持在各种设备上查看</li>
            </ul>
        </div>
    </div>

    <script>
        // 初始化图表
        function initCharts() {
            // 知识掌握程度图表
            const masteryChart = echarts.init(document.getElementById('masteryChart'));
            masteryChart.setOption({
                title: {
                    text: '暂无数据',
                    left: 'center',
                    top: 'center',
                    textStyle: {
                        color: '#999',
                        fontSize: 16
                    }
                },
                tooltip: {
                    trigger: 'item'
                },
                series: [
                    {
                        name: '掌握程度',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: false,
                            position: 'center'
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 20,
                                fontWeight: 'bold'
                            }
                        },
                        labelLine: {
                            show: false
                        },
                        data: []
                    }
                ]
            });
            
            // 知识点分类分布图表
            const categoryChart = echarts.init(document.getElementById('categoryChart'));
            categoryChart.setOption({
                title: {
                    text: '暂无数据',
                    left: 'center',
                    top: 'center',
                    textStyle: {
                        color: '#999',
                        fontSize: 16
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: [],
                    axisLabel: {
                        rotate: 30
                    }
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '知识点数量',
                        type: 'bar',
                        barWidth: '60%',
                        data: [],
                        itemStyle: {
                            borderRadius: [8, 8, 0, 0],
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: '#667eea'},
                                {offset: 1, color: '#764ba2'}
                            ])
                        }
                    }
                ]
            });
            
            // 复习进度追踪图表
            const progressChart = echarts.init(document.getElementById('progressChart'));
            progressChart.setOption({
                title: {
                    text: '暂无数据',
                    left: 'center',
                    top: 'center',
                    textStyle: {
                        color: '#999',
                        fontSize: 16
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: '{b}<br/>完成: {c}%'
                },
                xAxis: {
                    type: 'category',
                    data: []
                },
                yAxis: {
                    type: 'value',
                    min: 0,
                    max: 100,
                    axisLabel: {
                        formatter: '{value}%'
                    }
                },
                series: [
                    {
                        name: '完成进度',
                        type: 'line',
                        data: [],
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: {
                            color: '#667eea',
                            width: 3
                        },
                        itemStyle: {
                            color: '#fff',
                            borderColor: '#667eea',
                            borderWidth: 2
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: 'rgba(102, 126, 234, 0.3)'},
                                {offset: 1, color: 'rgba(102, 126, 234, 0.1)'}
                            ])
                        }
                    }
                ]
            });
            
            // 响应窗口大小变化
            window.addEventListener('resize', function() {
                masteryChart.resize();
                categoryChart.resize();
                progressChart.resize();
            });
        }
        
        // 页面加载完成后初始化图表
        window.addEventListener('load', initCharts);
    </script>
</body>
</html>
