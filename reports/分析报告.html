    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
        }
        /* 顶部标题栏 */
        .header {
            height: 80px;
            background: rgba(0, 20, 60, 0.8);
            border-bottom: 1px solid rgba(0, 168, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.3);
        }
        .header .title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 168, 255, 0.5);
        }
        .header .time {
            font-size: 18px;
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
        }
        /* KPI卡片区 */
        .kpi-container {
            display: flex;
            padding: 20px 30px;
            gap: 20px;
        }
        .kpi-card {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 168, 255, 0.15) 0%, rgba(0, 212, 255, 0.05) 100%);
            border: 1px solid rgba(0, 168, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 18px rgba(0, 168, 255, 0.2);
            transition: all 0.3s ease;
        }
        .kpi-card:hover {
            box-shadow: 0 0 25px rgba(0, 168, 255, 0.4);
            transform: translateY(-3px);
        }
        .kpi-title {
            font-size: 16px;
            color: #a0cfff;
            margin-bottom: 12px;
            text-align: center;
        }
        .kpi-value {
            font-size: 38px;
            font-weight: bold;
            color: #00d4ff;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }
        .kpi-unit {
            font-size: 18px;
            margin-left: 5px;
            color: #70e0ff;
        }
        /* 图表区 */
        .chart-container {
            padding: 0 30px 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .chart-box {
            height: 360px;
            background: rgba(0, 10, 30, 0.7);
            border: 1px solid rgba(0, 168, 255, 0.25);
            border-radius: 10px;
            padding: 15px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.15);
            transition: all 0.3s ease;
        }
        .chart-box:hover {
            box-shadow: 0 0 22px rgba(0, 168, 255, 0.3);
        }
        .chart-title {
            font-size: 17px;
            color: #a0cfff;
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 10;
        }
        .chart {
            width: 100%;
            height: 100%;
        }
        /* 底部 */
        .footer {
            height: 45px;
            line-height: 45px;
            text-align: center;
            color: #88aacc;
            font-size: 14px;
            border-top: 1px solid rgba(0, 168, 255, 0.2);
            background: rgba(0, 20, 60, 0.7);
        }
        @media (max-width: 1600px) {
            .kpi-value {
                font-size: 32px;
            }
            .chart-box {
                height: 320px;
            }
        }
    </style>
</head>

        // KPI计数动画
        function countAnimation(id, target, duration = 2000) {
            const element = document.getElementById(id);
            const startTime = performance.now();
            const isFloat = target % 1 !== 0;
            function step(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const value = progress * target;
                element.innerText = isFloat ? value.toFixed(1) : Math.floor(value).toLocaleString();
                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            }
            requestAnimationFrame(step);
        }
