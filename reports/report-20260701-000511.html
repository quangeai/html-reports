<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手卫生数据统计可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .empty-tip {
            text-align: center;
            padding: 50px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            color: #666;
        }
        .summary {
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="empty-tip">
            <h2>未获取到有效手卫生打分数据</h2>
            <p>请提供包含患者打分表、医疗督查打分表的原始表格数据（Excel解析后的文本格式），以便进行数据统计与可视化展示。</p>
        </div>
        <div class="summary">
            <h3>数据说明</h3>
            <p>需要您输入的是从Excel文件解析出的患者打分表和医疗督查打分表的文本数据，系统将自动识别表格类型并进行数据匹配、统计分析，生成对应的可视化图表与整改建议。</p>
        </div>
    </div>
    <script>
        // 无有效数据，暂不渲染图表
    </script>
</body>
</html>
