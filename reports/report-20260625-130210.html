<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咨询员总业绩对比分析报告</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        section {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header class="bg-primary text-white text-center py-3">
        <h1>咨询员总业绩对比分析报告</h1>
    </header>
    <div class="container py-4">
        <!-- 执行摘要 -->
        <section id="executive-summary">
            <h2 class="border-bottom pb-2">执行摘要</h2>
            <p>本报告通过对咨询员业绩数据的分析，展示不同咨询员的总业绩情况，帮助直观了解业绩分布差异。</p>
        </section>

        <!-- 关键指标与图表 -->
        <section id="key-metrics">
            <h2 class="border-bottom pb-2">关键指标展示</h2>
            <canvas id="consultant-performance-chart" width="800" height="400"></canvas>
        </section>

        <!-- 详细数据分析 -->
        <section id="detailed-analysis">
            <h2 class="border-bottom pb-2">详细数据分析</h2>
            <p>通过对CSV数据的处理，计算每位咨询员的总业绩，以下是具体分析结果。</p>
        </section>

        <!-- 趋势分析 -->
        <section id="trend-analysis">
            <h2 class="border-bottom pb-2">趋势分析</h2>
            <p>从柱状图中可观察到各咨询员业绩的差异趋势，有助于识别表现突出与待提升的人员。</p>
        </section>

        <!-- 建议与结论 -->
        <section id="suggestions-conclusions">
            <h2 class="border-bottom pb-2">建议和结论</h2>
            <p>根据分析结果，可针对业绩较低的咨询员提供培训支持，对优秀者进行经验分享，以提升整体团队业绩。</p>
        </section>

        <script>
            fetch("https://p26-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/cdf30ea1517f4fd6950516d1b16023ee.csv~tplv-mdko3gqilj-image.image?rk3s=81d4c505&x-expires=1813467537&x-signature=r4ST6CGGpyX3YvSLJY0NsxTrJVo%3D&x-wf-file_name=6.23-24%E5%88%B0%E8%AF%8A.csv")
                .then(response => response.text())
                .then(csvData => {
                    const lines = csvData.split('
');
                    const headers = lines[0].split(',');
                    const consultantMap = {};
                    
                    for (let i = 1; i < lines.length; i++) {
                        const row = lines[i].trim();
                        if (!row) continue;
                        const cols = row.split(',');
                        const consultant = cols[0]; // 假设第一列是咨询员名称
                        const performance = parseFloat(cols[1]); // 假设第二列是业绩数值
                        if (consultantMap[consultant]) {
                            consultantMap[consultant] += performance;
                        } else {
                            consultantMap[consultant] = performance;
                        }
                    }

                    const consultantNames = Object.keys(consultantMap);
                    const consultantValues = Object.values(consultantMap);

                    new Chart(document.getElementById('consultant-performance-chart'), {
                        type: 'bar',
                        data: {
                            labels: consultantNames,
                            datasets: [{
                                label: '总业绩',
                                data: consultantValues,
                                backgroundColor: 'rgba(54, 162, 235, 0.7)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                title: {
                                    display: true,
                                    text: '各咨询员总业绩对比',
                                    font: { size: 20 }
                                },
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: ctx => `业绩: ${ctx.raw}`
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    title: { display: true, text: '咨询员' }
                                },
                                y: {
                                    title: { display: true, text: '总业绩' },
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                });
        </script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
