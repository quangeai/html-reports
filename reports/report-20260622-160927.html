<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据可视化报告</title>
<!-- 内置Chart.js图表库，离线可用 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{background:#f7f8fa;padding:30px;}
.container{max-width:1600px;margin:0 auto;background:#fff;padding:28px;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.05);}
h1{text-align:center;color:#1d2129;margin-bottom:30px;font-size:26px;}
.chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:30px;}
.chart-card{border:1px solid #e5e6eb;border-radius:8px;padding:20px;height:420px;}
.chart-card h3{margin-bottom:16px;color:#4e5969;font-size:18px;text-align:center;}
.table-box{overflow-x:auto;border:1px solid #e5e6eb;border-radius:8px;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead tr{background:#1677ff;color:#fff;}
th,td{padding:12px 10px;border:1px solid #e5e6eb;font-size:14px;text-align:center;}
.even{background:#fafafa;}
.odd{background:#fff;}
tbody tr:hover{background:#e6f4ff;transition:0.2s;}
@media (max-width:900px){.chart-wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
    <h1>数据可视化报告</h1>
    <!-- 图表区域：柱状图 + 饼图 -->
    <div class="chart-wrap">
        <div class="chart-card">
            <h3>数据柱状对比图</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>数据占比饼图</h3>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
    <!-- 原始数据表格 -->
    <div class="table-box">
        <table>
            <thead><tr><th>提示</th><th>无有效数据</th></tr></thead>
            <tbody><tr class="even"><td>说明</td><td>请让大模型输出标准数组JSON数据</td></tr></tbody>
        </table>
    </div>
</div>

<script>
// 图表渲染数据
const labels = ["说明"];
const values = [0];
const colorPool = [
    '#1677ff','#52c41a','#fa8c16','#f5222d','#722ed1','#13c2c2','#eb2f96','#faad14'
];

// 柱状图
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: '数值统计',
            data: values,
            backgroundColor: '#1677ff80',
            borderColor: '#1677ff',
            borderWidth:1
        }]
    },
    options: {responsive:true,maintainAspectRatio:false}
});

// 饼图
new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            data: values,
            backgroundColor: colorPool.slice(0,labels.length)
        }]
    },
    options: {responsive:true,maintainAspectRatio:false}
});
</script>
</body>
</html>
