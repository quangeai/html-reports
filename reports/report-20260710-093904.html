<script>
document.addEventListener("DOMContentLoaded", () => {
    // 已替换为实际业务数据
    const rawJsonStr = `{"conclusions":["2025年1-6月电商获客全链路数据持续攀升，总成交金额累计达326.55万元，月均复合增长率达44%","过程指标中6月总曝光量达87.48万，较1月的14.58万增长482%，留资客资量6月达3124，较1月的516增长505%","微信视频号为流量及成交双料黑马，总成交占比达28.3%，位列各渠道第一","C产品贡献总成交的47.2%，是核心盈利产品，各渠道转化漏斗健康，点击-留资转化率稳定在15%左右","全周期各渠道投放效率无明显波动，规模增长同时未出现转化效率下滑情况"],"leads_analysis":{"labels":["1月","2月","3月","4月","5月","6月"],"total_leads_data":[516,1038,1559,2082,2604,3124],"visit_data":[11692,23384,35076,46768,58460,70152]},"pie_chart":{"data":[21.65,23.84,26.20,28.31],"labels":["抖音","小红书","百度","微信视频号"]},"strategies":[{"content":"将投放预算向微信视频号、百度两个高转化渠道倾斜，相比现有预算提升20%，重点打造C产品的爆款投放素材，放大头部渠道及产品的盈利效应","title":"倾斜资源投入高潜力渠道"},{"content":"针对访问-点击环节的30%转化率天花板，优化落地页视觉设计及商品卖点呈现，目标将该环节转化率提升至35%，单月新增流量转化贡献提升15%以上","title":"优化低环节转化效率"},{"content":"每月度复盘各渠道各产品的投放ROI，对ROI低于行业均值的投放计划即时关停，将释放预算分配给ROI Top20%的计划，保障整体投放效率持续提升","title":"搭建月度动态调优机制"}],"traffic_analysis":{"data":[160967,321936,482906,643875,804844,965813],"labels":["1月","2月","3月","4月","5月","6月"],"table_rows":[{"exposure":145800,"month":"1月","total_sales":148500},{"exposure":291600,"month":"2月","total_sales":306000},{"exposure":437400,"month":"3月","total_sales":464000},{"exposure":583200,"month":"4月","total_sales":625000},{"exposure":729000,"month":"5月","total_sales":782000},{"exposure":874800,"month":"6月","total_sales":940000}]}}`;
    let sourceData = {};
    // 容错解析JSON，避免数据格式错误导致页面崩溃
    try {
        sourceData = JSON.parse(rawJsonStr || "{}");
    } catch (parseErr) {
        console.error("数据源解析失败，请检查JSON格式：", parseErr);
        sourceData = {};
    }

    // ===================== 全局工具函数 =====================
    // 快速获取DOM元素
    const getDom = (id) => document.getElementById(id);
    // 数字千分位格式化
    const formatNum = (val) => isNaN(Number(val)) ? val : Number(val).toLocaleString();
    // 表头中文映射字典
    const fieldDict = {
        month: "月份", phase: "阶段", m: "环比", exposure: "曝光量", visit: "访问数", click: "点击量",
        ctr: "点击率", total: "总计", total_sales: "总销售额", total_payments: "成交笔数",
        avg_price: "客单价", avg_conversion_rate: "转化率", order_count: "订单量", pay_count: "支付人数",
        consult: "咨询", online_order: "线上单", phone: "电话", group_order: "团购", shop_order: "到店",
        leads_data: "客商增长", traffic_data: "流量增长"
    };
    // 通用表格渲染函数
    const renderTable = (tableId, dataList) => {
        const tableDom = getDom(tableId);
        if (!tableDom || !Array.isArray(dataList) || dataList.length === 0) return;
        const fieldKeys = Object.keys(dataList[0]).sort((a, b) => {
            if (a === "month" || a === "月份") return -1;
            if (b === "month" || b === "月份") return 1;
            return 0;
        });
        // 拼接表头
        let html = `<thead class="table-light"><tr>`;
        fieldKeys.forEach(key => html += `<th>${fieldDict[key] || key}</th>`);
        html += `</tr></thead><tbody>`;
        // 拼接表体
        dataList.forEach(row => {
            html += `<tr>`;
            fieldKeys.forEach(key => html += `<td>${formatNum(row[key])}</td>`);
            html += `</tr>`;
        });
        html += `</tbody>`;
        tableDom.innerHTML = html;
    };
    // 通用图表渲染封装
    const renderChart = (canvasId, chartType, labels, datasets) => {
        const canvasDom = getDom(canvasId);
        if (!canvasDom || !labels || !datasets) return;
        const colorPalette = ['#0d6efd', '#fd7e14', '#6f42c1', '#20c997', '#ffc107'];
        new Chart(canvasDom, {
            type: chartType,
            data: { labels, datasets },
            options: {
                maintainAspectRatio: false,
                responsive: true,
                plugins: { legend: { position: "bottom" } },
                elements: { line: { tension: 0.4 } }
            }
        });
    };

    // ===================== 1. 填充顶部结论卡片 =====================
    const conclusionList = sourceData.conclusions || [];
    conclusionList.forEach((text, index) => {
        const dom = getDom(`c${index + 1}`);
        if (dom) dom.textContent = text;
    });

    // ===================== 2. 填充优化策略卡片 =====================
    const strategyWrap = getDom("strategy-container");
    const strategyList = sourceData.strategies || [];
    let strategyHtml = "";
    strategyList.forEach(item => {
        strategyHtml += `
            <div class="col">
                <div class="card p-4 h-100 border-top border-success border-4">
                    <b>${item.title || ""}</b>
                    <p class="small text-muted m-0 mt-2">${item.content || ""}</p>
                </div>
            </div>
        `;
    });
    strategyWrap.innerHTML = strategyHtml;

    // ===================== 3. 渲染趋势折线图 + 趋势明细表 =====================
    const trafficData = sourceData.traffic_analysis || {};
    const leadsData = sourceData.leads_analysis || {};
    if (trafficData.labels) {
        renderChart("line-chart", "line", trafficData.labels, [
            { label: "流量指标", data: trafficData.data || [], borderColor: "#0d6efd", backgroundColor: "#0d6efd1a", fill: true },
            { label: "访问数", data: leadsData.visit_data || [], borderColor: "#fd7e14", backgroundColor: "#fd7e141a", fill: true }
        ]);
    }
    renderTable("table-trend", trafficData.table_rows || []);

    // ===================== 4. 渲染柱状图 =====================
    if (leadsData.labels) {
        renderChart("bar-chart", "bar", leadsData.labels, [
            { label: "留资客资量", data: leadsData.total_leads_data || [], backgroundColor: "#6f42c1" }
        ]);
    }

    // ===================== 5. 渲染环形饼图 =====================
    const pieData = sourceData.pie_chart || {};
    if (pieData.labels && pieData.data) {
        renderChart("pie-chart", "doughnut", pieData.labels, [{ 
            data: pieData.data, 
            backgroundColor: ['#0d6efd','#fd7e14','#6f42c1','#20c997'],
            hoverOffset: 4
        }]);
    }

    // ===================== 6. 渲染全量数据总表 =====================
    renderTable("table-full", trafficData.table_rows || []);
});
</script>
