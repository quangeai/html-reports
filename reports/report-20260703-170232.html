        // 当前故障列表
        let currentFaults = [];
        // 已完成步骤
        let completedSteps = new Set();

        // 初始化
        function init() {
            // 生成随机故障
            generateRandomFaults();
            // 更新拓扑图
            updateTopology();
            // 初始化终端
            clearTerminal();
            addToTerminal("综合故障仿真已启动，请按左侧步骤排查。", "system-text");
            addToTerminal("
当前故障列表：", "warn-text");
            currentFaults.forEach(fault => {
                addToTerminal(`- ${faultPool[fault].name}`, "warn-text");
            });
            addToTerminal("
可用命令：show faults, check logs, netstat, nslookup, fix", "system-text");
            
            // 重置步骤状态
            stepBtns.forEach(btn => {
                btn.classList.remove('active', 'completed');
            });
            stepBtns[0].classList.add('active');
            completedSteps.clear();
        }

        // 生成随机故障（2-3个）
        function generateRandomFaults() {
            const faultKeys = Object.keys(faultPool);
            const faultCount = Math.floor(Math.random() * 2) + 2; // 2或3个故障
            currentFaults = [];
            
            // 随机选择不重复的故障
            while (currentFaults.length < faultCount) {
                const randomIndex = Math.floor(Math.random() * faultKeys.length);
                const faultKey = faultKeys[randomIndex];
                if (!currentFaults.includes(faultKey)) {
                    currentFaults.push(faultKey);
                }
            }
        }

        // 更新拓扑图故障节点
        function updateTopology() {
            // 重置所有节点
            [clientNode, fwNode, webNode, dnsNode].forEach(node => {
                node.classList.remove('fault');
            });
            
            // 标记故障节点
            currentFaults.forEach(fault => {
                faultPool[fault].node.classList.add('fault');
            });
        }

        // 添加内容到终端
        function addToTerminal(text, className = "") {
            const div = document.createElement('div');
            div.textContent = text;
            if (className) {
                div.classList.add(className);
            }
            terminalOutput.appendChild(div);
            // 自动滚动到底部
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        // 清除终端内容
        function clearTerminal() {
            terminalOutput.innerHTML = '';
        }

        // 切换步骤
        function switchStep(stepNumber) {
            // 更新按钮状态
            stepBtns.forEach((btn, index) => {
                btn.classList.remove('active');
                if (index + 1 === stepNumber) {
                    btn.classList.add('active');
                }
            });
            
            // 显示对应步骤提示
            const stepTexts = [
                "场景复现：用户反馈无法访问www.example.com网站，请进行故障排查。",
                "查看日志：使用check logs命令查看系统日志，定位故障原因。",
                "端口检测：使用netstat或test-port命令检测80端口连通性。",
                "DNS核对：使用nslookup或check-dns命令检测DNS解析是否正常。",
                "校验案例：点击自动校验按钮验证故障是否已修复，并查看拓展案例。"
            ];
            
            addToTerminal(`
[步骤${stepNumber}] ${stepTexts[stepNumber-1]}`, "system-text");
        }

        // 执行命令
        function executeCommand(command) {
            addToTerminal(`
> ${command}`);
            
            const cmd = command.trim().toLowerCase();
            
            switch(true) {
                case cmd === 'show faults' || cmd === '故障':
                    addToTerminal("
当前故障列表：", "warn-text");
                    if (currentFaults.length === 0) {
                        addToTerminal("- 无故障", "success-text");
                    } else {
                        currentFaults.forEach(fault => {
                            addToTerminal(`- ${faultPool[fault].name}`, "warn-text");
                        });
                    }
                    break;
                
                case cmd === 'check logs' || cmd === '查看日志' || cmd === 'iis日志':
                    addToTerminal("
=== 系统日志 ===", "system-text");
                    if (currentFaults.length === 0) {
                        addToTerminal("所有系统服务运行正常", "success-text");
                    } else {
                        currentFaults.forEach(fault => {
                            addToTerminal(faultPool[fault].log, "error-text");
                        });
                    }
                    // 标记步骤2完成
                    completedSteps.add(2);
                    stepBtns[1].classList.add('completed');
                    break;
                
                case cmd === 'netstat' || cmd === 'test-port' || cmd === '端口':
                    addToTerminal("
=== 端口检测结果 ===", "system-text");
                    if (currentFaults.includes('fw')) {
                        addToTerminal("错误：防火墙拦截了80端口的入站连接", "error-text");
                    } else if (currentFaults.includes('svc')) {
                        addToTerminal("错误：Web服务未启动，80端口未监听", "error-text");
                    } else {
                        addToTerminal("80端口监听正常，连通性良好", "success-text");
                    }
                    // 标记步骤3完成
                    completedSteps.add(3);
                    stepBtns[2].classList.add('completed');
                    break;
                
                case cmd === 'nslookup' || cmd === 'check-dns' || cmd === 'dns':
                    addToTerminal("
=== DNS解析检测 ===", "system-text");
                    if (currentFaults.includes('dns')) {
                        addToTerminal("错误：无法找到www.example.com的A记录", "error-text");
                    } else {
                        addToTerminal("DNS解析正常：www.example.com -> 192.168.1.100", "success-text");
                    }
                    // 标记步骤4完成
                    completedSteps.add(4);
                    stepBtns[3].classList.add('completed');
                    break;
                
                case cmd === 'fix' || cmd === '修复':
                    addToTerminal("
=== 执行修复操作 ===", "system-text");
                    currentFaults.forEach(fault => {
                        switch(fault) {
                            case 'svc':
                                addToTerminal("执行：Start-Service W3SVC", "success-text");
                                addToTerminal("Web服务已启动", "success-text");
