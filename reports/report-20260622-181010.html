<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泌尿外科手卫生数据可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 20px;
            background-color: #f5f7fa;
        }
        .chart-container {
            width: 90%;
            height: 400px;
            margin: 20px auto;
            background-color: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary {
            width: 90%;
            margin: 20px auto;
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            line-height: 1.6;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>泌尿外科手卫生数据统计</h2>
    <div id="barChart" class="chart-container"></div>
    <div id="pieChart" class="chart-container"></div>
    <div class="summary">
        <h3>数据汇总与整改建议</h3>
        <p><strong>科室平均分：</strong>86.2分</p>
        <p><strong>最高分护士：</strong>张三（综合分95.2分）</p>
        <p><strong>最低分护士：</strong>赵六（综合分72.8分）</p>
        <h4>低分问题整改建议：</h4>
        <ul>
            <li><strong>未按七步洗手法（频次12）：</strong>组织全员七步洗手法实操培训，每日早会抽查考核</li>
            <li><strong>手卫生时机遗漏（频次9）：</strong>在病房、治疗室张贴手卫生时机提示海报，督查人员加大巡查力度</li>
            <li><strong>洗手时长不足（频次7）：</strong>配备带计时功能的洗手池，设置语音提示洗手时长</li>
            <li><strong>未使用速干手消（频次5）：</strong>在各诊疗点位补充速干手消凝胶，明确非接触诊疗场景手卫生要求</li>
        </ul>
    </div>

    <script type="text/javascript">
        // 初始化柱状图
        var barChart = echarts.init(document.getElementById('barChart'));
        var barOption = {
            title: { text: '护士手卫生平均分排名', left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: ['张三', '李四', '王五', '赵六', '孙七'] },
            yAxis: { type: 'value', name: '分数' },
            series: [
                { name: '患者打分', type: 'bar', data: [92, 88, 90, 75, 85] },
                { name: '医疗督查打分', type: 'bar', data: [97, 92, 89, 71, 86] },
                { name: '综合得分', type: 'bar', data: [95.2, 90.4, 89.4, 72.8, 85.6] }
            ]
        };
        barChart.setOption(barOption);

        // 初始化饼图
        var pieChart = echarts.init(document.getElementById('pieChart'));
        var pieOption = {
            title: { text: '低分问题分布占比', left: 'center' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'left' },
            series: [
                {
                    name: '问题频次',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                    label: { show: false, position: 'center' },
                    emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold' } },
                    labelLine: { show: false },
                    data: [
                        { value: 12, name: '未按七步洗手法' },
                        { value: 9, name: '手卫生时机遗漏' },
                        { value: 7, name: '洗手时长不足' },
                        { value: 5, name: '未使用速干手消' }
                    ]
                }
            ]
        };
        pieChart.setOption(pieOption);

        // 适配窗口大小变化
        window.addEventListener('resize', function() {
            barChart.resize();
            pieChart.resize();
        });
    </script>
</body>
</html>
