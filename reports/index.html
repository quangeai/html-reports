<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字消消乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#81C784',
                        bubble1: '#B5EAD7',
                        bubble2: '#FFDAC1',
                        bubble3: '#C7CEEA',
                        bubble4: '#FFB7B2',
                        bubble5: '#E2F0CB',
                        bubble6: '#F8F9FA',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bubble-3d {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 -5px 15px rgba(255, 255, 255, 0.7), inset 0 5px 15px rgba(0, 0, 0, 0.1);
                transition: all 0.3s ease;
            }
            .bubble-3d:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), inset 0 -5px 15px rgba(255, 255, 255, 0.7), inset 0 5px 15px rgba(0, 0, 0, 0.1);
            }
            .bubble-selected {
                border: 4px solid #FF9800;
                transform: scale(1.05);
            }
            .bubble-disappear {
                animation: disappear 0.5s forwards;
            }
            @keyframes disappear {
                0% { opacity: 1; transform: scale(1); }
                100% { opacity: 0; transform: scale(0); }
            }
            .success-animation {
                animation: success 1s ease-in-out;
            }
            @keyframes success {
                0% { transform: scale(0.5); opacity: 0; }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-primary min-h-screen flex flex-col items-center p-4">
    <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-white mt-6 mb-8 text-center drop-shadow-lg">生字消消乐</h1>
    
    <div id="game-container" class="w-full max-w-5xl grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6 mb-10">
        <!-- 泡泡将通过JS动态生成 -->
    </div>
    
    <div id="success-message" class="hidden text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-white text-center success-animation">
        <i class="fa fa-trophy mr-2 text-yellow-300"></i>恭喜挑战成功!
    </div>

    <script>
        // 生字数据 - 与"love"相关的中文词汇
        const wordData = [
            { char: "爱", pinyin: "ài" },
            { char: "情", pinyin: "qíng" },
            { char: "恋", pinyin: "liàn" },
            { char: "心", pinyin: "xīn" },
            { char: "亲", pinyin: "qīn" },
            { char: "友", pinyin: "yǒu" },
            { char: "喜", pinyin: "xǐ" },
            { char: "欢", pinyin: "huān" }
        ];
        
        // 泡泡颜色类
        const bubbleColors = [
            'bg-bubble1',
            'bg-bubble2',
            'bg-bubble3',
            'bg-bubble4',
            'bg-bubble5',
            'bg-bubble6'
        ];
        
        let gameData = [];
        let selectedBubbles = [];
        let matchedPairs = 0;
        
        // 初始化游戏
        function initGame() {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = '';
            selectedBubbles = [];
            matchedPairs = 0;
            
            // 创建游戏数据数组（包含生字和拼音）
            gameData = [];
            wordData.forEach(item => {
                gameData.push({ type: 'char', value: item.char, pairId: item.char });
                gameData.push({ type: 'pinyin', value: item.pinyin, pairId: item.char });
            });
            
            // 随机打乱顺序
            gameData.sort(() => Math.random() - 0.5);
            
            // 创建泡泡元素
            gameData.forEach((item, index) => {
                const bubble = document.createElement('div');
                const colorClass = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
                
                bubble.className = `bubble-3d ${colorClass} rounded-full flex items-center justify-center p-4 aspect-square cursor-pointer`;
                bubble.dataset.index = index;
                bubble.dataset.pairId = item.pairId;
                bubble.dataset.type = item.type;
                
                const text = document.createElement('span');
                text.className = 'text-[clamp(1.5rem,4vw,2.5rem)] font-bold text-gray-700 text-center';
                text.textContent = item.value;
                
                bubble.appendChild(text);
                bubble.addEventListener('click', handleBubbleClick);
                gameContainer.appendChild(bubble);
            });
        }
        
        // 处理泡泡点击
        function handleBubbleClick(e) {
            const bubble = e.currentTarget;
            
            // 如果已经选中两个泡泡或当前泡泡已匹配，则不处理
            if (selectedBubbles.length >= 2 || bubble.classList.contains('bubble-disappear')) {
                return;
            }
            
            // 如果点击的是已经选中的泡泡，则取消选中
            if (selectedBubbles.includes(bubble)) {
                bubble.classList.remove('bubble-selected');
                selectedBubbles = selectedBubbles.filter(b => b !== bubble);
                return;
            }
            
            // 选中泡泡
            bubble.classList.add('bubble-selected');
            selectedBubbles.push(bubble);
            
            // 如果选中了两个泡泡，检查是否匹配
            if (selectedBubbles.length === 2) {
                checkMatch();
            }
        }
        
        // 检查两个选中的泡泡是否匹配
        function checkMatch() {
            const [bubble1, bubble2] = selectedBubbles;
            
            // 防止连续点击同一个泡泡
            if (bubble1 === bubble2) {
                resetSelection();
                return;
            }
            
            // 检查是否是生字和拼音的匹配对
            if (bubble1.dataset.pairId === bubble2.dataset.pairId && 
                bubble1.dataset.type !== bubble2.dataset.type) {
                
                // 匹配成功，泡泡消失
                setTimeout(() => {
                    bubble1.classList.add('bubble-disappear');
                    bubble2.classList.add('bubble-disappear');
                    
                    // 移除点击事件
                    bubble1.removeEventListener('click', handleBubbleClick);
                    bubble2.removeEventListener('click', handleBubbleClick);
                    
                    selectedBubbles = [];
                    matchedPairs++;
                    
                    // 检查游戏是否结束
                    if (matchedPairs === wordData.length) {
                        setTimeout(() => {
                            document.getElementById('game-container').classList.add('hidden');
                            document.getElementById('success-message').classList.remove('hidden');
                            
                            // 3秒后重新开始游戏
                            setTimeout(() => {
                                document.getElementById('success-message').classList.add('hidden');
                                document.getElementById('game-container').classList.remove('hidden');
                                initGame();
                            }, 3000);
                        }, 500);
                    }
                }, 500);
                
            } else {
                // 匹配失败，取消选中状态
                setTimeout(resetSelection, 1000);
            }
        }
        
        // 重置选中状态
        function resetSelection() {
            selectedBubbles.forEach(bubble => {
                bubble.classList.remove('bubble-selected');
            });
            selectedBubbles = [];
        }
        
        // 页面加载完成后初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
