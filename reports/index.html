<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字消消乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#81C784',
                        bubble1: '#B5EAD7',
                        bubble2: '#C7CEEA',
                        bubble3: '#FFDAC1',
                        bubble4: '#FFB7B2',
                        bubble5: '#E2F0CB',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bubble-3d {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 -5px 15px rgba(255, 255, 255, 0.7), inset 0 5px 10px rgba(0, 0, 0, 0.1);
                transition: all 0.3s ease;
            }
            .bubble-3d:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.15), 0 8px 12px -4px rgba(0, 0, 0, 0.1), inset 0 -5px 15px rgba(255, 255, 255, 0.7), inset 0 5px 10px rgba(0, 0, 0, 0.1);
            }
            .bubble-selected {
                transform: scale(1.05);
                box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2), 0 8px 12px -4px rgba(0, 0, 0, 0.15), inset 0 -5px 15px rgba(255, 255, 255, 0.7), inset 0 5px 10px rgba(0, 0, 0, 0.1);
                border: 3px solid #4CAF50;
            }
            .disappear {
                animation: disappear 0.5s forwards;
            }
            @keyframes disappear {
                0% { opacity: 1; transform: scale(1); }
                50% { opacity: 0.5; transform: scale(1.1); }
                100% { opacity: 0; transform: scale(0); display: none; }
            }
            .success-animation {
                animation: success 1s ease-in-out;
            }
            @keyframes success {
                0% { transform: scale(0.5); opacity: 0; }
                70% { transform: scale(1.2); opacity: 1; }
                100% { transform: scale(1); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-primary min-h-screen flex flex-col items-center p-4">
    <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-gray-800 my-6 text-center">生字消消乐</h1>
    
    <div id="game-container" class="w-full max-w-4xl grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 my-8">
        <!-- 泡泡将通过JS动态生成 -->
    </div>
    
    <div id="success-message" class="hidden text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-green-700 success-animation">
        恭喜挑战成功!
    </div>

    <script>
        // 生字和拼音数据
        const words = [
            { char: '老', pinyin: 'lǎo' },
            { char: '师', pinyin: 'shī' },
            { char: '辛', pinyin: 'xīn' },
            { char: '苦', pinyin: 'kǔ' },
            { char: '啦', pinyin: 'la' }
        ];
        
        // 泡泡颜色类
        const bubbleColors = ['bubble1', 'bubble2', 'bubble3', 'bubble4', 'bubble5'];
        
        // 游戏状态
        let gameState = {
            selectedBubble: null,
            matchedPairs: 0,
            totalPairs: words.length
        };
        
        // 初始化游戏
        function initGame() {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = '';
            
            // 创建泡泡数组
            let bubbles = [];
            
            // 添加生字泡泡
            words.forEach((word, index) => {
                bubbles.push({
                    type: 'char',
                    content: word.char,
                    pairId: index,
                    color: bubbleColors[index % bubbleColors.length]
                });
            });
            
            // 添加拼音泡泡
            words.forEach((word, index) => {
                bubbles.push({
                    type: 'pinyin',
                    content: word.pinyin,
                    pairId: index,
                    color: bubbleColors[index % bubbleColors.length]
                });
            });
            
            // 随机打乱泡泡顺序
            bubbles = shuffleArray(bubbles);
            
            // 创建泡泡元素
            bubbles.forEach((bubble, index) => {
                const bubbleElement = document.createElement('div');
                bubbleElement.className = `bubble-3d rounded-full flex items-center justify-center p-6 cursor-pointer ${bubble.color}`;
                bubbleElement.dataset.type = bubble.type;
                bubbleElement.dataset.pairId = bubble.pairId;
                bubbleElement.dataset.index = index;
                bubbleElement.innerHTML = `<span class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-gray-800">${bubble.content}</span>`;
                
                bubbleElement.addEventListener('click', handleBubbleClick);
                gameContainer.appendChild(bubbleElement);
            });
        }
        
        // 打乱数组顺序
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        // 处理泡泡点击
        function handleBubbleClick(event) {
            const clickedBubble = event.currentTarget;
            
            // 如果已经选中了一个泡泡，或者点击的是已经选中的泡泡，或者点击的是同类型的泡泡
            if (gameState.selectedBubble && 
                (gameState.selectedBubble.dataset.index === clickedBubble.dataset.index || 
                 gameState.selectedBubble.dataset.type === clickedBubble.dataset.type)) {
                return;
            }
            
            // 如果已经选中了一个泡泡，现在点击第二个泡泡进行配对
            if (gameState.selectedBubble) {
                const firstBubble = gameState.selectedBubble;
                const secondBubble = clickedBubble;
                
                // 高亮第二个泡泡
                secondBubble.classList.add('bubble-selected');
                
                // 检查是否匹配
                if (firstBubble.dataset.pairId === secondBubble.dataset.pairId) {
                    // 匹配成功，泡泡消失
                    setTimeout(() => {
                        firstBubble.classList.add('disappear');
                        secondBubble.classList.add('disappear');
                        
                        // 移除点击事件
                        firstBubble.removeEventListener('click', handleBubbleClick);
                        secondBubble.removeEventListener('click', handleBubbleClick);
                        
                        gameState.matchedPairs++;
                        
                        // 检查游戏是否结束
                        if (gameState.matchedPairs === gameState.totalPairs) {
                            setTimeout(() => {
                                document.getElementById('game-container').classList.add('hidden');
                                document.getElementById('success-message').classList.remove('hidden');
                            }, 500);
                        }
                    }, 500);
                } else {
                    // 匹配失败，取消高亮
                    setTimeout(() => {
                        firstBubble.classList.remove('bubble-selected');
                        secondBubble.classList.remove('bubble-selected');
                    }, 1000);
                }
                
                // 重置选中状态
                gameState.selectedBubble = null;
            } else {
                // 选中第一个泡泡
                gameState.selectedBubble = clickedBubble;
                clickedBubble.classList.add('bubble-selected');
            }
        }
        
        // 页面加载时初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
