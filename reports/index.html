<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字消消乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#81C784',
                        secondary: '#A5D6A7',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bubble-3d {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 -5px 10px rgba(255, 255, 255, 0.7);
                transform: perspective(1000px) rotateX(5deg);
                transition: all 0.3s ease;
            }
            .bubble-3d:hover {
                transform: perspective(1000px) rotateX(5deg) scale(1.05);
            }
            .bubble-selected {
                box-shadow: 0 0 15px 5px rgba(255, 215, 0, 0.7), 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 -5px 10px rgba(255, 255, 255, 0.7);
                transform: perspective(1000px) rotateX(5deg) scale(1.1);
            }
            .bubble-disappear {
                animation: disappear 0.5s forwards;
            }
            @keyframes disappear {
                0% { opacity: 1; transform: scale(1); }
                100% { opacity: 0; transform: scale(0); }
            }
            .celebration {
                animation: celebrate 1s ease-in-out;
            }
            @keyframes celebrate {
                0% { transform: scale(0.5); opacity: 0; }
                50% { transform: scale(1.2); opacity: 1; }
                100% { transform: scale(1); opacity: 1; }
            }
        }
    </style>
</head>
<body class="bg-primary min-h-screen flex flex-col items-center p-4">
    <header class="w-full text-center mb-8">
        <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-white drop-shadow-lg">生字消消乐</h1>
    </header>
    
    <main class="w-full max-w-5xl flex-grow">
        <div id="game-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6">
            <!-- 泡泡将通过JavaScript动态生成 -->
        </div>
        
        <div id="success-message" class="hidden text-center mt-12 celebration">
            <h2 class="text-[clamp(1.8rem,4vw,3rem)] font-bold text-white drop-shadow-lg">恭喜挑战成功!</h2>
            <button id="restart-btn" class="mt-6 bg-yellow-400 hover:bg-yellow-500 text-gray-800 font-bold py-3 px-6 rounded-full shadow-lg transition duration-300">
                再来一局
            </button>
        </div>
    </main>
    
    <footer class="w-full text-center text-white mt-8 text-sm">
        <p>点击泡泡进行配对，找到正确的生字和拼音组合</p>
    </footer>

    <script>
        // 生字数据
        const wordData = [
            { character: "人", pinyin: "rén" },
            { character: "口", pinyin: "kǒu" },
            { character: "手", pinyin: "shǒu" },
            { character: "足", pinyin: "zú" },
            { character: "目", pinyin: "mù" },
            { character: "耳", pinyin: "ěr" },
            { character: "日", pinyin: "rì" },
            { character: "月", pinyin: "yuè" },
            { character: "水", pinyin: "shuǐ" },
            { character: "火", pinyin: "huǒ" },
            { character: "山", pinyin: "shān" },
            { character: "石", pinyin: "shí" }
        ];

        let selectedBubble = null;
        let matchedPairs = 0;

        // 生成随机浅色
        function getRandomLightColor() {
            const hue = Math.floor(Math.random() * 360);
            const saturation = Math.floor(Math.random() * 30) + 20; // 20-50%
            const lightness = Math.floor(Math.random() * 20) + 70; // 70-90%
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // 创建泡泡元素
        function createBubble(content, type, id) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble-3d rounded-full flex items-center justify-center p-4 cursor-pointer transition-all duration-300';
            bubble.style.backgroundColor = getRandomLightColor();
            bubble.dataset.type = type;
            bubble.dataset.id = id;
            bubble.innerHTML = `<span class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-gray-800">${content}</span>`;
            
            bubble.addEventListener('click', handleBubbleClick);
            return bubble;
        }

        // 处理泡泡点击
        function handleBubbleClick(e) {
            const bubble = e.currentTarget;
            
            // 如果已经选中了一个泡泡，或者点击的是已经匹配的泡泡
            if (selectedBubble && selectedBubble !== bubble || bubble.classList.contains('bubble-disappear')) {
                return;
            }
            
            // 切换选中状态
            bubble.classList.toggle('bubble-selected');
            
            if (bubble.classList.contains('bubble-selected')) {
                // 如果没有选中的泡泡，设置当前泡泡为选中
                if (!selectedBubble) {
                    selectedBubble = bubble;
                } else {
                    // 已经有选中的泡泡，检查是否匹配
                    checkMatch(selectedBubble, bubble);
                }
            } else {
                // 取消选中
                selectedBubble = null;
            }
        }

        // 检查匹配
        function checkMatch(bubble1, bubble2) {
            // 不能选择同一类型的泡泡
            if (bubble1.dataset.type === bubble2.dataset.type) {
                bubble1.classList.remove('bubble-selected');
                bubble2.classList.remove('bubble-selected');
                selectedBubble = null;
                return;
            }
            
            // 检查是否匹配
            if (bubble1.dataset.id === bubble2.dataset.id) {
                // 匹配成功
                setTimeout(() => {
                    bubble1.classList.add('bubble-disappear');
                    bubble2.classList.add('bubble-disappear');
                    
                    // 移除点击事件
                    bubble1.removeEventListener('click', handleBubbleClick);
                    bubble2.removeEventListener('click', handleBubbleClick);
                    
                    matchedPairs++;
                    
                    // 检查是否所有都匹配成功
                    if (matchedPairs === wordData.length) {
                        setTimeout(() => {
                            document.getElementById('game-container').classList.add('hidden');
                            document.getElementById('success-message').classList.remove('hidden');
                        }, 500);
                    }
                }, 500);
            } else {
                // 匹配失败
                setTimeout(() => {
                    bubble1.classList.remove('bubble-selected');
                    bubble2.classList.remove('bubble-selected');
                }, 500);
            }
            
            selectedBubble = null;
        }

        // 初始化游戏
        function initGame() {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = '';
            gameContainer.classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
            
            selectedBubble = null;
            matchedPairs = 0;
            
            // 创建泡泡数组
            const bubbles = [];
            
            // 添加生字和拼音
            wordData.forEach((item, index) => {
                bubbles.push(createBubble(item.character, 'character', index));
                bubbles.push(createBubble(item.pinyin, 'pinyin', index));
            });
            
            // 随机排序
            bubbles.sort(() => Math.random() - 0.5);
            
            // 添加到容器
            bubbles.forEach(bubble => {
                gameContainer.appendChild(bubble);
            });
        }

        // 重新开始按钮事件
        document.getElementById('restart-btn').addEventListener('click', initGame);

        // 初始化游戏
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
