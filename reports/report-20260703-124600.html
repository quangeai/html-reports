<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰姐 - 个人简历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .resume-container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        /* 左侧边栏样式 */
        .sidebar {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6491 100%);
            color: white;
            padding: 40px 30px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 30px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #4a6491;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .title {
            text-align: center;
            font-size: 16px;
            color: #bdc3c7;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-info, .skills-section {
            margin-top: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ecf0f1;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
            font-size: 16px;
        }

        .contact-item, .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .contact-item i, .skill-item i {
            width: 24px;
            margin-right: 12px;
            color: #3498db;
            text-align: center;
        }

        .skill-name {
            margin-bottom: 5px;
            font-size: 14px;
        }

        .skill-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .skill-level {
            height: 100%;
            background: #3498db;
            border-radius: 3px;
        }

        /* 右侧内容样式 */
        .main-content {
            padding: 40px 35px;
        }

        .main-section {
            margin-bottom: 35px;
        }

        .main-section-title {
            font-size: 22px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
            display: flex;
            align-items: center;
        }

        .main-section-title i {
            margin-right: 12px;
            color: #3498db;
        }

        .intro-text {
            font-size: 15px;
            color: #555;
            margin-bottom: 15px;
            text-align: justify;
        }

        .highlight {
            background-color: #fff9e6;
            padding: 2px 5px;
            border-radius: 3px;
            color: #e67e22;
            font-weight: 500;
        }

        .experience-item, .education-item {
            margin-bottom: 25px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .item-subtitle {
            font-size: 16px;
            color: #3498db;
            font-weight: 500;
        }

        .item-date {
            font-size: 14px;
            color: #7f8c8d;
            background: #f1f8ff;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .item-desc {
            font-size: 14.5px;
            color: #555;
            margin-top: 8px;
        }

        .achievement {
            color: #27ae60;
            font-weight: 500;
            margin-top: 5px;
            display: flex;
            align-items: flex-start;
        }

        .achievement:before {
            content: "★";
            color: #f1c40f;
            margin-right: 8px;
            font-size: 12px;
        }

        .hobby-tag {
            display: inline-block;
            background: #eef7ff;
            color: #2980b9;
            padding: 6px 15px;
            margin: 5px 8px 5px 0;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #d6eaf8;
        }

        .hobby-tag i {
            margin-right: 6px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 14px;
            border-top: 1px solid #eee;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .resume-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                padding: 30px;
            }
        }
    </style>
</head>
