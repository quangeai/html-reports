<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名词解释消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #e8f5e9;
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
            color: #2e7d32;
            margin-bottom: 40px;
        }
        .bubble-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .bubble {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset -10px -10px 15px rgba(255,255,255,0.7), inset 10px 10px 15px rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.1);
            user-select: none;
        }
        .bubble:hover {
            transform: scale(1.05);
        }
        .bubble.selected {
            box-shadow: inset -10px -10px 15px rgba(255,255,255,0.7), inset 10px 10px 15px rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.1), 0 0 20px rgba(33,150,243,0.6);
            border: 3px solid #2196f3;
        }
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #2e7d32;
            text-align: center;
            z-index: 100;
            display: none;
        }
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            display: none;
        }
    </style>
</head>
<body>
    <h1>名词解释消消乐</h1>
    <div class="bubble-container" id="bubbleContainer"></div>
    <div class="success-message" id="successMsg">恭喜挑战成功🎉</div>
    <canvas id="fireworks"></canvas>

    <script>
        const pairs = [
            { term: "国民生产总值", definition: "一国居民拥有的生产要素在一定时期内生产的最终产品和服务的市场价值总和" },
            { term: "国内生产净值", definition: "国内生产总值扣除固定资产折旧后的剩余产值" },
            { term: "个人可支配收入", definition: "个人缴纳各类税费后，可用于消费和储蓄的收入" },
            { term: "国民收入", definition: "一国生产要素所有者在一定时期内获得的全部税前收入" },
            { term: "国内生产总值", definition: "一国境内一定时期内生产的最终产品和服务的市场价值总和" }
        ];

        const bubbleContainer = document.getElementById('bubbleContainer');
        const successMsg = document.getElementById('successMsg');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');

        function resizeCanvas() {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getRandomLightColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 70%, 85%)`;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let allBubbles = [];
        pairs.forEach(pair => {
            const termBubble = document.createElement('div');
            termBubble.className = 'bubble';
            termBubble.textContent = pair.term;
            termBubble.dataset.id = pair.term;
            termBubble.dataset.type = 'term';
            termBubble.style.backgroundColor = getRandomLightColor();
            allBubbles.push(termBubble);

            const defBubble = document.createElement('div');
            defBubble.className = 'bubble';
            defBubble.textContent = pair.definition;
            defBubble.dataset.id = pair.term;
            defBubble.dataset.type = 'definition';
            defBubble.style.backgroundColor = getRandomLightColor();
            allBubbles.push(defBubble);
        });

        shuffleArray(allBubbles);
        allBubbles.forEach(bubble => bubbleContainer.appendChild(bubble));

        let selectedBubble = null;

        bubbleContainer.addEventListener('click', (e) => {
            if (!e.target.classList.contains('bubble')) return;

            const currentBubble = e.target;

            if (selectedBubble) {
                if (selectedBubble === currentBubble) {
                    selectedBubble.classList.remove('selected');
                    selectedBubble = null;
                    return;
                }

                if (selectedBubble.dataset.id === currentBubble.dataset.id && 
                    selectedBubble.dataset.type !== currentBubble.dataset.type) {
                    selectedBubble.style.opacity = '0';
                    currentBubble.style.opacity = '0';
                    setTimeout(() => {
                        selectedBubble.remove();
                        currentBubble.remove();

                        if (bubbleContainer.children.length === 0) {
                            successMsg.style.display = 'block';
                            fireworksCanvas.style.display = 'block';
                            startFireworks();
                        }
                    }, 300);
                } else {
                    selectedBubble.classList.remove('selected');
                }
                selectedBubble = null;
            } else {
                selectedBubble = currentBubble;
                selectedBubble.classList.add('selected');
            }
        });

        function startFireworks() {
            const particles = [];
            const particleCount = 100;

            function createFirework() {
                const x = Math.random() * fireworksCanvas.width;
                const y = Math.random() * fireworksCanvas.height;
                const color = `hsl(${Math.random() * 360}, 70%, 50%)`;

                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        size: Math.random() * 3 + 1,
                        color,
                        alpha: 1,
                        decay: Math.random() * 0.01 + 0.005
                    });
                }
            }

            function updateParticles() {
                ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

                particles.forEach((particle, index) => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy += 0.1;
                    particle.alpha -= particle.decay;

                    if (particle.alpha <= 0) {
                        particles.splice(index, 1);
                        return;
                    }

                    ctx.save();
                    ctx.globalAlpha = particle.alpha;
                    ctx.fillStyle = particle.color;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                if (Math.random() < 0.05) {
                    createFirework();
                }

                requestAnimationFrame(updateParticles);
            }

            for (let i = 0; i < 5; i++) {
                createFirework();
            }

            updateParticles();
        }
    </script>
</body>
</html>
