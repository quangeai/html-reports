<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100克生黄瓜营养信息</title>
    <style>
        .nutrition-card {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            font-family: "Microsoft Yahei", sans-serif;
        }
        .food-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            /* 懒加载优化 */
            loading: lazy;
        }
        .nutrition-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin: 0 0 1.2rem 0;
        }
        .nutrition-item {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #34495e;
            margin: 0.4rem 0;
        }
        .nutrition-item strong {
            color: #27ae60;
        }
        .adapt-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        .adapt-title {
            font-size: 1.25rem;
            color: #2c3e50;
            margin-bottom: 0.8rem;
        }
        .adapt-text {
            line-height: 1.7;
            color: #34495e;
        }
    </style>
</head>
<body>
    <div class="nutrition-card">
        <!-- 菜品图片区域 -->
        <img 
            src="https://s.coze.cn/t/tNHPIiIHqgY/" 
            alt="100克生黄瓜菜品展示" 
            class="food-image"
            loading="lazy"
        >
        
        <!-- 食物名称标题：一级标题 -->
        <h1 class="nutrition-title">🥒 100克生黄瓜（可食部分）</h1>
        
        <!-- 营养信息列表 -->
        <div class="nutrition-info">
            <p class="nutrition-item"><strong>热量：</strong>16千卡</p>
            <p class="nutrition-item"><strong>蛋白质：</strong>0.8克</p>
            <p class="nutrition-item"><strong>脂肪：</strong>0.2克</p>
            <p class="nutrition-item"><strong>碳水化合物：</strong>2.9克（含膳食纤维 0.5克）</p>
            <p class="nutrition-item"><strong>主要营养素：</strong>维生素C（约9毫克）、钾（约102毫克）、镁（约15毫克）</p>
        </div>

        <!-- 减肥适配性区块 -->
        <section class="adapt-section">
            <h2 class="adapt-title">减肥适配性</h2>
            <p class="adapt-text">
                热量极低、水分（约96%）和膳食纤维含量高，能增加饱腹感、促进肠道蠕动，同时几乎不含脂肪和糖分，非常适合减肥期间作为加餐或搭配主餐食用（如凉拌、生吃，避免油炒增加热量），可替代部分高糖水果或零食，帮助控制总热量。
            </p>
        </section>
    </div>
</body>
</html>
