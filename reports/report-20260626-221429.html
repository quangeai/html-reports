<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>人力资源综合数据分析报告</title>
   <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
   <style>
       * {margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", system-ui, sans-serif;}
       body {background-color: #f3f6fa; padding: 32px 16px;}
       .container {max-width: 1300px; margin: 0 auto; background: #ffffff; border-radius: 16px; padding: 48px; box-shadow: 0 4px 16px rgba(0,0,0,0.06);}
       .main-title {font-size: 28px; color: #1a202c; text-align: center; font-weight: 700; margin-bottom: 12px;}
       .meta-row {display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; color: #64748b; font-size: 14px; margin-bottom: 36px;}
       .risk-tag {display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 600;}
       .risk-high {background: #fee2e2; color: #dc2626;}
       .risk-midhigh {background: #ffedd5; color: #ea580c;}
       .risk-mid {background: #fef9c3; color: #ca8a04;}
       .risk-low {background: #dcfce7; color: #16a34a;}
       .section {margin: 36px 0;}
       .sec-title {font-size: 20px; color: #1d4ed8; border-left: 5px solid #2563eb; padding: 8px 14px; margin-bottom: 18px; font-weight: 600;}
       .text-desc {line-height: 1.9; font-size: 15px; color: #334155; padding: 0 10px;}
       .abnormal-box {background: #fff7ed; border: 1px solid #fdba74; border-radius: 10px; padding: 20px; margin: 16px 0;}
       .abnormal-item {color: #c2410c; line-height: 1.8; margin: 6px 0; padding-left: 12px; position: relative;}
       .abnormal-item::before {content: "⚠"; position: absolute; left: 0;}
       .chart-single {width: 100%; height: 450px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin: 20px 0;}
       .chart-double-row {display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 20px 0;}
       .chart-double {width: 100%; height: 420px; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;}
       @media (max-width: 900px) {.chart-double-row {grid-template-columns: 1fr;}}
       table {width: 100%; border-collapse: collapse; margin: 18px 0;}
       th, td {border: 1px solid #e2e8f0; padding: 14px 16px; font-size: 14px; text-align: left;}
       th {background: #eff6ff; color: #1e40af; font-weight: 600;}
       .warn-tr {background: #fef2f2;}
       .gap-plus {color: #dc2626; font-weight: 600;}
       .gap-minus {color: #16a34a; font-weight: 600;}
       .scheme-card {border-radius: 10px; padding: 22px; margin: 16px 0;}
       .short-card {background: #ecfccb; border:1px solid #a3e635;}
       .mid-card {background: #bae6fd; border:1px solid #38bdf8;}
       .long-card {background: #ddd6fe; border:1px solid #a78bfa;}
       .card-title {font-size: 17px; font-weight: 600; margin-bottom: 12px;}
       .scheme-item {line-height: 1.8; margin: 8px 0; padding-left: 10px;}
   </style>
</head>
<body>
<div class="container">
   <h1 class="main-title">人力资源综合数据分析报告</h1>
   <div class="meta-row">
       <span>统计口径：无</span>
       <span>报告生成日期：</span>
       <span>整体风险等级：<span class="risk-tag risk-low">低风险</span></span>
   </div>

   <div class="section">
       <h2 class="sec-title">六、分阶段人力资源优化落地方案</h2>
<div class="scheme-card short-card"><div class="card-title">短期应急方案（1-3个月）</div></div><div class="scheme-card mid-card"><div class="card-title">中期制度优化（3-12个月）</div></div><div class="scheme-card long-card"><div class="card-title">长期组织建设（12个月以上）</div></div></div>
</div>
<script>

</script>
</body>
</html>
