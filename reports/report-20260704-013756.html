<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名词解释消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #e6f7e6;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            color: #2d6a4f;
            margin-bottom: 30px;
            text-align: center;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
        }
        .bubble {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2);
            transform: perspective(1000px) rotateX(5deg);
            user-select: none;
        }
        .bubble:hover {
            transform: perspective(1000px) rotateX(0deg) scale(1.05);
        }
        .bubble.selected {
            border: 4px solid #2d6a4f;
            transform: perspective(1000px) rotateX(0deg) scale(1.1);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.1), 0 10px 20px rgba(45,106,79,0.4);
        }
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #2d6a4f;
            font-weight: bold;
            text-align: center;
            z-index: 100;
            display: none;
        }
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            display: none;
        }
    </style>
</head>
<body>
    <h1>名词解释消消乐</h1>
    <div class="game-container" id="gameContainer"></div>
    <div class="success-message" id="successMessage">恭喜挑战成功</div>
    <canvas id="fireworks"></canvas>

    <script>
        const pairs = [
            { term: "个人可支配收入（DPI）", definition: "个人收入扣除个人所得税等税后，可直接用于消费和储蓄的收入。" },
            { term: "名义GDP", definition: "以当年市场价格计算的一国（或地区）在一定时期内生产的全部最终产品和服务的市场价值总和。" },
            { term: "国民生产总值（GNP）", definition: "一国（或地区）所有常住居民在一定时期内生产的全部最终产品和服务的市场价值总和，侧重国民原则。" },
            { term: "国内生产总值（GDP）", definition: "一国（或地区）在一定时期内，在本国领土范围内生产的全部最终产品和服务的市场价值总和，侧重地域原则。" },
            { term: "实际GDP", definition: "以不变价格计算的一国（或地区）在一定时期内生产的全部最终产品和服务的市场价值总和，反映实际产出变化。" }
        ];

        function getRandomLightColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 70%, 85%)`;
        }

        function createBubble(content, id) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            bubble.style.backgroundColor = getRandomLightColor();
            bubble.dataset.id = id;
            bubble.addEventListener('click', handleBubbleClick);
            return bubble;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        let selectedBubble = null;
        let matchedCount = 0;
        const totalPairs = pairs.length;

        function initGame() {
            const gameContainer = document.getElementById('gameContainer');
            gameContainer.innerHTML = '';

            const bubblesContent = [];
            pairs.forEach((pair, index) => {
                bubblesContent.push({ content: pair.term, id: index });
                bubblesContent.push({ content: pair.definition, id: index });
            });

            const shuffledBubbles = shuffleArray(bubblesContent);

            shuffledBubbles.forEach(bubble => {
                gameContainer.appendChild(createBubble(bubble.content, bubble.id));
            });
        }

        function handleBubbleClick(e) {
            const currentBubble = e.target;

            if (currentBubble === selectedBubble) {
                currentBubble.classList.remove('selected');
                selectedBubble = null;
                return;
            }

            if (selectedBubble) {
                const selectedId = selectedBubble.dataset.id;
                const currentId = currentBubble.dataset.id;

                if (selectedId === currentId) {
                    selectedBubble.style.opacity = '0';
                    currentBubble.style.opacity = '0';
                    setTimeout(() => {
                        selectedBubble.remove();
                        currentBubble.remove();
                        matchedCount++;

                        if (matchedCount === totalPairs) {
                            setTimeout(showSuccess, 500);
                        }
                    }, 300);
                } else {
                    selectedBubble.classList.remove('selected');
                    currentBubble.classList.remove('selected');
                }
                selectedBubble = null;
            } else {
                currentBubble.classList.add('selected');
                selectedBubble = currentBubble;
            }
        }

        function showSuccess() {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('fireworks').style.display = 'block';
            initFireworks();
        }

        function initFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.speed = Math.random() * 5 + 2;
                    this.angle = Math.random() * Math.PI * 2;
                    this.gravity = 0.2;
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = Math.sin(this.angle) * this.speed;
                    this.color = color;
                    this.size = Math.random() * 3 + 1;
                    this.life = 100;
                    this.maxLife = 100;
                }

                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                    this.size *= 0.99;
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.life / this.maxLife;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            class Firework {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height;
                    this.speed = Math.random() * 5 + 8;
                    this.vy = -this.speed;
                    this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                    this.size = 2;
                    this.exploded = false;
                    this.particles = [];
                }

                update() {
                    if (!this.exploded) {
                        this.y += this.vy;
                        this.vy += 0.05;
                        if (this.vy >= 0) {
                            this.exploded = true;
                            this.createParticles();
                        }
                    } else {
                        this.particles.forEach(particle => particle.update());
                        this.particles = this.particles.filter(particle => particle.life > 0);
                    }
                }

                createParticles() {
                    const particleCount = 100;
                    for (let i = 0; i < particleCount; i++) {
                        this.particles.push(new Particle(this.x, this.y, this.color));
                    }
                }

                draw() {
                    if (!this.exploded) {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        this.particles.forEach(particle => particle.draw());
                    }
                }
            }

            const fireworks = [];

            function animate() {
                ctx.fillStyle = 'rgba(230, 247, 230, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (Math.random() < 0.05) {
                    fireworks.push(new Firework());
                }

                fireworks.forEach((firework, index) => {
                    firework.update();
                    firework.draw();
                    if (firework.exploded && firework.particles.length === 0) {
                        fireworks.splice(index, 1);
                    }
                });

                requestAnimationFrame(animate);
            }

            animate();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        window.addEventListener('load', initGame);
    </script>
</body>
</html>
