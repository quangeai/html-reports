<html lang="zh-CN">
<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>📊 HR 数据分析看板</title> <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script> <style> * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; } body { background-color: #f0f4f8; color: #333; line-height: 1.6; } /* 顶部标题栏 */ .header { background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%); color: white; padding: 2rem 1.5rem; border-radius: 0 0 16px 16px; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; } .header-title h1 { font-size: 1.8rem; margin-bottom: 0.5rem; } .header-title p { opacity: 0.8; font-size: 0.9rem; } .header-info { text-align: right; font-size: 0.9rem; } /* KPI卡片区域 */ .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; padding: 0 1.5rem 2rem; } .kpi-card { background: white; padding: 1.5rem; border-radius: 14px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); transition: transform 0.3s ease; } .kpi-card:hover { transform: translateY(-5px); } .kpi-card.blue { background-color: #1a3a5c; color: white; } .kpi-card.green { background-color: #22a67e; color: white; } .kpi-card.orange { background-color: #e6a020; color: white; } .kpi-card.purple { background-color: #7c5cbf; color: white; } .kpi-card.cyan { background-color: #2a9d8f; color: white; } .kpi-label { font-size: 0.9rem; opacity: 0.9; margin-bottom: 0.5rem; } .kpi-value { font-size: 2rem; font-weight: bold; margin-bottom: 0.3rem; } .kpi-desc { font-size: 0.8rem; opacity: 0.8; } /* 图表区域 */ .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; padding: 0 1.5rem 2rem; } .chart-card { background: white; padding: 1.5rem; border-radius: 14px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); } .chart-card h3 { margin-bottom: 1.5rem; color: #1a3a5c; font-size: 1.1rem; } .chart-container { height: 300px; } /* 核心发现与建议 */ .insights-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; padding: 0 1.5rem 2rem; } .insight-card { background: white; padding: 1.5rem; border-radius: 14px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); } .insight-card h3 { margin-bottom: 1rem; color: #1a3a5c; font-size: 1.1rem; } .insight-list { list-style: none; } .insight-list li { padding: 0.5rem 0; border-bottom: 1px solid #f0f4f8; } .insight-list li:last-child { border-bottom: none; } /* 部门表格 */ .table-container { padding: 0 1.5rem 2rem; } .table-card { background: white; padding: 1.5rem; border-radius: 14px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); overflow-x: auto; } .table-card h3 { margin-bottom: 1rem; color: #1a3a5c; font-size: 1.1rem; } .department-table { width: 100%; border-collapse: collapse; } .department-table th, .department-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f0f4f8; } .department-table th { background-color: #f8fafc; font-weight: 600; } .performance-green { color: #22a67e; font-weight: bold; } .performance-red { color: #e63946; font-weight: bold; } .turnover-red { color: #e63946; font-weight: bold; } .turnover-orange { color: #e6a020; font-weight: bold; } /* 响应式调整 */ @media (max-width: 768px) { .charts-container, .insights-container { grid-template-columns: 1fr; } .kpi-container { grid-template-columns: repeat(2, 1fr); } .header { flex-direction: column; align-items: flex-start; } .header-info { margin-top: 1rem; text-align: left; } } @media (max-width: 480px) { .kpi-value { font-size: 1.5rem; } .header-title h1 { font-size: 1.5rem; } } </style>
</head>
<body> <!-- 顶部标题栏 --> <div class="header"> <div class="header-title"> <h1>📊 HR 数据分析看板</h1> <p>2026年 Q2 · 全量员工数据</p> </div> <div class="header-info"> <p>数据更新: 2026-06-30</p> <p>总员工数: <span id="total-count">--</span>人</p> </div> </div> <!-- KPI指标卡 --> <div class="kpi-container"> <div class="kpi-card blue"> <div class="kpi-label">总员工数</div> <div class="kpi-value" id="total-staff">--</div> <div class="kpi-desc">在职+离职员工总数</div> </div> <div class="kpi-card cyan"> <div class="kpi-label">平均绩效</div> <div class="kpi-value" id="avg-performance">--</div> <div class="kpi-desc">绩效等级换算分数均值</div> </div> <div class="kpi-card green"> <div class="kpi-label">平均薪资</div> <div class="kpi-value" id="avg-salary">--</div> <div class="kpi-desc">月度薪资平均值</div> </div> <div class="kpi-card orange"> <div class="kpi-label">离职率</div> <div class="kpi-value" id="turnover-rate">--</div> <div class="kpi-desc">已离职员工占比</div> </div> <div class="kpi-card blue"> <div class="kpi-label">女性占比</div> <div class="kpi-value" id="female-ratio">--</div> <div class="kpi-desc">女性员工占总人数比例</div> </div> <div class="kpi-card purple"> <div class="kpi-label">高学历占比</div> <div class="kpi-value" id="high-edu-ratio">--</div> <div class="kpi-desc">硕士及以上学历占比</div> </div> </div> <!-- 图表区域 --> <div class="charts-container"> <div class="chart-card"> <h3>各部门人数分布</h3> <div class="chart-container"> <canvas id="departmentCountChart"></canvas> </div> </div> <div class="chart-card"> <h3>各部门平均薪资</h3> <div class="chart-container"> <canvas id="departmentSalaryChart"></canvas> </div> </div> <div class="chart-card"> <h3>各部门离职率</h3> <div class="chart-container"> <canvas id="departmentTurnoverChart"></canvas> </div> </div> <div class="chart-card"> <h3>学历分布</h3> <div class="chart-container"> <canvas id="educationChart"></canvas> </div> </div> <div class="chart-card"> <h3>绩效 vs 薪资</h3> <div class="chart-container"> <canvas id="performanceSalaryChart"></canvas> </div> </div> </div> <!-- 核心发现与建议 --> <div class="insights-container"> <div class="insight-card"> <h3>🔍 核心发现</h3> <ul class="insight-list" id="insights-list"></ul> </div> <div class="insight-card"> <h3>💡 建议措施</h3> <ul class="insight-list" id="suggestions-list"></ul> </div> </div> <!-- 部门明细数据表 --> <div class="table-container"> <div class="table-card"> <h3>部门明细数据</h3> <table class="department-table" id="department-table"> <thead> <tr> <th>部门</th> <th>人数</th> <th>平均薪资</th> <th>平均绩效</th> <th>离职率</th> </tr> </thead> <tbody></tbody> </table> </div> </div> <script> // 原始数据 var rawData = { "metrics": { "总员工数": 30, "平均年龄": 28.1, "平均工龄": 2.5, "平均绩效": 78.0, "平均薪资": 7907, "薪资范围": "4300 - 16800", "离职率": "33.3%", "女性占比": "56.7%", "高学历占比": "10.0%", "薪资绩效相关系数": 0.65 }, "department_stats": [ {"department": "销售一部", "count": 3, "avg_salary": 6833, "avg_score": 81.7, "turnover_rate": 33.3}, {"department": "销售二部", "count": 3, "avg_salary": 6800, "avg_score": 78.3, "turnover_rate": 66.7}, {"department": "技术研发部", "count": 4, "avg_salary": 11350, "avg_score": 80.0, "turnover_rate": 25.0}, {"department": "人力资源部", "count": 3, "avg_salary": 7967, "avg_score": 85.0, "turnover_rate": 0.0}, {"department": "财务部", "count": 3, "avg_salary": 8000, "avg_score": 75.0, "turnover_rate": 33.3}, {"department": "市场运营部", "count": 3, "avg_salary": 8133, "avg_score": 75.0, "turnover_rate": 33.3}, {"department": "行政后勤部", "count": 3, "avg_salary": 6200, "avg_score": 75.0, "turnover_rate": 33.3}, {"department": "生产车间", "count": 4, "avg_salary": 5600, "avg_score": 72.5, "turnover_rate": 50.0}, {"department": "品牌部", "count": 3, "avg_salary": 9367, "avg_score": 78.3, "turnover_rate": 33.3}, {"department": "法务部", "count": 1, "avg_salary": 9500, "avg_score": 85.0, "turnover_rate": 0.0} ], "education_distribution": {"本科":13, "硕士":3, "博士":0, "大专":14}, "gender_distribution": {"男":13, "女":17}, "insights": [ "⚠️ 整体离职率高达33.3%，远高于行业健康水平", "🔴 销售二部离职率最高(66.7%)，生产车间次之(50.0%)", "💰 技术研发部平均薪资最高(11350元)，生产车间最低(5600元)", "🎓 高学历占比仅10.0%，人才结构有待优化", "⚖️ 女性员工占比56.7%，性别比例偏向女性", "📊 绩效与薪资中度相关(r=0.65)，高绩效员工薪资普遍更高" ], "suggestions": [ "📌 针对高离职率部门（销售二部、生产车间）开展专项离职访谈，挖掘核心原因", "📌 优化薪酬体系，尤其是生产车间等低薪资部门，缩小薪资差距", "📌 完善员工发展通道，为技术研发等核心部门提供更多成长机会", "📌 加大高学历人才引进力度，提升整体人才素质", "📌 建立绩效激励机制，强化绩效与薪资的挂钩关系", "📌 定期开展员工满意度调查，及时解决员工诉求" ] }; // 页面加载完成后渲染数据 window.addEventListener('load', function() { renderKPIs(); renderCharts(); renderInsights(); renderDepartmentTable(); }); // 渲染KPI指标 function renderKPIs() { document.getElementById('total-count').textContent = rawData.metrics['总员工数']; document.getElementById('total-staff').textContent = rawData.metrics['总员工数']; document.getElementById('avg-performance').textContent = rawData.metrics['平均绩效'].toFixed(1); document.getElementById('avg-salary').textContent = '¥' + rawData.metrics['平均薪资'].toLocaleString(); document.getElementById('turnover-rate').textContent = rawData.metrics['离职率']; document.getElementById('female-ratio').textContent = rawData.metrics['女性占比']; document.getElementById('high-edu-ratio').textContent = rawData.metrics['高学历占比']; } // 渲染图表 function renderCharts() { // 各部门人数分布 const departmentNames = rawData.department_stats.map(d => d.department); const departmentCounts = rawData.department_stats.map(d => d.count); new Chart(document.getElementById('departmentCountChart'), { type: 'bar', data: { labels: departmentNames, datasets: [{ label: '人数', data: departmentCounts, backgroundColor: '#1a3a5c', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } } }); // 各部门平均薪资 const departmentSalaries = rawData.department_stats.map(d => d.avg_salary); new Chart(document.getElementById('departmentSalaryChart'), { type: 'bar', data: { labels: departmentNames, datasets: [{ label: '平均薪资(元)', data: departmentSalaries, backgroundColor: '#22a67e', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } } }); // 各部门离职率 const departmentTurnover = rawData.department_stats.map(d => d.turnover_rate); const turnoverColors = departmentTurnover.map(rate => { if (rate > 20) return '#e63946'; if (rate > 15) return '#e6a020'; return '#22a67e'; }); new Chart(document.getElementById('departmentTurnoverChart'), { type: 'bar', data: { labels: departmentNames, datasets: [{ label: '离职率(%)', data: departmentTurnover, backgroundColor: turnoverColors, borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } } }); // 学历分布 const educationLabels = Object.keys(rawData.education_distribution); const educationData = Object.values(rawData.education_distribution); new Chart(document.getElementById('educationChart'), { type: 'pie', data: { labels: educationLabels, datasets: [{ data: educationData, backgroundColor: ['#1a3a5c', '#7c5cbf', '#e6a020', '#2a9d8f'], borderWidth: 1 }] }, options: { responsive: true, maintainAspectRatio: false } }); // 绩效 vs 薪资散点图 const performanceSalaryData = rawData.department_stats.map(d => ({ x: d.avg_score, y: d.avg_salary })); new Chart(document.getElementById('performanceSalaryChart'), { type: 'scatter', data: { datasets: [{ label: '部门绩效与薪资', data: performanceSalaryData, backgroundColor: '#1a3a5c', pointRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: '平均绩效' } }, y: { title: { display: true, text: '平均薪资(元)' } } }, plugins: { tooltip: { callbacks: { label: function(context) { const index = context.dataIndex; return `${departmentNames[index]}: 绩效${rawData.department_stats[index].avg_score.toFixed(1)}, 薪资¥${rawData.department_stats[index].avg_salary.toLocaleString()}`; } } } } } }); } // 渲染核心发现与建议 function renderInsights() { const insightsList = document.getElementById('insights-list'); rawData.insights.forEach(insight => { const li = document.createElement('li'); li.textContent = insight; insightsList.appendChild(li); }); const suggestionsList = document.getElementById('suggestions-list'); rawData.suggestions.forEach(suggestion => { const li = document.createElement('li'); li.textContent = suggestion; suggestionsList.appendChild(li); }); } // 渲染部门表格 function renderDepartmentTable() { const tbody = document.querySelector('#department-table tbody'); rawData.department_stats.forEach(dept => { const tr = document.createElement('tr'); // 部门名称 const deptNameTd = document.createElement('td'); deptNameTd.textContent = dept.department; tr.appendChild(deptNameTd); // 人数 const countTd = document.createElement('td'); countTd.textContent = dept.count; tr.appendChild(countTd); // 平均薪资 const salaryTd = document.createElement('td'); salaryTd.textContent = '¥' + dept.avg_salary.toLocaleString(); tr.appendChild(salaryTd); // 平均绩效 const performanceTd = document.createElement('td'); const performanceText = dept.avg_score.toFixed(1); if (dept.avg_score >= 85) { performanceTd.innerHTML = `<span class="performance-green">${performanceText}</span>`; } else if (dept.avg_score < 75) { performanceTd.innerHTML = `<span class="performance-red">${performanceText}</span>`; } else { performanceTd.textContent = performanceText; } tr.appendChild(performanceTd); // 离职率 const turnoverTd = document.createElement('td'); const turnoverText = dept.turnover_rate.toFixed(1) + '%'; if (dept.turnover_rate > 20) { turnoverTd.innerHTML = `<span class="turnover-red">${turnoverText}</span>`; } else if (dept.turnover_rate > 15) { turnoverTd.innerHTML = `<span class="turnover-orange">${turnoverText}</span>`; } else { turnoverTd.textContent = turnoverText; } tr.appendChild(turnoverTd); tbody.appendChild(tr); }); } </script>
</body>
</html>
