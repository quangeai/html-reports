<!DOCTYPE html>
<html lang='zh-CN'>
<head>
<meta charset='UTF-8'>
<title>人力资源数据分析报告</title>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fa;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
            margin-top: 0;
        }
        .timestamp {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
            padding: 12px 15px;
            text-align: left;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #e0e0e0;
            word-break: break-word;
        }
        tr:hover {
            background-color: #f1f9ff;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #bdc3c7;
            text-align: right;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .error-msg {
            color: #e74c3c;
            background: #fde8e8;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #e74c3c;
        }
    </style>
    
</head>
<body>
<div class='container'>
<h1>📊 人力资源数据分析报告</h1>
<div class='timestamp'>生成时间：2026-06-22 18:35:57</div>
<div class='error-msg'>⚠️ 未接收到有效数据，请检查上游节点是否输出 JSON 格式内容。</div>
<div class='footer'>报告由 AI 自动生成 · 数据源自人力资源系统</div>
</div>
</body>
</html>
