<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识卡片：大模型</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .knowledge-card {
            width: 100%;
            max-width: 700px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 100, 0.08);
            overflow: hidden;
            border: 1px solid #eef1f5;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 100, 0.12);
        }

        .card-header {
            background: linear-gradient(135deg, #4a6ee0 0%, #6a8bef 100%);
            color: white;
            padding: 24px 30px;
            position: relative;
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h2 i {
            font-size: 1.6rem;
        }

        .card-header .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .card-body {
            padding: 30px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section:last-of-type {
            margin-bottom: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c3e50;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f4f8;
        }

        .section-title i {
            color: #4a6ee0;
        }

        .definition-box {
            background-color: #f8fafd;
            border-left: 4px solid #4a6ee0;
            padding: 18px 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #34495e;
        }

        .key-points ul {
            list-style: none;
            padding-left: 0;
        }

        .key-points li {
            padding: 10px 0 10px 32px;
            position: relative;
            line-height: 1.5;
            color: #444;
            border-bottom: 1px dashed #eaeef2;
        }

        .key-points li:last-child {
            border-bottom: none;
        }

        .key-points li:before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 0;
            top: 10px;
            color: #2ecc71;
            background-color: #e9f9ef;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .explanation {
            font-size: 1rem;
            line-height: 1.7;
            color: #555;
            background-color: #fffdf5;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #fff3cd;
        }

        .explanation strong {
            color: #e67e22;
        }

        .card-footer {
            padding: 20px 30px;
            background-color: #f9fbfd;
            border-top: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            color: #7b8a9b;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: #eef2f8;
            color: #5a6c7d;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .timestamp i {
            margin-right: 5px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .knowledge-card {
                max-width: 95%;
            }

            .card-header, .card-body, .card-footer {
                padding: 20px;
            }

            .card-header h2 {
                font-size: 1.5rem;
            }

            .section-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .card-header h2 {
                font-size: 1.3rem;
            }

            .definition-box, .explanation {
                padding: 15px;
            }

            .card-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="knowledge-card">
        <div class="card-header">
            <h2><i class="fas fa-brain"></i> 大模型</h2>
            <div class="subtitle">人工智能核心概念解析</div>
        </div>

        <div class="card-body">
            <div class="section definition">
                <div class="section-title">
                    <i class="fas fa-book"></i> 核心定义
                </div>
                <div class="definition-box">
                    基于深度学习技术，经大量数据训练的人工智能模型。
                </div>
            </div>

            <div class="section key-points">
                <div class="section-title">
                    <i class="fas fa-key"></i> 关键点
                </div>
                <ul>
                    <li>依托大规模数据训练</li>
                    <li>能处理自然语言处理等复杂任务</li>
                </ul>
            </div>

            <div class="section">
                <div class="section-title">
                    <i class="fas fa-comment-alt"></i> 补充说明
                </div>
                <div class="explanation">
                    好比<strong>超强大脑</strong>，给它足够“知识”，能像<strong>智能帮手</strong>般输出内容。
                </div>
            </div>
        </div>

        <div class="card-footer">
            <div class="tags">
                <span class="tag">人工智能</span>
                <span class="tag">深度学习</span>
                <span class="tag">NLP</span>
                <span class="tag">机器学习</span>
            </div>
            <div class="timestamp">
                <i class="far fa-clock"></i> 知识更新于近期
            </div>
        </div>
    </div>
</body>
</html>
