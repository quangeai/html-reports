    <div class="container-fluid">

            <div class="col-lg-6">
                <div class="chart-container">
                    <div class="chart-title">使用率分布散点图 (签订率 vs 预测最终使用率)</div>
                    <canvas id="scatterChartUsage"></canvas>
                </div>

            <!-- 区块5：各客户类型的预测最终使用率箱线图 -->
            <div class="col-lg-12">
                <div class="chart-container">
                    <div class="chart-title">各客户类型预测最终使用率分布</div>

            <div class="col-lg-12">

                        <table class="table table-hover table-sm" id="highRiskTable">
                            <thead>

                                    <th>签订使用率</th>
                                    <th>已使用率</th>
                                    <th>预测最终使用率</th>
                                    <th>差值(预测-签订)</th>
                                    <th>剩余容忍度</th>
                                    <th>预测最终结算余额</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 区块6：需立即干预的“高危批次”列表 -->
            <div class="col-lg-6">
                <div class="table-container">
                    <div class="chart-title mb-3">需立即干预的“高危批次”列表</div>
                    <div class="table-responsive">
                        <table class="table table-hover table-sm" id="criticalBatchTable">
                            <thead>
                                <tr>
                                    <th>客户+项目</th>
                                    <th>发放月份</th>
                                    <th>发放量</th>
                                    <th>预测最终结算余额</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 区块7：运营决策建议 -->
            <div class="col-lg-6">
                <div class="advice-box h-100">
                    <h5 class="fw-bold mb-3">运营决策建议</h5>
                    <ul class="advice-list" id="adviceList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据源
        const rawData = [{"客户名称mapping": "苏州人保", "大类": "轮胎", "签订总使用率": 0.15, "已使用率": 0.12, "预测最终使用率": 0.28, "预测总使用率差值（预测-签订）": 0.13, "剩余容忍度": 0.03, "预测最终结算余额": -12000, "发放月份": "2024-01", "发放量": 1000}, {"客户名称mapping": "昆山人保", "大类": "轮胎", "签订总使用率": 0.18, "已使用率": 0.2, "预测最终使用率": 0.25, "预测总使用率差值（预测-签订）": 0.07, "剩余容忍度": -0.02, "预测最终结算余额": -8000, "发放月份": "2024-01", "发放量": 800}, {"客户名称mapping": "苏州人保", "大类": "保养", "签订总使用率": 0.1, "已使用率": 0.08, "预测最终使用率": 0.11, "预测总使用率差值（预测-签订）": 0.01, "剩余容忍度": 0.02, "预测最终结算余额": 2000, "发放月份": "2024-01", "发放量": 500}, {"客户名称mapping": "昆山人保", "大类": "保养", "签订总使用率": 0.12, "已使用率": 0.1, "预测最终使用率": 0.13, "预测总使用率差值（预测-签订）": 0.01, "剩余容忍度": 0.02, "预测最终结算余额": 1000, "发放月份": "2024-01", "发放量": 400}, {"客户名称mapping": "苏州人保", "大类": "油漆", "签订总使用率": 0.2, "已使用率": 0.18, "预测最终使用率": 0.35, "预测总使用率差值（预测-签订）": 0.15, "剩余容忍度": 0.02, "预测最终结算余额": -25000, "发放月份": "2024-02", "发放量": 1200}, {"客户名称mapping": "昆山人保", "大类": "油漆", "签订总使用率": 0.22, "已使用率": 0.25, "预测最终使用率": 0.3, "预测总使用率差值（预测-签订）": 0.08, "剩余容忍度": -0.03, "预测最终结算余额": -15000, "发放月份": "2024-02", "发放量": 900}, {"客户名称mapping": "苏州人保", "大类": "电瓶", "签订总使用率": 0.08, "已使用率": 0.05, "预测最终使用率": 0.09, "预测总使用率差值（预测-签订）": 0.01, "剩余容忍度": 0.03, "预测最终结算余额": 500, "发放月份": "2024-02", "发放量": 300}, {"客户名称mapping": "昆山人保", "大类": "电瓶", "签订总使用率": 0.09, "已使用率": 0.07, "预测最终使用率": 0.1, "预测总使用率差值（预测-签订）": 0.01, "剩余容忍度": 0.02, "预测最终结算余额": 300, "发放月份": "2024-02", "发放量": 250}];

        // 数据预处理与计算
        let totalCategories = rawData.length;
        let highRiskCategories = rawData.filter(d => d['预测总使用率差值（预测-签订）'] > 0.05).length;
        let exceededCategories = rawData.filter(d => d['已使用率'] > d['签订总使用率']).length;
        let totalPredictedLoss = rawData.filter(d => d['预测最终结算余额'] < 0).reduce((sum, d) => sum + d['预测最终结算余额'], 0);
        let topDiffData = rawData.filter(d => d['预测总使用率差值（预测-签订）'] > 0)
                                 .sort((a,b) => b['预测总使用率差值（预测-签订）'] - a['预测总使用率差值（预测-签订）'])
                                 .slice(0, 15);
        let highRiskTableData = rawData.filter(d => d['预测总使用率差值（预测-签订）'] > 0);
        let criticalBatchData = rawData.filter(d => d['预测最终结算余额'] < 0 && d['剩余容忍度'] < 0.5);

        // 按客户聚合预测使用率
        let clientUsageMap = {};
        rawData.forEach(d => {
            let client = d['客户名称mapping'];
            if (!clientUsageMap[client]) clientUsageMap[client] = [];
            clientUsageMap[client].push(d['预测最终使用率']);
        });
        let clientNames = Object.keys(clientUsageMap);
        let clientMedians = clientNames.map(c => {
            let arr = clientUsageMap[c].sort((a,b)=>a-b);
            return arr[Math.floor(arr.length/2)];
        });
        let clientMaxs = clientNames.map(c => Math.max(...clientUsageMap[c]));
        let clientMins = clientNames.map(c => Math.min(...clientUsageMap[c]));

        // 生成建议
        let adviceList = [];
        let topNegCat = highRiskTableData.sort((a,b) => a['预测最终结算余额'] - b['预测最终结算余额'])[0];
        if (topNegCat) {
            adviceList.push(`建议立即与 <strong>${topNegCat['客户名称mapping']}-${topNegCat['大类']}</strong> 重启谈判，预测亏损达 ${-topNegCat['预测最终结算余额']} 元，预测使用率超出签订 ${(topNegCat['预测总使用率差值（预测-签订）']*100).toFixed(1)}%。`);
        }
        let highDiffCat = topDiffData[0];
        if (highDiffCat) {
            let suggestPct = Math.ceil(highDiffCat['预测总使用率差值（预测-签订）'] * 100);
            adviceList.push(`建议将 <strong>${highDiffCat['客户名称mapping']}-${highDiffCat['大类']}</strong> 的上门结算价下调约 ${suggestPct}%，以匹配其预测使用率（${(highDiffCat['预测最终使用率']*100).toFixed(1)}%），避免后续亏损。`);
        }
        let lowTolCat = rawData.filter(d => d['剩余容忍度'] < 0.1 && d['剩余容忍度'] > -1)[0];
        if (lowTolCat) {
            adviceList.push(`<strong>${lowTolCat['客户名称mapping']}-${lowTolCat['大类']}</strong> 剩余容忍度极低（${lowTolCat['剩余容忍度'].toFixed(3)}），已接近或超过签订使用率，需运营人员人工介入评估并密切监控后续使用数据。`);
        }

        // 区块1：更新KPI
        document.getElementById('totalCategories').textContent = totalCategories;
        document.getElementById('highRiskCategories').textContent = highRiskCategories;
        document.getElementById('exceededCategories').textContent = exceededCategories;
        document.getElementById('totalPredictedLoss').textContent = totalPredictedLoss.toLocaleString('zh-CN');

        // 区块2：横向条形图
        const barCtx = document.getElementById('barChartDiffRank').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: topDiffData.map(d => `${d['客户名称mapping']}-${d['大类']}`),
                datasets: [{
                    label: '预测-签订差值 (%)',
                    data: topDiffData.map(d => (d['预测总使用率差值（预测-签订）']*100).toFixed(1)),
                    backgroundColor: topDiffData.map(d => d['预测最终结算余额'] < 0 ? 'rgba(231, 76, 60, 0.8)' : 'rgba(52, 152, 219, 0.8)'),
                    borderColor: topDiffData.map(d => d['预测最终结算余额'] < 0 ? '#e74c3c' : '#3498db'),
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `差值: ${ctx.raw}%` } } },
                scales: {
                    x: { beginAtZero: true, title: { display: true, text: '预测使用率 - 签订使用率 (%)' } },
                    y: { ticks: { font: { size: 11 } } }
                }
            }
        });

        // 区块4：散点图
        const scatterCtx = document.getElementById('scatterChartUsage').getContext('2d');
        new Chart(scatterCtx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '批次类别',
                    data: rawData.map(d => ({ x: d['签订总使用率']*100, y: d['预测最终使用率']*100, r: Math.abs(d['预测最终结算余额'])/500, cat: `${d['客户名称mapping']}-${d['大类']}` })),
                    backgroundColor: rawData.map(d => d['预测最终结算余额'] < 0 ? 'rgba(231, 76, 60, 0.7)' : 'rgba(52, 152, 219, 0.7)'),
                    borderColor: rawData.map(d => d['预测最终结算余额'] < 0 ? '#c0392b' : '#2980b9'),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { callbacks: { label: ctx => `${ctx.raw.cat}: 签订${ctx.raw.x.toFixed(1)}%, 预测${ctx.raw.y.toFixed(1)}%` } },
                    annotation: {
                        annotations: {
                            line45: {
                                type: 'line',
                                xMin: 0, xMax: Math.max(...rawData.map(d=>d['签订总使用率']))*100 + 5,
                                yMin: 0, yMax: Math.max(...rawData.map(d=>d['签订总使用率']))*100 + 5,
                                borderColor: 'rgba(100, 100, 100, 0.5)',
                                borderWidth: 1,
                                borderDash: [5, 5]
                            }
                        }
                    }
                },
                scales: {
                    x: { title: { display: true, text: '签订使用率 (%)' }, min: 0 },
                    y: { title: { display: true, text: '预测最终使用率 (%)' }, min: 0 }
                }
            }
        });

        // 区块5：客户类型柱状图（带误差线）
        const barClientCtx = document.getElementById('barChartClientUsage').getContext('2d');
        new Chart(barClientCtx, {
            type: 'bar',
            data: {
                labels: clientNames,
                datasets: [
                    { label: '中位数', data: clientMedians.map(v => (v*100).toFixed(1)), backgroundColor: 'rgba(52, 152, 219, 0.8)', borderColor: '#2980b9', borderWidth: 1 },
                    { label: '最大值', data: clientMaxs.map(v => (v*100).toFixed(1)), backgroundColor: 'rgba(46, 204, 113, 0.6)', borderColor: '#27ae60', borderWidth: 1 },
                    { label: '最小值', data: clientMins.map(v => (v*100).toFixed(1)), backgroundColor: 'rgba(155, 89, 182, 0.6)', borderColor: '#8e44ad', borderWidth: 1 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { tooltip: { mode: 'index', callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw}%` } } },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: '预测最终使用率 (%)' } }
                }
            }
        });

        // 区块3：填充高风险类别表格
        const highRiskTbody = document.querySelector('#highRiskTable tbody');
        highRiskTableData.forEach(d => {
            let tr = document.createElement('tr');
            if (d['剩余容忍度'] < 0.5) tr.classList.add('highlight-yellow');
            tr.innerHTML = `
                <td>${d['客户名称mapping']}-${d['大类']}</td>
                <td>${(d['签订总使用率']*100).toFixed(1)}%</td>
                <td>${(d['已使用率']*100).toFixed(1)}%</td>
                <td>${(d['预测最终使用率']*100).toFixed(1)}%</td>
                <td>${(d['预测总使用率差值（预测-签订）']*100).toFixed(1)}%</td>
                <td>${d['剩余容忍度'].toFixed(3)}</td>
                <td class="${d['预测最终结算余额'] < 0 ? 'text-danger' : ''}">${d['预测最终结算余额'].toLocaleString('zh-CN')}</td>
            `;
            highRiskTbody.appendChild(tr);
        });

        // 区块6：填充高危批次表格
        const criticalTbody = document.querySelector('#criticalBatchTable tbody');
        criticalBatchData.forEach(d => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d['客户名称mapping']}-${d['大类']}</td>
                <td>${d['发放月份']}</td>
                <td>${d['发放量']}</td>
                <td class="text-danger">${d['预测最终结算余额'].toLocaleString('zh-CN')}</td>
            `;
            criticalTbody.appendChild(tr);
        });

        // 区块7：填充建议
        const adviceUl = document.getElementById('adviceList');
        adviceList.forEach(text => {
            let li = document.createElement('li');
            li.innerHTML = text;
            adviceUl.appendChild(li);
        });
    </script>
</body>
</html>
