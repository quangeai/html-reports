<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰姐 - 个人简历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .resume-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(50, 50, 93, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            overflow: hidden;
            padding: 40px;
        }

        /* 左侧边栏样式 */
        .sidebar {
            background: linear-gradient(135deg, #2c3e50 0%, #4a6491 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 30px;
            background-color: #5d7fb9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 18px;
            text-align: center;
            color: #bdc3c7;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .contact-info, .skills, .languages {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .section-title:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 50px;
            height: 2px;
            background-color: #3498db;
        }

        .contact-item, .skill-item, .language-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .contact-item i, .skill-item i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
            color: #3498db;
        }

        .skill-name {
            flex: 1;
            margin-bottom: 8px;
        }

        .skill-bar {
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .skill-level {
            height: 100%;
            background-color: #3498db;
            border-radius: 4px;
        }

        /* 右侧内容样式 */
        .main-content {
            padding-top: 20px;
        }

        .highlight {
            color: #2c3e50;
            background-color: rgba(52, 152, 219, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .about, .experience, .education, .projects {
            margin-bottom: 40px;
        }

        .content-title {
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            position: relative;
        }

        .content-title:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 60px;
            height: 2px;
            background-color: #e74c3c;
        }

        .about-text {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: justify;
        }

        .hobby-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .hobby-item {
            background-color: #f1f8ff;
            color: #2980b9;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #d6eaf8;
        }

        .timeline-item {
            margin-bottom: 30px;
            position: relative;
            padding-left: 30px;
        }

        .timeline-item:before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #3498db;
        }

        .timeline-item:after {
            content: '';
            position: absolute;
            left: 5px;
            top: 25px;
            width: 2px;
            height: calc(100% + 5px);
            background-color: #ecf0f1;
        }

        .timeline-item:last-child:after {
            display: none;
        }

        .timeline-date {
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .timeline-subtitle {
            font-size: 16px;
            color: #e74c3c;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .timeline-desc {
            font-size: 15px;
            color: #555;
        }

        .achievement {
            color: #27ae60;
            font-weight: 600;
        }

        .project-item {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #9b59b6;
        }

        .project-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .project-desc {
            font-size: 15px;
            color: #555;
        }

        @media (max-width: 900px) {
            .resume-container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 25px;
            }
            
            .sidebar {
                padding: 30px 20px;
            }
        }
    </style>
</head>
