<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商运营数据智能分析平台</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/map/china.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #051429;
            color: #fff;
            overflow: hidden;
        }
        .header {
            height: 70px;
            background: linear-gradient(90deg, #051429 0%, #082145 50%, #051429 100%);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
        }
        .header-title {
            font-size: 28px;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.7);
            letter-spacing: 3px;
        }
        .header-time, .header-update {
            font-size: 14px;
            color: #8be1ff;
            opacity: 0.8;
        }
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            padding: 15px;
            gap: 15px;
        }
        .panel {
            position: relative;
            background-color: rgba(8, 33, 69, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.2);
            margin-bottom: 15px;
            padding: 15px;
        }
        .panel::before, .panel::after, .panel .corner-lb, .panel .corner-rb {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid #00d2ff;
        }
        .panel::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }
        .panel::after {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }
        .panel .corner-lb {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
        }
        .panel .corner-rb {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #8be1ff;
            padding-left: 12px;
            margin-bottom: 15px;
            position: relative;
        }
        .panel-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            height: 14px;
            width: 4px;
            background-color: #00d2ff;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.7);
        }
        .left-panel, .right-panel {
            width: 24%;
            display: flex;
            flex-direction: column;
        }
        .center-panel {
            width: 52%;
            display: flex;
            flex-direction: column;
        }
        .core-indicators {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .indicator-card {
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.1) 0%, rgba(139, 225, 255, 0.05) 100%);
            padding: 10px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            text-align: center;
        }
        .indicator-label {
            font-size: 12px;
            color: #8be1ff;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .indicator-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
        .chart-container {
            height: 220px;
            width: 100%;
        }
        #mapChart {
            height: 420px;
            width: 100%;
        }
        #monthlyChart {
            height: 200px;
            width: 100%;
        }
        .top10-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .top10-table th {
            color: #8be1ff;
            text-align: left;
            padding: 6px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }
        .top10-table td {
            padding: 6px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
        }
        .rank-1 { background-color: rgba(255, 215, 0, 0.2); color: #ffd700; font-weight: bold; }
        .rank-2 { background-color: rgba(192, 192, 192, 0.2); color: #c0c0c0; font-weight: bold; }
        .rank-3 { background-color: rgba(205, 127, 50, 0.2); color: #cd7f32; font-weight: bold; }
    </style>
</head>

        </div>
        <div class="center-panel">

                <div class="corner-lb"></div>
                <div class="corner-rb"></div>
                <div class="panel-title">全国省份销售分布</div>

                <div class="corner-lb"></div>
                <div class="corner-rb"></div>

                <div id="monthlyChart"></div>
            </div>
        </div>
        <div class="right-panel">

                <div class="corner-lb"></div>
                <div class="corner-rb"></div>
                <div class="panel-title">平台销售分布</div>
                <div class="chart-container" id="platformChart"></div>
            </div>
            <div class="panel">

                <div class="corner-rb"></div>
                <div class="panel-title">类目销售分布</div>
                <div class="chart-container" id="categoryChart"></div>
            </div>
            <div class="panel">

                <div class="corner-rb"></div>

                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

                data: data.category_dist.map(i => ({ name: i.category, value: i.ratio })),
                itemStyle: { borderColor: '#051429', borderWidth: 2 },
                color: ['#00d2ff', '#3399ff', '#66b3ff', '#8be1ff', '#00ccff', '#33d9ff', '#66e5ff', '#99f0ff']
            }]
        });
        charts.push(categoryChart);

        window.addEventListener('resize', () => charts.forEach(chart => chart.resize()));
    </script>
</body>
</html>
