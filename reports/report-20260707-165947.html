<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天津路与延安路交叉口交通运行分析报告</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #1a5276;
      --secondary: #2ecc71;
      --accent: #e74c3c;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e6ed;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, var(--primary), #2980b9);
      color: white;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .data-source {
      font-size: 0.9rem;
      opacity: 0.8;
      font-style: italic;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .kpi-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 25px 20px;
      box-shadow: var(--card-shadow);
      text-align: center;
      border-top: 5px solid var(--secondary);
      transition: transform 0.3s ease;
    }

    .kpi-card:hover {
      transform: translateY(-5px);
    }

    .kpi-value {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--primary);
      margin: 10px 0;
    }

    .kpi-label {
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 5px;
    }

    .kpi-note {
      font-size: 0.85rem;
      color: var(--accent);
      font-style: italic;
    }

    .section {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 25px;
      box-shadow: var(--card-shadow);
    }

    .section-title {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 24px;
      background-color: var(--secondary);
      border-radius: 4px;
    }

    .chart-container {
      position: relative;
      height: 350px;
      width: 100%;
      margin-top: 15px;
    }

    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background-color: #f1f8ff;
      border-radius: 8px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-weight: 600;
      color: var(--primary);
    }

    select, input {
      padding: 8px 15px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background-color: white;
      color: var(--text);
    }

    #dateSlider {
      flex-grow: 1;
      max-width: 400px;
    }

    .btn {
      padding: 10px 20px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #154360;
    }

    .direction-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .lane-breakdown {
      margin-top: 20px;
    }

    .summary-box {
      background-color: #f9fdf7;
      border-left: 5px solid var(--secondary);
      padding: 20px;
      border-radius: 8px;
      margin-top: 25px;
    }

    .summary-box h4 {
      color: var(--primary);
      margin-bottom: 10px;
    }

    .summary-box ul {
      padding-left: 20px;
    }

    .summary-box li {
      margin-bottom: 8px;
    }

    .export-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      padding: 12px 24px;
      background-color: var(--accent);
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
    }

    .export-btn:hover {
      background-color: #c0392b;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 1000;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-light);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .kpi-grid {
        grid-template-columns: 1fr;
      }
      .direction-grid {
        grid-template-columns: 1fr;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }
      #dateSlider {
        max-width: 100%;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>天津路与延安路交叉口交通运行分析报告</h1>
      <p class="subtitle">数据时间范围：<span id="dateRange">2026-06-01 00:00 至 2026-06-29 23:00</span></p>
      <p class="data-source">数据来源：交叉口电警/雷达检测器（逐小时记录） | 报告生成时间：<span id="reportTime"></span></p>
    </header>

    <div class="filter-bar">
      <div class="filter-group">
        <label for="dateSlider">时间筛选：</label>
        <input type="range" id="dateSlider" min="0" max="28" value="28" step="1">
        <span id="sliderValue">全部数据 (6月1日 - 6月29日)</span>
      </div>
      <div class="filter-group">
        <label for="periodSelect">时段对比：</label>
        <select id="periodSelect">
          <option value="all">全部时段</option>
          <option value="peak_am">早高峰 (7-9点)</option>
          <option value="peak_pm">晚高峰 (17-19点)</option>
          <option value="off_peak">平峰 (10-16点)</option>
          <option value="night">夜间 (22-6点)</option>
        </select>
        <button class="btn" onclick="applyFilters()">应用筛选</button>
        <button class="btn" onclick="resetFilters()">重置</button>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title">核心运行指标 (KPI)</h2>
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">累计总流量</div>
          <div class="kpi-value" id="kpiTotalFlow">0</div>
          <div class="kpi-note">所有车道，全部时段</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label
