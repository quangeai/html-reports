<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            padding: 2rem;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
        }
        .report-container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1.report-title {
            text-align: center;
            color: #1f2937;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 12px 15px;
            text-align: center;
        }
        table th {
            background-color: #2563eb;
            color: white;
        }
        table tr:nth-child(even) {
            background-color: #f9fafb;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #eff6ff;
            border-left: 4px solid #2563eb;
        }
    </style>
</head>
<body>
    <div class="report-container">
        <h1 class="report-title">HTML Reports</h1>

        <!-- 报表表格 -->
        <table>
            <thead>
                <tr>
                    <th>序号</th>
                    <th>项目名称</th>
                    <th>数量</th>
                    <th>金额</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>月度销售报表</td>
                    <td>128</td>
                    <td>12580.00</td>
                    <td>已完成</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>库存统计报表</td>
                    <td>96</td>
                    <td>8640.00</td>
                    <td>进行中</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>客户访问报表</td>
                    <td>320</td>
                    <td>0.00</td>
                    <td>已完成</td>
                </tr>
            </tbody>
        </table>

        <!-- 统计汇总 -->
        <div class="summary">
            <h3>报表汇总信息</h3>
            <p>总数据条数：3 | 合计金额：21220.00</p>
            <p>生成时间：2026-07-07</p>
        </div>
    </div>
</body>
</html>
