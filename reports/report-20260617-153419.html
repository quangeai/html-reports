<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手卫生数据统计可视化</title>
    <!-- 引入ECharts官方在线CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f5fafb;
            margin: 0;
            padding: 20px;
            color: #2d4f4f;
        }
        .chart-container {
            width: 90%;
            height: 400px;
            margin: 30px auto;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        .summary {
            width: 90%;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        h2 {
            color: #2d4f4f;
            text-align: center;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0f0f0;
        }
        h3 {
            color: #2d4f4f;
            margin-top: 20px;
            margin-bottom: 15px;
        }
        h4 {
            color: #3a6b6b;
            margin-top: 18px;
            margin-bottom: 10px;
        }
        .suggestion-item {
            margin: 12px 0;
            padding: 10px;
            background-color: #f0f8f8;
            border-radius: 6px;
            border-left: 4px solid #2d4f4f;
        }
        .stat-item {
            font-size: 16px;
            line-height: 1.8;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <h2>护士手卫生平均分排名</h2>
    <div id="barChart" class="chart-container"></div>

    <h2>低分反馈问题分布</h2>
    <div id="pieChart" class="chart-container"></div>

    <div class="summary">
        <h3>数据汇总与整改建议</h3>
        <div class="stat-item"><strong>科室平均分：</strong>90分</div>
        <div class="stat-item"><strong>最高分护士：</strong>王五（95分）</div>
        <div class="stat-item"><strong>最低分护士：</strong>李四（85分）</div>
        
        <h4>问题整改建议：</h4>
        <div class="suggestion-item">
            <p><strong>未洗手（12次）：</strong>强化操作前手卫生意识，增加现场督查频次，将洗手流程纳入每日班前提醒内容。</p>
        </div>
        <div class="suggestion-item">
            <p><strong>洗手不规范（8次）：</strong>组织七步洗手法实操考核，制作标准化操作卡片张贴于各操作区域，督查时重点核查洗手步骤完整性。</p>
        </div>
        <div class="suggestion-item">
            <p><strong>未使用速干手消毒剂（5次）：</strong>在各诊疗点位补充速干手消物资，培训无水源场景下的手卫生规范，纳入月度绩效考评。</p>
        </div>
        <div class="suggestion-item">
            <p><strong>洗手超时（3次）：</strong>优化操作流程节奏，培训高效洗手技巧，避免因超时影响诊疗效率与手卫生依从性。</p>
        </div>
    </div>

    <script>
        // 初始化护士平均分柱状图
        var barChart = echarts.init(document.getElementById('barChart'));
        var barOption = {
            title: {
                text: '护士手卫生平均分排名',
                left: 'center',
                textStyle: {
                    fontSize: 18,
                    color: '#2d4f4f'
                }
            },
            grid: {
                left: '10%',
                right: '10%',
                bottom: '15%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: ['王五', '张三', '赵六', '李四'],
                axisLabel: {
                    interval: 0,
                    rotate: 30,
                    fontSize: 14
                },
                axisLine: {
                    lineStyle: {
                        color: '#e0f0f0'
                    }
                }
            },
            yAxis: {
                type: 'value',
                min: 80,
                max: 100,
                axisLabel: {
                    formatter: '{value} 分',
                    fontSize: 14
                },
                axisLine: {
                    lineStyle: {
                        color: '#e0f0f0'
                    }
                },
                splitLine: {
                    lineStyle: {
                        color: '#f0f8f8'
                    }
                }
            },
            series: [{
                name: '平均分',
                type: 'bar',
                data: [95, 92, 88, 85],
                itemStyle: {
                    color: '#2d4f4f',
                    borderRadius: [6, 6, 0, 0]
                },
                label: {
                    show: true,
                    position: 'top',
                    fontSize: 13,
                    color: '#2d4f4f'
                }
            }],
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#ffffff',
                borderColor: '#2d4f4f',
                borderWidth: 1,
                formatter: '{b}<br/>平均分：{c} 分'
            }
        };
        barChart.setOption(barOption);

        // 初始化问题分布饼图
        var pieChart = echarts.init(document.getElementById('pieChart'));
        var pieOption = {
            title: {
                text: '低分反馈问题占比分布',
                left: 'center',
                textStyle: {
                    fontSize: 18,
                    color: '#2d4f4f'
                }
            },
            tooltip: {
                trigger: 'item',
                backgroundColor: '#ffffff',
                borderColor: '#2d4f4f',
                borderWidth: 1,
                formatter: '{b}<br/>频次：{c} 次<br/>占比：{d}%'
            },
            legend: {
                orient: 'vertical',
                left: 'left',
                textStyle: {
                    fontSize: 14
                }
            },
            series: [{
                name: '问题频次',
                type: 'pie',
                radius: ['40%', '70%'],
                center: ['60%', '50%'],
                data: [
                    {value: 12, name: '未洗手'},
                    {value: 8, name: '洗手不规范'},
                    {value: 5, name: '未使用速干手消毒剂'},
                    {value: 3, name: '洗手超时'}
                ],
                itemStyle: {
                    color: function(params) {
                        var colors = ['#2d4f4f', '#3a6b6b', '#56a3a3', '#80c2c2'];
                        return colors[params.dataIndex];
                    },
                    borderRadius: 6
                },
                label: {
                    show: true,
                    fontSize: 13,
                    formatter: '{b}: {d}%'
                }
            }]
        };
        pieChart.setOption(pieOption);

        // 响应式适配窗口大小变化
        window.addEventListener('resize', function() {
            barChart.resize();
            pieChart.resize();
        });
    </script>
</body>
</html>
