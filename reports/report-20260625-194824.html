<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>广告费 与 销售额 关系图</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --border-color: #e5e7eb;
    }
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }
    .chart-wrap {
      width: 100%;
      max-width: 900px;
      padding: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
      transition: all 0.3s ease;
    }
    .chart-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .chart-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0;
      color: #111827;
      letter-spacing: 0.5px;
    }
    .chart-box {
      position: relative;
      height: 480px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="chart-wrap">
    <div class="chart-header">
      <h2 class="chart-title">广告费 与 销售额 关系图</h2>
    </div>
    <div class="chart-box">
      <canvas id="statmasterChart"></canvas>
    </div>
  </div>
  <script>
    const chartConfig = {"type": "scatter", "data": {"datasets": [{"type": "scatter", "label": "观测点", "data": [{"x": 100, "y": 120}, {"x": 150, "y": 180}, {"x": 200, "y": 210}, {"x": 250, "y": 270}, {"x": 300, "y": 340}], "backgroundColor": "rgba(59, 130, 246, 0.5)", "borderColor": "#2563eb", "borderWidth": 1.5, "pointRadius": 5, "pointHoverRadius": 7}, {"type": "line", "label": "趋势回归线", "data": [{"x": 100, "y": 118}, {"x": 300, "y": 330}], "borderColor": "#ef4444", "borderWidth": 2, "borderDash": [6, 4], "pointRadius": 0, "fill": false, "tension": 0.1}]}, "options": {"responsive": true, "maintainAspectRatio": false, "interaction": {"mode": "index", "intersect": false}, "plugins": {"title": {"display": false}, "legend": {"display": true, "position": "top", "labels": {"usePointStyle": true, "padding": 20, "font": {"size": 13, "family": "'Microsoft YaHei', sans-serif"}}}, "tooltip": {"backgroundColor": "rgba(17, 24, 39, 0.85)", "titleFont": {"size": 14, "family": "'Microsoft YaHei', sans-serif"}, "bodyFont": {"size": 13, "family": "'Microsoft YaHei', sans-serif"}, "padding": 12, "cornerRadius": 8, "displayColors": true}}, "scales": {"x": {"title": {"display": true, "text": "广告费", "font": {"weight": "bold", "size": 14}}, "grid": {"display": false}, "ticks": {"font": {"family": "'Microsoft YaHei', sans-serif"}}}, "y": {"title": {"display": true, "text": "销售额", "font": {"weight": "bold", "size": 14}}, "grid": {"color": "rgba(0,0,0,0.06)", "borderDash": [5, 5]}, "beginAtZero": true, "ticks": {"font": {"family": "'Microsoft YaHei', sans-serif"}}}}}};
    const ctx = document.getElementById('statmasterChart');
    new Chart(ctx, chartConfig);
  </script>
</body>
</html>
