<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>经营分析</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><style>body{background:#547f86;font-family:-apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;padding:2.5rem;text-align:center;border-radius:0 24px 24px;margin-bottom:3rem;}.sec-title{font-weight:700;color:#2c3e50;border-left:6px solid #1e3c72;padding-left:12px;margin:2.5rem 0 1.5rem 0;font-size:1.5rem}.card{border-radius:12px;background:rgba(255,255,255,0.05);background:#fff;transition:all .3s;height:100%;}.card:hover{transform:translateY(-3px)}.C{position:relative;height:320px;width:100%;}.TW{height:320px;overflow-y:auto;padding-right:5px}.table thead th{position:sticky;top:0;background:#18f9bf;z-index:1;white-space:nowrap;}</style></head><body><div class="ban"><h1>经营数据洞察报告</h1></div><div class="container"><h3 class="sec-title">一、数据分析结论</h3><div class="row row-cols-1 row-cols-md-3 g-4"><div class="col"><div class="card p-4 border-top border-primary mb-2"><h6 class="text-primary fw-bold mb-2">核心结果</h6><div id="c1" class="fs-5 text-dark mb-1"></div><div id="c2" class="small text-muted m-0"></div></div></div><div class="col"><div class="card p-4 border-top border-4 border-warning h-100"><h6 class="text-warning fw-bold mb-2">规模亮点</h6><div id="c3" class="fs-5 text-dark mb-1"></div><div id="c4" class="small text-muted m-0"></div></div></div><div class="col"><div class="card p-4 border-top border-4 border-info h-100"><h6 class="text-info fw-bold mb-2">过程指标</h6><div id="c5" class="fs-5 text-dark mb-1"></div><div id="c6" class="small text-muted m-0"></div></div></div></div><h3 class="sec-title">二、优化提升策略</h3><div class="row row-cols-1 row-cols-md-3 g-4" id="strategies-container"></div><h3 class="sec-title">三、数据趋势及明细</h3><div class="card p-3 mb-4"><h6 class="fw-bold mb-3 ps-2 border-start border-3 border-primary">1. 过程指标趋势</h6><div class="row g-4 align-items-stretch"><div class="col-md-6"><canvas id="C"></canvas></div><div class="col-md-6"><div class="TW"><table class="table table-sm table-hover text-nowrap" id="traffic-table"></table></div></div></div></div><div class="card p-3 mb-4"><h6 class="fw-bold mb-3 ps-2 border-start border-3 border-purple">2. 结果指标视图</h6><div class="row g-4 align-items-stretch"><div class="col-md-6"><canvas id="CC"></canvas></div><div class="col-md-6"><canvas id="Ccc"></canvas></div></div></div><div class="card p-3 mb-4"><h6 class="fw-bold mb-3 ps-2 border-start border-3 border-dark">3. 全量数据档案</h6><div class="TW"><table class="table table-striped table-hover text-nowrap" id="leads-table"></table></div></div>
<script>document.addEventListener('DOMContentLoaded',()=>{const d={"conclusions":{"traffic_summary":"无时间序列数据及过程指标（曝光/访问），无法分析过程指标","traffic_data":"无过程指标数据","leads_summary":"销售人员销售额分布不均，头部销售人员贡献主要业绩","leads_data":"总销售额约8496万元，最高销售额857.5万元（刘丽娟），最低9.89万元（张雷）","rank_summary":"整体销售表现分化，百万级销售人员（刘丽娟等）业绩突出，尾部销售人员业绩待提升","rank_name":"销售冠军（刘丽娟）、销售明星团队（尹明丽等）"},"strategies":[{"title":"低业绩销售人员提升计划","content":"针对张雷（98894元）、迟东（67899元）等低销售额销售人员，开展销售技能培训，分析客户资源与跟进策略，提供专项支持提升业绩。"},{"title":"明星销售经验分享会","content":"组织刘丽娟（857.5万）、尹明丽（684万）等百万级销售明星，分享客户拓展、谈判技巧等成功经验，并推广其销售方法至团队。"},{"title":"腰部销售人员激励计划","content":"为销售额20-80万区间销售人员（如程亮、马刚）设置阶梯式奖励机制，鼓励冲刺百万级业绩，扩大头部销售团队规模。"}],"traffic_analysis":{"labels":["无时间维度数据"],"exposure_data":[],"visit_data":[],"table_rows":[{"month":"无时间数据","exposure":null,"visit":null,"mom":null}]},"leads_analysis":{"labels":["销售额区间分布","百万级","50-100万","20-50万","<20万"],"total_leads_data":84957248,"pie_chart":{"labels":["百万级","50-100万","20-50万","<20万"],"data":[16,12,15,9]},"table_rows":[{"month":"无时间","total":84957248,"top_sellers":"刘丽娟,尹明丽,王小艳"}]}},D={dict:{month:"月份",phase:"阶段",exposure:"曝光量",visit:"访问数",click:"点击量",ctr:"点击率",total:"总计",total_sales:"总销售额",total_payments:"成交笔数",avg_price:"客单价",avg_conversion_rate:"转化率",order_count:"订单量",pay_count:"支付人数",consult:"咨询",online_order:"线上单",phone:"电话",group_order:"团购",shop_order:"到店",grow:"客资增长",traffic_data:"流量增长"}};const fmtv = v => isNaN(Number(v))?v:v.toLocaleString();//结论document.getElementById('c1').innerText=d.conclusions.traffic_summary;if(d.conclusions.traffic_data){let s=d.conclusions.traffic_data;document.getElementById('c2').innerHTML=`<p class="small text-muted m-0 mt-2">${s}</p>`}const lead=d.conclusions;document.getElementById('c3').innerText=lead.leads_summary;if(lead.leads_data){let s=lead.leads_data;document.getElementById('c4').innerHTML=`<p class="small text-muted m-0 mt-2">${s}</p>`}document.getElementById('c5').innerText=lead.rank_summary;if(lead.rank_name){let s=lead.rank_name;document.getElementById('c6').innerHTML=`<p class="small text-muted m-0 mt-2">${s}</p>`}//生成策略卡片const strategiesContainer = document.getElementById('strategies-container');let strategiesHtml = '';d.strategies.forEach(strategy => {strategiesHtml += `<div class="col"><div class="card p-4 border-top border-4 border-success h-100"><h6 class="text-success fw-bold mb-2">${strategy.title}</h6><div class="text-dark">${strategy.content}</div></div></div>`;});strategiesContainer.innerHTML = strategiesHtml;//流量图const da=d.traffic_analysis,l=da.labels;new Chart(document.getElementById('C'),{type:'line',data:{labels:l,datasets:[{label:'曝光量',data:da.exposure_data,borderColor:'#0f6def',backgroundColor:'rgba(14,111,239,0.1)',fill:true},{label:'访问数',data:da.visit_data,borderColor:'#f24621',backgroundColor:'rgba(242,70,33,0.1)',fill:true}]},options:{maintainAspectRatio:false,responsive:true,plugins:{legend:{position:'bottom'}}}});//饼图const dc=d.leads_analysis;new Chart(document.getElementById('Ccc'),{type:'doughnut',data:{labels:dc.pie_chart.labels,data:dc.pie_chart.data,backgroundColor:['#0f6def','#f24621','#18f9bf','#ffc107']},options:{maintainAspectRatio:false,responsive:true,plugins:{legend:{position:'bottom'}}}});//结果指标柱状图new Chart(document.getElementById('CC'),{type:'bar',data:{labels:dc.labels.slice(1),data:[16,12,15,9],backgroundColor:['#0f6def','#f24621','#18f9bf','#ffc107']},options:{maintainAspectRatio:false,responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:'销售人数'}}}}});//过程指标表格const trafficTable = document.getElementById('traffic-table');let trafficHtml = '<thead><tr><th>'+D.dict.month+'</th><th>'+D.dict.exposure+'</th><th>'+D.dict.visit+'</th></tr></thead><tbody>';da.table_rows.forEach(row => {trafficHtml += `<tr><td>${row.month}</td><td>${row.exposure?fmtv(row.exposure):'-'}</td><td>${row.visit?fmtv(row.visit):'-'}</td></tr>`;});trafficHtml += '</tbody>';trafficTable.innerHTML = trafficHtml;//全量数据表格const leadsTable = document.getElementById('leads-table');let leadsHtml = '<thead><tr><th>'+D.dict.month+'</th><th>'+D.dict.total_sales+'</th><th>TOP销售</th></tr></thead><tbody>';dc.table_rows.forEach(row => {leadsHtml += `<tr><td>${row.month}</td><td>${fmtv(row.total)}</td><td>${row.top_sellers}</td></tr>`;});leadsHtml += '</tbody>';leadsTable.innerHTML = leadsHtml;});</script></body></html>
