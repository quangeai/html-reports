```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息补充请求</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #eff6ff;
            --text-main: #1f2937;
            --text-secondary: #4b5563;
            --text-light: #9ca3af;
            --bg-gradient-start: #f3f4f6;
            --bg-gradient-end: #e5e7eb;
            --card-bg: #ffffff;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .card-header {
            background: var(--primary-light);
            padding: 30px 40px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(37, 99, 235, 0.1);
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .icon-wrapper svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .header-text p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Main Content */
        .card-body {
            padding: 40px;
        }

        .intro-message {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 30px;
            padding-left: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .requirements-list {
            display: grid;
            gap: 24px;
        }

        .req-item {
            display: flex;
            align-items: flex-start;
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .req-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-color: var(--primary-color);
        }

        .req-number {
            width: 32px;
            height: 32px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            margin-right: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .req-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .req-content p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Footer */
        . .card-footer {
            padding: 20px 40px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: #fffbeb;
            color: #b45309;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #f59e0b;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .btn-placeholder {
            background: var(--primary-color);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0.5;
            cursor: not-allowed;
            user-select: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card-header, .card-body, .card-footer {
                padding: 24px;
            }
            
            .header-text h1 {
                font-size: 1.25rem;
            }
            
            .req-item {
                flex-direction: column;
            }
            
            .req-number {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <!-- Header -->
            <header class="card-header">
                <div class="icon-wrapper">
                    <!-- SVG Icon: Clipboard/List -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                </div>
                <div class="header-text">
                    <h1>需要补充信息</h1>
                    <p>请完善以下内容以便生成 PPT</p>
                </div>
            </header>

            <!-- Body -->
            <main class="card-body">
                <p class="intro-message">
                    您好，目前您仅提供了Markdown格式规范，但未给出需要转化的具体内容、PPT主题/大纲或相关素材信息。请您补充以下内容，我会为您生成符合要求的PPT内容：
                </p>

                <div class="requirements-list">
                    <!-- Item 1 -->
                    <div class="req-item">
                        <div class="req-number">1</div>
                        <div class="req-content">
                            <h3>PPT 类型与受众</h3>
                            <p>类型（如工作总结、项目汇报、产品介绍等）、受众（如领导、同事、客户等）及核心目的。</p>
                        </div>
                    </div>

                    <!-- Item 2 -->
                    <div class="req-item">
                        <div class="req-number">2</div>
                        <div class="req-content">
                            <h3>具体内容素材</h3>
                            <p>周报内容、项目数据、核心观点、大纲框架等。</p>
                        </div>
                    </div>

                    <!-- Item 3 -->
                    <div class="req-item">
                        <div class="req-number">3</div>
                        <div class="req-content">
                            <h3>数据图表需求</h3>
                            <p>若需要数据图表，请提供图表展示主题、具体数据，以及期望的图表类型（可选）。</p>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="card-footer">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    等待输入中...
                </div>
                <div class="btn-placeholder">
                    等待完善
                </div>
            </footer>
        </div>
    </div>

</body>
</html>
