<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名词解释消消乐</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #e6f9e6;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #2d6a4f;
            margin-bottom: 30px;
        }
        #gameContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .bubble {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: perspective(1000px) rotateX(10deg);
            box-shadow: inset -5px -5px 10px rgba(0, 0, 0, 0.1), inset 5px 5px 10px rgba(255, 255, 255, 0.7), 0 5px 15px rgba(0, 0, 0, 0.2);
            user-select: none;
        }
        .bubble.selected {
            transform: perspective(1000px) rotateX(0deg) scale(1.1);
            box-shadow: inset -5px -5px 15px rgba(0, 0, 0, 0.2), inset 5px 5px 15px rgba(255, 255, 255, 0.8), 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 3px solid #2d6a4f;
        }
        .bubble.fade-out {
            opacity: 0;
            transform: scale(0.5);
        }
        #successMessage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #2d6a4f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 100;
        }
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <h1>名词解释消消乐</h1>
    <div id="gameContainer"></div>
    <div id="successMessage" style="display:none;">恭喜挑战成功</div>
    <canvas id="fireworks"></canvas>
    <script>
        const pairs = [
            { term: "国民生产净值", definition: "国民生产总值扣除折旧后的余额，反映当期新创造的价值" },
            { term: "个人可支配收入", definition: "个人收入扣除税费后可自由支配的部分" },
            { term: "国内生产总值", definition: "一国境内一定时期内生产的所有最终产品和服务的市场价值总和" },
            { term: "个人收入", definition: "个人从各种途径获得的收入总和，包括工资、股息等" },
            { term: "国民生产总值", definition: "一国国民一定时期内生产的所有最终产品和服务的市场价值总和" }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getRandomLightColor() {
            const r = Math.floor(Math.random() * 76) + 180;
            const g = Math.floor(Math.random() * 76) + 180;
            const b = Math.floor(Math.random() * 76) + 180;
            return `rgb(${r}, ${g}, ${b})`;
        }

        const items = [];
        pairs.forEach(pair => {
            items.push({ text: pair.term, match: pair.definition });
            items.push({ text: pair.definition, match: pair.term });
        });

        const shuffledItems = shuffle(items);
        const gameContainer = document.getElementById('gameContainer');
        let selectedBubble = null;

        shuffledItems.forEach(item => {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = item.text;
            bubble.style.backgroundColor = getRandomLightColor();
            bubble.dataset.match = item.match;
            bubble.addEventListener('click', handleBubbleClick);
            gameContainer.appendChild(bubble);
        });

        function handleBubbleClick(e) {
            const bubble = e.target;
            if (bubble.classList.contains('selected')) {
                bubble.classList.remove('selected');
                selectedBubble = null;
                return;
            }
            if (selectedBubble) {
                if (selectedBubble.dataset.match === bubble.textContent) {
                    selectedBubble.classList.add('fade-out');
                    bubble.classList.add('fade-out');
                    setTimeout(() => {
                        selectedBubble.remove();
                        bubble.remove();
                        if (document.querySelectorAll('.bubble').length === 0) {
                            showSuccess();
                        }
                    }, 500);
                } else {
                    selectedBubble.classList.remove('selected');
                }
                selectedBubble = null;
            } else {
                bubble.classList.add('selected');
                selectedBubble = bubble;
            }
        }

        function showSuccess() {
            document.getElementById('successMessage').style.display = 'block';
            initFireworks();
        }

        function initFireworks() {
            const canvas = document.getElementById('fireworks');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let fireworks = [];
            let particles = [];

            function Firework(x, y) {
                this.x = x;
                this.y = y;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = Math.random() * -5 - 5;
                this.radius = 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }

            Firework.prototype.update = function() {
                this.x += this.speedX;
                this.speedY += 0.1;
                this.y += this.speedY;
                this.radius *= 0.99;
            };

            Firework.prototype.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            };

            function Particle(x, y, color) {
                this.x = x;
                this.y = y;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.radius = Math.random() * 2 + 1;
                this.color = color;
                this.life = 100;
            }

            Particle.prototype.update = function() {
                this.x += this.speedX;
                this.speedY += 0.1;
                this.y += this.speedY;
                this.radius *= 0.98;
                this.life--;
            };

            Particle.prototype.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            };

            function createFirework() {
                const x = Math.random() * canvas.width;
                const y = canvas.height;
                fireworks.push(new Firework(x, y));
            }

            function loop() {
                ctx.fillStyle = 'rgba(230, 249, 230, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (Math.random() < 0.1) {
                    createFirework();
                }
                for (let i = fireworks.length - 1; i >= 0; i--) {
                    const firework = fireworks[i];
                    firework.update();
                    firework.draw();
                    if (firework.speedY >= 0) {
                        for (let j = 0; j < 50; j++) {
                            particles.push(new Particle(firework.x, firework.y, firework.color));
                        }
                        fireworks.splice(i, 1);
                    }
                }
                for (let i = particles.length - 1; i >= 0; i--) {
                    const particle = particles[i];
                    particle.update();
                    particle.draw();
                    if (particle.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
