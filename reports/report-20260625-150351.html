        <h1 style="font-size: 22pt; font-family: 'Small Song Simplified', SimSun, NSimSun, serif; line-height: 32pt; text-align: center; margin-bottom: 28pt;">将关于2026年端午节放假安排的通知</h1>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 0;">各院（部）、各部门、全体师生：</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">根据《国务院办公厅关于2026年部分节假日安排的通知》精神，结合我校实际工作情况，现将2026年端午节放假安排通知如下：</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">一、放假时间</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">2026年端午节放假时间为6月19日（星期五）至6月21日（星期日），共放假3天，不调休。</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">二、有关工作安排</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">(一) 教学工作安排</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">1. 6月19日的课程正常调至其他时间补授，具体安排由教务处另行通知；</p>

        <p style="font-size: 16pt; font-family: FangSong, 仿宋, serif; line-height: 28pt; margin-top: 14pt; margin-bottom: 14pt; text-align: left; text-indent: 2em;">(1) 如需调整教学安排的，请各教学单位提前报教务处备案。</p>
