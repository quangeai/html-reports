# 积极心理学教育内容排版设计

我将创建一个清新活泼的教育主题排版，突出积极心理学的内容，使其既专业又具有亲和力。

下面是完整的HTML+CSS代码实现：

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积极心理学 | 精品教育内容</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
            padding: 30px 20px;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #e6f7ff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 120, 215, 0.08);
            position: relative;
            overflow: hidden;
        }
        
        /* 云朵形状的主内容区 */
        .content-cloud {
            background-color: white;
            border-radius: 20px;
            padding: 40px 35px;
            position: relative;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }
        
        /* 云朵装饰 */
        .content-cloud:before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50px;
            width: 80px;
            height: 30px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }
        
        .content-cloud:after {
            content: "";
            position: absolute;
            top: -15px;
            right: 50px;
            width: 60px;
            height: 25px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }
        
        /* 主标题 */
        .main-title {
            font-size: 42px;
            font-weight: 700;
            color: #1a365d;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }
        
        .main-title:after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 8px;
            background-color: #ffd166;
            border-radius: 4px;
        }
        
        /* 主题导语区域 */
        .theme-intro {
            background-color: #d4edda;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        .theme-intro:before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        .theme-intro:after {
            content: "";
            position: absolute;
            bottom: -15px;
            right: -15px;
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        .intro-text {
            flex: 1;
            font-size: 18px;
            font-weight: 500;
            color: #155724;
            padding-right: 20px;
        }
        
        .icon-container {
            display: flex;
            gap: 15px;
        }
        
        .icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .icon svg {
            width: 30px;
            height: 30px;
        }
        
        /* 分阶段内容 */
        .content-section {
            margin-bottom: 35px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-left: 15px;
            position: relative;
        }
        
        .section-title:before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 24px;
            border-radius: 3px;
        }
        
        .section-1 .section-title {
            color: #e91e63;
        }
        
        .section-1 .section-title:before {
            background-color: #e91e63;
        }
        
        .section-2 .section-title {
            color: #2196f3;
        }
        
        .section-2 .section-title:before {
            background-color: #2196f3;
        }
        
        .section-3 .section-title {
            color: #4caf50;
        }
        
        .section-3 .section-title:before {
            background-color: #4caf50;
        }
        
        .content-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            padding-left: 15px;
        }
        
        .highlight {
            font-weight: 700;
            color: #1a365d;
            background-color: rgba(255, 209, 102, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .color-emphasis {
            color: #e91e63;
            font-weight: 600;
        }
        
        /* 底部装饰 */
        .bottom-decoration {
            height: 12px;
            background-color: #ffd166;
            border-radius: 6px;
            margin-top: 40px;
            position: relative;
        }
        
        .bottom-decoration:before {
            content: "";
            position: absolute;
            top: -10px;
            left: 10%;
            width: 80%;
            height: 4px;
            background-color: rgba(255, 209, 102, 0.5);
            border-radius: 2px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
                border-radius: 20px;
            }
            
            .content-cloud {
                padding: 30px 25px;
            }
            
            .main-title {
                font-size: 34px;
            }
            
            .theme-intro {
                flex-direction: column;
                text-align: center;
                padding: 25px 20px;
            }
            
            .intro-text {
                padding-right: 0;
                margin-bottom: 20px;
            }
            
            .icon-container {
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .main-title {
                font-size: 28px;
            }
            
            .section-title {
                font-size: 20px;
            }
            
            .content-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

                            <path d="M12 2v20"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="content-section section-1">
