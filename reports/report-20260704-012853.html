<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名词解释消消乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #e6f9e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            color: #2d882d;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
        }
        .bubble {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: inset 0 -5px 15px rgba(255,255,255,0.8), inset 0 5px 10px rgba(0,0,0,0.1), 0 8px 10px rgba(0,0,0,0.1);
        }
        .bubble:hover {
            transform: translateY(-5px);
            box-shadow: inset 0 -5px 15px rgba(255,255,255,0.8), inset 0 5px 10px rgba(0,0,0,0.1), 0 12px 15px rgba(0,0,0,0.15);
        }
        .bubble.highlight {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,215,0,0.8), inset 0 -5px 15px rgba(255,255,255,0.8), inset 0 5px 10px rgba(0,0,0,0.1);
        }
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #2d882d;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            display: none;
            z-index: 100;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
            display: none;
        }
    </style>
</head>
<body>
    <h1>名词解释消消乐</h1>
    <div class="game-container" id="gameContainer"></div>
    <div class="success-message" id="successMsg">恭喜挑战成功</div>
    <canvas id="fireworks"></canvas>

    <script>
        const terms = [
            { term: '国民生产总值（GNP）', definition: '某国国民所拥有的全部生产要素在一定时期内所生产的最终产品的市场价值总和。' },
            { term: '国内生产净值（NDP）', definition: '国内生产总值扣除折旧后的余额，反映一定时期内新创造的价值。' },
            { term: '个人可支配收入（DPI）', definition: '个人可实际用于消费和储蓄的收入，即个人收入减去个人所得税和非税支付。' },
            { term: '国民收入（NI）', definition: '一国生产要素所有者在一定时期内获得的全部收入总和，即NDP扣除间接税和企业转移支付加政府补助金。' },
            { term: '国内生产总值（GDP）', definition: '经济社会（一国或一地区）在一定时期内运用生产要素所生产的全部最终产品的市场价值总和。' }
        ];

        const bubblesData = [];
        terms.forEach(item => {
            bubblesData.push({ text: item.term, pair: item.definition });
            bubblesData.push({ text: item.definition, pair: item.term });
        });
        bubblesData.sort(() => Math.random() - 0.5);

        const gameContainer = document.getElementById('gameContainer');
        const successMsg = document.getElementById('successMsg');
        const fireworksCanvas = document.getElementById('fireworks');
        const ctx = fireworksCanvas.getContext('2d');
        let selectedBubble = null;

        function generateRandomLightColor() {
            const hue = Math.floor(Math.random() * 360);
            return `hsl(${hue}, 30%, 85%)`;
        }

        bubblesData.forEach(data => {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = data.text;
            bubble.style.backgroundColor = generateRandomLightColor();
            bubble.dataset.pair = data.pair;
            bubble.addEventListener('click', handleBubbleClick);
            gameContainer.appendChild(bubble);
        });

        function handleBubbleClick(e) {
            const currentBubble = e.target;
            if (currentBubble.classList.contains('highlight')) {
                currentBubble.classList.remove('highlight');
                selectedBubble = null;
                return;
            }
            if (!selectedBubble) {
                selectedBubble = currentBubble;
                currentBubble.classList.add('highlight');
            } else {
                if (selectedBubble.dataset.pair === currentBubble.textContent) {
                    selectedBubble.style.opacity = '0';
                    currentBubble.style.opacity = '0';
                    setTimeout(() => {
                        selectedBubble.remove();
                        currentBubble.remove();
                        if (gameContainer.children.length === 0) {
                            successMsg.style.display = 'block';
                            fireworksCanvas.style.display = 'block';
                            startFireworks();
                        }
                    }, 300);
                } else {
                    selectedBubble.classList.remove('highlight');
                }
                selectedBubble = null;
            }
        }

        function startFireworks() {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
            const particles = [];
            const particleCount = 200;

            function createFirework() {
                const x = Math.random() * fireworksCanvas.width;
                const y = Math.random() * fireworksCanvas.height / 2 + fireworksCanvas.height / 2;
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 5,
                        color: `hsl(${Math.random() * 360}, 70%, 50%)`,
                        size: Math.random() * 3 + 1,
                        life: 100,
                        maxLife: 100
                    });
                }
            }

            function updateParticles() {
                ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life--;
                    const alpha = p.life / p.maxLife;
                    ctx.fillStyle = `${p.color}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                if (Math.random() < 0.05) {
                    createFirework();
                }
                requestAnimationFrame(updateParticles);
            }

            createFirework();
            updateParticles();
            window.addEventListener('resize', () => {
                fireworksCanvas.width = window.innerWidth;
                fireworksCanvas.height = window.innerHeight;
            });
        }
    </script>
</body>
</html>
